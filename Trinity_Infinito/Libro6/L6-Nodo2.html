<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gravedad del Corazón</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
        background: linear-gradient(135deg, #0a0020, #200040);
        color: #fff;
        font-family: 'Georgia', serif;
        overflow: hidden;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        perspective: 1000px;
        cursor: none;
    }

    .gravity-container {
        position: relative; width: 600px; height: 600px;
        max-width: 92vw; max-height: 92vh;
        transform-style: preserve-3d;
        animation: universeRotate 44s infinite linear;
    }
    @keyframes universeRotate {
        from { transform: rotateX(0deg) rotateY(0deg); }
        to   { transform: rotateX(360deg) rotateY(360deg); }
    }

    .love-center {
        position: absolute; width: 100px; height: 100px; top: 50%; left: 50%;
        background: radial-gradient(circle, rgba(255,20,147,1) 0%, rgba(255,20,147,0.7) 30%, rgba(255,20,147,0.3) 60%, transparent 100%);
        border-radius: 50%;
        box-shadow: 0 0 120px rgba(255,20,147,0.8), 0 0 240px rgba(255,20,147,0.4);
        transform: translate(-50%, -50%);
        animation: gravityPulse 3s infinite ease-in-out;
    }
    @keyframes gravityPulse {
        0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.85; }
        50%      { transform: translate(-50%, -50%) scale(1.3); opacity: 1; }
    }

    .orbiting-heart {
        position: absolute; width: 30px; height: 27px; left: 50%; top: 50%;
        transform-style: preserve-3d;
        --orbit-radius: 100px;
        animation: orbit 10s infinite linear;
    }
    .orbiting-heart::before, .orbiting-heart::after {
        content: ''; position: absolute; width: 16px; height: 25px;
        background: rgba(255,100,150,0.8); border-radius: 15px 15px 0 0;
        transform: rotate(-45deg); transform-origin: 0 100%; left: 15px; top: 0;
    }
    .orbiting-heart::after { left: 0; transform: rotate(45deg); transform-origin: 100% 100%; }
    @keyframes orbit {
        from { transform: rotateZ(0deg) translateX(var(--orbit-radius)) rotateZ(0deg) rotateY(0deg); }
        to   { transform: rotateZ(360deg) translateX(var(--orbit-radius)) rotateZ(-360deg) rotateY(360deg); }
    }

    .gravity-field {
        position: absolute; width: 100%; height: 100%;
        background: repeating-radial-gradient(circle at center, transparent 0px, transparent 30px, rgba(255,20,147,0.05) 30px, rgba(255,20,147,0.05) 31px);
        animation: fieldWarp 12s infinite linear;
    }
    @keyframes fieldWarp {
        0%   { transform: scale(1) rotate(0deg); }
        100% { transform: scale(1.5) rotate(360deg); }
    }

    .attraction-line {
        position: absolute; left: 50%; top: 50%; height: 1px;
        background: linear-gradient(to right, transparent, rgba(255,100,200,0.5), transparent);
        transform-origin: left center;
        transform: rotate(var(--rot)) scaleX(1);
        animation: attractionPulse 2s infinite ease-in-out;
    }
    @keyframes attractionPulse {
        0%, 100% { opacity: 0.3; transform: rotate(var(--rot)) scaleX(1); }
        50%      { opacity: 0.8; transform: rotate(var(--rot)) scaleX(1.2); }
    }

    .love-physics {
        position: fixed; top: 9%; left: 50%; transform: translateX(-50%);
        text-align: center; font-size: 1em; line-height: 1.7;
        color: rgba(255, 215, 100, 0.9); text-shadow: 0 0 12px rgba(255,200,80,0.5);
        animation: physicsFade 9s infinite ease-in-out; z-index: 30;
    }
    @keyframes physicsFade { 0%, 100% { opacity: 0.45; } 50% { opacity: 0.95; } }

    .gravity-wisdom {
        position: fixed; bottom: 8%; left: 50%; transform: translateX(-50%);
        text-align: center; font-size: 1.05em; line-height: 1.9;
        color: rgba(255,100,200,0.9); text-shadow: 0 0 22px rgba(255,20,147,0.5);
        width: 88%; max-width: 640px; z-index: 100;
        animation: wisdomFloat 13s infinite ease-in-out;
    }
    @keyframes wisdomFloat {
        0% { opacity: 0; } 12% { opacity: 0.92; } 80% { opacity: 0.92; } 92% { opacity: 0; } 100% { opacity: 0; }
    }

    canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0.6; }

    .hint {
        position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
        font-size: 11px; letter-spacing: 4px; color: rgba(255,255,255,0.3);
        animation: hint-breathe 4s ease-in-out infinite; transition: opacity 1.5s ease; pointer-events: none; z-index: 60;
    }
    .hint.oculto { opacity: 0; }
    @keyframes hint-breathe { 0%,100% { opacity: 0.16; } 50% { opacity: 0.4; } }
    .infinito {
        position: fixed; bottom: 24px; right: 28px;
        color: rgba(255,100,200,0.45); text-decoration: none; font-size: 24px;
        cursor: pointer; transition: color 0.6s ease; z-index: 60;
    }
    .infinito:hover { color: rgba(255,100,200,0.95); }

    @media (prefers-reduced-motion: reduce) {
        .gravity-container { animation: none; }
        .love-center { animation: none; opacity: 0.9; }
        .orbiting-heart { animation: none; }
        .gravity-field { animation: none; }
        .attraction-line { animation: none; opacity: 0.3; }
        .love-physics { animation: none; opacity: 0.85; }
        .gravity-wisdom { animation: none; opacity: 0.92; }
    }
</style>
</head>
<body>
    <canvas id="gravityCanvas"></canvas>

    <div class="love-physics">
        F = G(m₁♡m₂)/r²<br>
        La ecuación oculta del universo
    </div>

    <div class="gravity-container">
        <div class="gravity-field"></div>
        <div class="love-center"></div>
    </div>

    <div class="gravity-wisdom">
        No es la masa lo que curva el espacio-tiempo<br>
        es el amor inherente en cada partícula<br>
        atrayendo todo hacia la unidad
    </div>

    <div class="hint" id="hint">( tocá: la atracción resuena )</div>
    <a class="infinito" href="L6-Nodo3.html" title="Siguiente portal">∞</a>

    <script>
    const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    const container = document.querySelector('.gravity-container');

    // ── Canvas: partículas gravitacionales ──
    const canvas = document.getElementById('gravityCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    const cx = canvas.width / 2, cy = canvas.height / 2;
    const parts = [];
    class GravityParticle {
        constructor() { this.reset(); }
        reset() {
            const a = Math.random()*Math.PI*2, d = Math.random()*300 + 100;
            this.x = cx + Math.cos(a)*d; this.y = cy + Math.sin(a)*d;
            this.vx = (Math.random()-0.5)*2; this.vy = (Math.random()-0.5)*2; this.size = Math.random()*3 + 1;
        }
        update() {
            const dx = cx - this.x, dy = cy - this.y, d = Math.hypot(dx, dy);
            if (d > 5) { const f = 50 / (d*d); this.vx += (dx/d)*f; this.vy += (dy/d)*f; }
            this.vx *= 0.98; this.vy *= 0.98; this.x += this.vx; this.y += this.vy;
            if (d < 10) this.reset();
        }
        draw() {
            const dd = Math.hypot(cx - this.x, cy - this.y);
            ctx.strokeStyle = `rgba(255,100,200,${0.2 * (1 - Math.min(1, dd/300))})`; ctx.lineWidth = 1;
            ctx.beginPath(); ctx.moveTo(this.x, this.y); ctx.lineTo(cx, cy); ctx.stroke();
            ctx.fillStyle = 'rgba(255,100,200,0.8)'; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill();
        }
    }
    for (let i = 0; i < 50; i++) parts.push(new GravityParticle());
    function animateGravity() {
        ctx.fillStyle = 'rgba(10,0,32,0.05)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
        parts.forEach(p => { p.update(); p.draw(); });
        if (!reduce) requestAnimationFrame(animateGravity);
    }
    animateGravity();

    // ── Corazones orbitando ──
    for (let i = 0; i < 8; i++) {
        const h = document.createElement('div'); h.className = 'orbiting-heart';
        h.style.setProperty('--orbit-radius', (100 + i*30) + 'px');
        h.style.animationDelay = i * 1.25 + 's';
        h.style.animationDuration = (8 + i*2) + 's';
        container.appendChild(h);
    }

    // ── Líneas de atracción (radiando del centro) ──
    for (let i = 0; i < 12; i++) {
        const line = document.createElement('div'); line.className = 'attraction-line';
        line.style.width = '200px';
        line.style.setProperty('--rot', ((i / 12) * 360) + 'deg');
        line.style.animationDelay = i * 0.16 + 's';
        container.appendChild(line);
    }

    // ── Sabiduría gravitacional (con tiempo de lectura) ──
    const wisdoms = [
        "No es la masa lo que curva el espacio-tiempo<br>es el amor inherente en cada partícula<br>atrayendo todo hacia la unidad",
        "La gravedad es amor disfrazado de física<br>por eso nada puede escapar<br>ni siquiera la luz",
        "Los planetas orbitan soles<br>los electrones orbitan núcleos<br>todo danza alrededor del amor",
        "Einstein lo llamó curvatura<br>los místicos lo llaman atracción divina<br>es lo mismo: el universo amándose",
        "No caes hacia la Tierra<br>la Tierra y vos se abrazan<br>en el campo gravitacional del amor"
    ];
    let wIdx = 0;
    setInterval(() => { wIdx = (wIdx + 1) % wisdoms.length; document.querySelector('.gravity-wisdom').innerHTML = wisdoms[wIdx]; }, 13000);

    // ── Ecuación de física ──
    const equations = [
        'F = G(m₁♡m₂)/r²<br>La ecuación oculta del universo',
        'Gravedad = Amor / Distancia²<br>La ley fundamental',
        'E = mc² = Amor × Conciencia²<br>La trinidad de Einstein',
        'Atracción ∝ Amor<br>Repulsión = Ilusión',
        '∇ × Amor = ∞<br>El campo es infinito'
    ];
    let eqIdx = 0;
    setInterval(() => { eqIdx = (eqIdx + 1) % equations.length; document.querySelector('.love-physics').innerHTML = equations[eqIdx]; }, 10000);

    // ── Audio (Web Audio puro, SIN CDN; nace al tocar) ──
    let actx = null, master = null, fxIn = null, started = false;
    const timers = [];
    function makeReverbIR(s, d) {
        const rate = actx.sampleRate, len = Math.floor(rate * s);
        const b = actx.createBuffer(2, len, rate);
        for (let c = 0; c < 2; c++) { const a = b.getChannelData(c); for (let i = 0; i < len; i++) a[i] = (Math.random()*2-1)*Math.pow(1-i/len, d); }
        return b;
    }
    function panner(p) { const s = actx.createStereoPanner(); s.pan.value = p; return s; }
    const CENTER = 110.00;

    function buildGraph() {
        actx = new (window.AudioContext || window.webkitAudioContext)();
        master = actx.createGain(); master.gain.value = 0; master.connect(actx.destination);
        const dry = actx.createGain(); dry.gain.value = 0.58; dry.connect(master);
        const conv = actx.createConvolver(); conv.buffer = makeReverbIR(11, 1.7);
        const wet = actx.createGain(); wet.gain.value = 0.55; conv.connect(wet); wet.connect(master);
        fxIn = actx.createGain(); fxIn.connect(dry); fxIn.connect(conv);

        // Centro gravitacional: drone grave y cálido (el atractor)
        [CENTER / 2, CENTER, CENTER * 1.5].forEach((f, i) => {
            [f, f * 1.002].forEach(ff => { const o = actx.createOscillator(); o.type = 'sine'; o.frequency.value = ff; const g = actx.createGain(); g.gain.value = 0.03 / (i * 0.4 + 1); o.connect(g); g.connect(fxIn); o.start(); });
        });

        // Corazones orbitando: tonos que giran en el estéreo
        [[CENTER * 3, 0.06], [CENTER * 4, 0.09], [CENTER * 5, 0.13]].forEach(([f, rate], i) => {
            const o = actx.createOscillator(); o.type = 'sine'; o.frequency.value = f;
            const g = actx.createGain(); g.gain.value = 0.02;
            const pan = actx.createStereoPanner();
            const lfo = actx.createOscillator(); lfo.type = 'sine'; lfo.frequency.value = rate;
            lfo.connect(pan.pan); lfo.start(actx.currentTime + i);
            o.connect(g); g.connect(pan); pan.connect(fxIn); o.start();
        });
    }

    // Atracción: un tono que es atraído hacia el centro
    function playAttraction(t0) {
        const start = CENTER * [4, 5, 6][Math.floor(Math.random() * 3)];
        const o = actx.createOscillator(); o.type = 'sine';
        o.frequency.setValueAtTime(start, t0); o.frequency.exponentialRampToValueAtTime(CENTER * 2, t0 + 4);
        const g = actx.createGain();
        g.gain.setValueAtTime(0.0001, t0); g.gain.linearRampToValueAtTime(0.028, t0 + 1.5); g.gain.exponentialRampToValueAtTime(0.0001, t0 + 4);
        o.connect(g); g.connect(panner(Math.random()*1.2-0.6)).connect(fxIn);
        o.start(t0); o.stop(t0 + 4.2);
    }

    async function initSound() {
        if (started) return; started = true;
        buildGraph();
        if (actx.state === 'suspended') await actx.resume();
        master.gain.linearRampToValueAtTime(0.7, actx.currentTime + 5);
        const a = () => playAttraction(actx.currentTime + 0.05);
        a(); timers.push(setInterval(a, 5000));
        const h = document.getElementById('hint'); if (h) h.classList.add('oculto');
    }
    document.body.addEventListener('click', initSound, { once: true });
    </script>
</body>
</html>
