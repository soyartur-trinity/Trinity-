<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La Intimidad Absoluta</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }

    body {
        background: radial-gradient(circle at center, #1a001a, #000);
        color: #fff;
        font-family: 'Georgia', serif;
        overflow: hidden;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        cursor: none;
    }

    .intimacy-container { position: relative; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }

    .absolute-closeness {
        position: absolute; width: 1px; height: 1px;
        background: radial-gradient(circle, rgba(255,220,200,0.9) 0%, rgba(255,180,220,0.7) 30%, rgba(255,100,200,0.5) 60%, rgba(200,0,200,0.3) 100%);
        box-shadow: 0 0 75px 38px rgba(255,200,180,0.5), 0 0 150px 75px rgba(255,100,200,0.35), 0 0 225px 112px rgba(200,0,200,0.18);
        animation: closenessPulse 5s infinite ease-in-out;
    }
    @keyframes closenessPulse {
        0%, 100% { transform: scale(1); opacity: 0.7; }
        50%      { transform: scale(1.5); opacity: 0.95; }
    }

    .zero-distance {
        position: absolute; width: 400px; height: 400px; top: 50%; left: 50%;
        border: 1px solid rgba(255,0,255,0.3); border-radius: 50%;
        transform: translate(-50%, -50%) scale(1);
        animation: zeroCollapse 8s infinite ease-in-out;
    }
    @keyframes zeroCollapse {
        0%   { transform: translate(-50%, -50%) scale(1); opacity: 0.3; }
        50%  { transform: translate(-50%, -50%) scale(0.01); opacity: 0.8; }
        100% { transform: translate(-50%, -50%) scale(1); opacity: 0.3; }
    }

    .intimacy-particle {
        position: absolute; width: 3px; height: 3px; background: rgba(255,80,200,0.7); border-radius: 50%;
        box-shadow: 0 0 5px rgba(255,80,200,0.4);
        --startX:0px; --startY:0px; --endX:0px; --endY:0px;
        animation: intimacyMerge 6s infinite ease-in-out;
    }
    @keyframes intimacyMerge {
        0%   { transform: translate(var(--startX), var(--startY)) scale(1); opacity: 0.4; }
        50%  { transform: translate(0, 0) scale(0); opacity: 0.9; }
        100% { transform: translate(var(--endX), var(--endY)) scale(1); opacity: 0.4; }
    }

    .knowing-field {
        position: absolute; width: 100%; height: 100%;
        background: repeating-conic-gradient(from 0deg at center, transparent 0deg, rgba(255,0,255,0.05) 10deg, transparent 20deg);
        animation: knowingRotate 66s infinite linear;
    }
    @keyframes knowingRotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    .self-embrace {
        position: absolute; width: 300px; height: 300px; top: 50%; left: 50%;
        border-radius: 50%;
        background: conic-gradient(from 0deg, transparent, rgba(255,0,255,0.15), transparent, rgba(255,0,255,0.15), transparent);
        transform: translate(-50%, -50%);
        animation: selfSpin 12s infinite linear;
    }
    @keyframes selfSpin {
        from { transform: translate(-50%, -50%) rotate(0deg); }
        to   { transform: translate(-50%, -50%) rotate(360deg); }
    }

    .intimacy-wisdom {
        position: fixed; bottom: 10%; left: 50%; transform: translateX(-50%);
        text-align: center; font-size: 1.05em; line-height: 1.9;
        color: rgba(255,150,255,0.9); text-shadow: 0 0 22px rgba(255,100,200,0.5);
        width: 88%; max-width: 640px; z-index: 100;
        animation: wisdomGlow 13s infinite ease-in-out;
    }
    @keyframes wisdomGlow {
        0% { opacity: 0; } 12% { opacity: 0.92; } 80% { opacity: 0.92; } 92% { opacity: 0; } 100% { opacity: 0; }
    }

    .mystic-quote {
        position: fixed; top: 9%; left: 50%; transform: translateX(-50%);
        text-align: center; font-size: 1.25em; font-style: italic;
        color: rgba(255, 215, 150, 0.9); text-shadow: 0 0 15px rgba(255,200,100,0.5);
        width: 88%; max-width: 600px; z-index: 30;
        animation: quoteFade 12s infinite ease-in-out;
    }
    @keyframes quoteFade {
        0% { opacity: 0; } 14% { opacity: 0.9; } 82% { opacity: 0.9; } 94% { opacity: 0; } 100% { opacity: 0; }
    }

    canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0.6; }

    .hint {
        position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
        font-size: 11px; letter-spacing: 4px; color: rgba(255,255,255,0.3);
        animation: hint-breathe 4s ease-in-out infinite; transition: opacity 1.5s ease; pointer-events: none; z-index: 60;
    }
    .hint.oculto { opacity: 0; }
    @keyframes hint-breathe { 0%,100% { opacity: 0.16; } 50% { opacity: 0.4; } }
    .infinito {
        position: fixed; bottom: 24px; right: 28px;
        color: rgba(255,100,200,0.45); text-decoration: none; font-size: 24px;
        cursor: pointer; transition: color 0.6s ease; z-index: 60;
    }
    .infinito:hover { color: rgba(255,100,200,0.95); }

    @media (prefers-reduced-motion: reduce) {
        .absolute-closeness { animation: none; opacity: 0.85; }
        .zero-distance { animation: none; opacity: 0.3; }
        .intimacy-particle { animation: none; opacity: 0.4; }
        .knowing-field { animation: none; }
        .self-embrace { animation: none; }
        .intimacy-wisdom { animation: none; opacity: 0.92; }
        .mystic-quote { animation: none; opacity: 0.9; }
    }
</style>
</head>
<body>
    <canvas id="intimacyCanvas"></canvas>

    <div class="mystic-quote">"Más cerca que tu yugular"</div>

    <div class="intimacy-container">
        <div class="knowing-field"></div>
        <div class="self-embrace"></div>
        <div class="absolute-closeness"></div>
    </div>

    <div class="intimacy-wisdom">
        No estás EN el universo<br>
        sos el universo conociéndose<br>
        la intimidad más absoluta: ser uno mismo
    </div>

    <div class="hint" id="hint">( tocá: la cercanía resuena )</div>
    <a class="infinito" href="L6-Nodo7.html" title="Siguiente portal">∞</a>

    <script>
    const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    const container = document.querySelector('.intimacy-container');

    // ── Canvas: campo de intimidad (líneas convergiendo a cero) ──
    const canvas = document.getElementById('intimacyCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    const cx = canvas.width / 2, cy = canvas.height / 2;
    function drawIntimacyField() {
        ctx.fillStyle = 'rgba(0,0,0,0.02)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
        const time = Date.now() * 0.001;
        for (let i = 0; i < 24; i++) {
            const a = (i / 24) * Math.PI * 2;
            const sr = 300 + Math.sin(time + i * 0.5) * 50;
            const sx = cx + Math.cos(a)*sr, sy = cy + Math.sin(a)*sr;
            const g = ctx.createLinearGradient(sx, sy, cx, cy);
            g.addColorStop(0, 'rgba(255,0,255,0)'); g.addColorStop(0.5, 'rgba(255,80,200,0.15)'); g.addColorStop(1, 'rgba(255,180,200,0.4)');
            ctx.strokeStyle = g; ctx.lineWidth = 1; ctx.beginPath(); ctx.moveTo(sx, sy); ctx.lineTo(cx, cy); ctx.stroke();
        }
        const gs = 10 + Math.sin(time * 2) * 5;
        const gg = ctx.createRadialGradient(cx, cy, 0, cx, cy, gs);
        gg.addColorStop(0, 'rgba(255,200,180,0.9)'); gg.addColorStop(0.3, 'rgba(255,150,200,0.6)'); gg.addColorStop(0.7, 'rgba(200,100,200,0.3)'); gg.addColorStop(1, 'rgba(200,0,200,0)');
        ctx.fillStyle = gg; ctx.fillRect(cx - gs, cy - gs, gs*2, gs*2);
        if (!reduce) requestAnimationFrame(drawIntimacyField);
    }
    drawIntimacyField();

    // ── Círculos de distancia cero ──
    for (let i = 0; i < 5; i++) {
        const c = document.createElement('div'); c.className = 'zero-distance';
        c.style.animationDelay = i * 1.6 + 's';
        c.style.borderColor = `rgba(255,0,255,${0.3 - i*0.05})`;
        container.appendChild(c);
    }

    // ── Partículas de intimidad ──
    for (let i = 0; i < 40; i++) {
        const p = document.createElement('div'); p.className = 'intimacy-particle';
        const a = Math.random()*Math.PI*2, r = Math.random()*250 + 50;
        p.style.left = '50%'; p.style.top = '50%';
        p.style.setProperty('--startX', Math.cos(a)*r + 'px'); p.style.setProperty('--startY', Math.sin(a)*r + 'px');
        p.style.setProperty('--endX', Math.cos(a + Math.PI)*r + 'px'); p.style.setProperty('--endY', Math.sin(a + Math.PI)*r + 'px');
        p.style.animationDelay = Math.random()*6 + 's';
        container.appendChild(p);
    }

    // ── Citas místicas (con tiempo de lectura) ──
    const quotes = [
        '"Más cerca que tu yugular"',
        '"El amado está más cerca que vos mismo"',
        '"No hay distancia en el amor"',
        '"Vos sos lo que buscás"',
        '"El que busca es lo buscado"'
    ];
    let qIdx = 0;
    setInterval(() => { qIdx = (qIdx + 1) % quotes.length; document.querySelector('.mystic-quote').textContent = quotes[qIdx]; }, 12000);

    // ── Sabiduría (con tiempo de lectura) ──
    const wisdoms = [
        "No estás EN el universo<br>sos el universo conociéndose<br>la intimidad más absoluta: ser uno mismo",
        "La distancia entre vos y lo divino es cero<br>la distancia entre vos y el otro es cero<br>solo la ilusión crea separación",
        "Buscás fuera lo que está más adentro<br>tan adentro que es todo<br>la intimidad del ser consigo mismo",
        "No hay observador y observado<br>solo el abrazo infinito<br>del ser conociéndose a sí mismo",
        "Más íntimo que íntimo<br>más cerca que cerca<br>sos aquello que buscás conocer"
    ];
    let wIdx = 0;
    setInterval(() => { wIdx = (wIdx + 1) % wisdoms.length; document.querySelector('.intimacy-wisdom').innerHTML = wisdoms[wIdx]; }, 13000);

    // ── Audio (Web Audio puro, SIN CDN; nace al tocar) ──
    let actx = null, master = null, fxIn = null, started = false;
    const timers = [];
    function makeReverbIR(s, d) {
        const rate = actx.sampleRate, len = Math.floor(rate * s);
        const b = actx.createBuffer(2, len, rate);
        for (let c = 0; c < 2; c++) { const a = b.getChannelData(c); for (let i = 0; i < len; i++) a[i] = (Math.random()*2-1)*Math.pow(1-i/len, d); }
        return b;
    }
    function panner(p) { const s = actx.createStereoPanner(); s.pan.value = p; return s; }
    const CENTER = 174.61;

    function buildGraph() {
        actx = new (window.AudioContext || window.webkitAudioContext)();
        master = actx.createGain(); master.gain.value = 0; master.connect(actx.destination);
        const dry = actx.createGain(); dry.gain.value = 0.72; dry.connect(master); // más seco = más cerca
        const conv = actx.createConvolver(); conv.buffer = makeReverbIR(5, 2.2);
        const wet = actx.createGain(); wet.gain.value = 0.32; conv.connect(wet); wet.connect(master);
        fxIn = actx.createGain(); fxIn.connect(dry); fxIn.connect(conv);

        // Drone íntimo, cálido, cercano
        [CENTER, CENTER * 1.5].forEach(f => { [f, f*1.002].forEach(ff => { const o = actx.createOscillator(); o.type = 'sine'; o.frequency.value = ff; const g = actx.createGain(); g.gain.value = 0.03; o.connect(g); g.connect(fxIn); o.start(); }); });
    }

    // Yugular: pulso suave, muy cercano
    function pulse(t0) {
        const o = actx.createOscillator(); o.type = 'sine';
        o.frequency.setValueAtTime(66, t0); o.frequency.exponentialRampToValueAtTime(48, t0 + 0.2);
        const g = actx.createGain();
        g.gain.setValueAtTime(0.0001, t0); g.gain.linearRampToValueAtTime(0.06, t0 + 0.015); g.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.4);
        o.connect(g); g.connect(fxIn); o.start(t0); o.stop(t0 + 0.45);
    }

    // Distancia cero: dos tonos que colapsan a unísono
    function playCollapse(t0) {
        const ratio = [1.25, 1.333, 1.5][Math.floor(Math.random() * 3)];
        [[CENTER * ratio, 0.4], [CENTER / ratio, -0.4]].forEach(([start, pan]) => {
            const o = actx.createOscillator(); o.type = 'sine';
            o.frequency.setValueAtTime(start, t0); o.frequency.exponentialRampToValueAtTime(CENTER, t0 + 4); // → unísono
            const g = actx.createGain();
            g.gain.setValueAtTime(0.0001, t0); g.gain.linearRampToValueAtTime(0.025, t0 + 1.5); g.gain.exponentialRampToValueAtTime(0.0001, t0 + 5);
            o.connect(g); g.connect(panner(pan)).connect(fxIn); o.start(t0); o.stop(t0 + 5.2);
        });
    }

    async function initSound() {
        if (started) return; started = true;
        buildGraph();
        if (actx.state === 'suspended') await actx.resume();
        master.gain.linearRampToValueAtTime(0.7, actx.currentTime + 5);
        const pl = () => pulse(actx.currentTime + 0.05);
        pl(); timers.push(setInterval(pl, 900));
        const co = () => playCollapse(actx.currentTime + 0.05);
        co(); timers.push(setInterval(co, 7000));
        const h = document.getElementById('hint'); if (h) h.classList.add('oculto');
    }
    document.body.addEventListener('click', initSound, { once: true });
    </script>
</body>
</html>
