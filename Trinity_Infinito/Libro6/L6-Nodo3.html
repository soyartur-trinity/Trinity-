<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Compasión Cuántica</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }

    body {
        background: radial-gradient(ellipse at center, #001a1a, #000);
        color: #fff;
        font-family: 'Georgia', serif;
        overflow: hidden;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        cursor: none;
    }

    .quantum-compassion { position: relative; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }

    .entangled-hearts { position: absolute; width: 400px; height: 400px; animation: entangleSpin 22s infinite linear; }
    @keyframes entangleSpin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    .quantum-heart {
        position: absolute; width: 60px; height: 54px;
        transform: rotate(-45deg);
        animation: quantumFlicker 3s infinite ease-in-out;
    }
    .quantum-heart::before, .quantum-heart::after {
        content: ''; width: 32px; height: 50px; position: absolute; left: 30px; top: 0;
        background: rgba(0,255,200,0.5); border-radius: 30px 30px 0 0;
        transform: rotate(-45deg); transform-origin: 0 100%;
    }
    .quantum-heart::after { left: 0; transform: rotate(45deg); transform-origin: 100% 100%; }
    @keyframes quantumFlicker {
        0%, 100% { opacity: 0.3; }
        50%      { opacity: 0.8; }
    }

    .compassion-wave {
        position: absolute; width: 300px; height: 300px;
        border: 2px solid rgba(0,255,200,0.4); border-radius: 50%; opacity: 0;
        animation: compassionExpand 4s infinite ease-out;
    }
    @keyframes compassionExpand {
        0%   { transform: scale(0); opacity: 0; }
        10%  { opacity: 0.8; }
        90%  { opacity: 0.2; }
        100% { transform: scale(3); opacity: 0; }
    }

    .entanglement-line {
        position: absolute; width: 200px; height: 1px; top: 50%; left: 50%;
        background: linear-gradient(to right, transparent, rgba(0,255,200,0.6), transparent);
        transform-origin: left center;
        animation: entangleRotate 5s infinite linear;
    }
    @keyframes entangleRotate {
        from { transform: translate(-50%, -50%) rotate(var(--rot)); }
        to   { transform: translate(-50%, -50%) rotate(calc(var(--rot) + 360deg)); }
    }

    .bodhisattva-field {
        position: absolute; width: 500px; height: 500px; top: 50%; left: 50%;
        background: radial-gradient(circle, rgba(0,255,200,0.1) 0%, transparent 70%);
        border-radius: 50%;
        transform: translate(-50%, -50%);
        animation: fieldPulse 6s infinite ease-in-out;
    }
    @keyframes fieldPulse {
        0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.5; }
        50%      { transform: translate(-50%, -50%) scale(1.2); opacity: 0.9; }
    }

    /* Sufrimiento transmutado en compasión: el color ES el concepto (rojo → turquesa) */
    .suffering-particle {
        position: absolute; width: 4px; height: 4px; border-radius: 50%;
        background: rgba(200,80,80,0.6); opacity: 0;
        animation: sufferingTransform 8s infinite ease-in-out;
    }
    @keyframes sufferingTransform {
        0%   { background: rgba(200,80,80,0.6); transform: scale(0); opacity: 0; }
        10%  { opacity: 0.7; transform: scale(1); }
        30%  { background: rgba(220,150,100,0.7); }
        50%  { background: rgba(200,200,120,0.7); transform: scale(1.5); opacity: 0.6; }
        70%  { background: rgba(120,220,180,0.6); }
        90%  { background: rgba(80,230,200,0.5); transform: scale(0.5); opacity: 0.3; }
        100% { background: rgba(0,255,200,0.3); transform: scale(0); opacity: 0; }
    }

    .om-mani {
        position: fixed; top: 9%; left: 50%; transform: translateX(-50%);
        font-size: 30px; color: rgba(255, 215, 100, 0.9); text-shadow: 0 0 20px rgba(255,200,80,0.5);
        animation: mantraFloat 10s infinite ease-in-out; z-index: 30;
    }
    @keyframes mantraFloat {
        0%, 100% { transform: translateX(-50%) translateY(0); opacity: 0.45; }
        50%      { transform: translateX(-50%) translateY(-10px); opacity: 0.9; }
    }

    .compassion-wisdom {
        position: fixed; bottom: 8%; left: 50%; transform: translateX(-50%);
        text-align: center; font-size: 1.05em; line-height: 1.9;
        color: rgba(0,255,200,0.9); text-shadow: 0 0 22px rgba(0,255,200,0.5);
        width: 88%; max-width: 640px; z-index: 100;
        animation: wisdomGlow 13s infinite ease-in-out;
    }
    @keyframes wisdomGlow {
        0% { opacity: 0; } 12% { opacity: 0.92; } 80% { opacity: 0.92; } 92% { opacity: 0; } 100% { opacity: 0; }
    }

    canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0.5; }

    .hint {
        position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
        font-size: 11px; letter-spacing: 4px; color: rgba(255,255,255,0.3);
        animation: hint-breathe 4s ease-in-out infinite; transition: opacity 1.5s ease; pointer-events: none; z-index: 60;
    }
    .hint.oculto { opacity: 0; }
    @keyframes hint-breathe { 0%,100% { opacity: 0.16; } 50% { opacity: 0.4; } }
    .infinito {
        position: fixed; bottom: 24px; right: 28px;
        color: rgba(0,255,200,0.45); text-decoration: none; font-size: 24px;
        cursor: pointer; transition: color 0.6s ease; z-index: 60;
    }
    .infinito:hover { color: rgba(0,255,200,0.95); }

    @media (prefers-reduced-motion: reduce) {
        .entangled-hearts { animation: none; }
        .quantum-heart { animation: none; opacity: 0.6; }
        .compassion-wave { animation: none; opacity: 0; }
        .entanglement-line { animation: none; }
        .bodhisattva-field { animation: none; opacity: 0.6; }
        .suffering-particle { animation: none; opacity: 0; }
        .om-mani { animation: none; opacity: 0.85; }
        .compassion-wisdom { animation: none; opacity: 0.92; }
    }
</style>
</head>
<body>
    <canvas id="compassionCanvas"></canvas>

    <div class="om-mani">ॐ मणि पद्मे हूँ</div>

    <div class="quantum-compassion">
        <div class="bodhisattva-field"></div>
        <div class="entangled-hearts"></div>
    </div>

    <div class="compassion-wisdom">
        Tu dolor es mi dolor<br>
        no por empatía, sino por entrelazamiento cuántico<br>
        somos uno en el campo de la compasión
    </div>

    <div class="hint" id="hint">( tocá: la compasión resuena )</div>
    <a class="infinito" href="L6-Nodo4.html" title="Siguiente portal">∞</a>

    <script>
    const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    const compassionEl = document.querySelector('.quantum-compassion');

    // ── Canvas: red de compasión ──
    const canvas = document.getElementById('compassionCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    const cx = canvas.width / 2, cy = canvas.height / 2;
    class Node {
        constructor(x, y) { this.x = x; this.y = y; this.connections = []; this.phase = Math.random()*Math.PI*2; this.resonance = 0; }
        update() { this.resonance = Math.sin(Date.now()*0.001 + this.phase); }
        draw() {
            this.connections.forEach(n => {
                const g = ctx.createLinearGradient(this.x, this.y, n.x, n.y);
                g.addColorStop(0, `rgba(0,255,200,${Math.abs(this.resonance)*0.25})`);
                g.addColorStop(1, `rgba(0,255,200,${Math.abs(n.resonance)*0.25})`);
                ctx.strokeStyle = g; ctx.lineWidth = 1; ctx.beginPath(); ctx.moveTo(this.x, this.y); ctx.lineTo(n.x, n.y); ctx.stroke();
            });
            ctx.fillStyle = `rgba(0,255,200,${0.4 + this.resonance*0.25})`;
            ctx.beginPath(); ctx.arc(this.x, this.y, 3 + Math.abs(this.resonance)*2, 0, Math.PI*2); ctx.fill();
        }
    }
    const nodes = [];
    for (let i = 0; i < 20; i++) { const a = (i/20)*Math.PI*2, r = 150 + Math.random()*100; nodes.push(new Node(cx + Math.cos(a)*r, cy + Math.sin(a)*r)); }
    nodes.forEach((n, i) => nodes.forEach((o, j) => { if (i !== j && Math.hypot(n.x-o.x, n.y-o.y) < 150) n.connections.push(o); }));
    function animateCompassion() {
        ctx.fillStyle = 'rgba(0,0,0,0.05)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
        nodes.forEach(n => { n.update(); n.draw(); });
        if (!reduce) requestAnimationFrame(animateCompassion);
    }
    animateCompassion();

    // ── Corazones entrelazados ──
    const hearts = document.querySelector('.entangled-hearts');
    for (let i = 0; i < 6; i++) {
        const h = document.createElement('div'); h.className = 'quantum-heart';
        const a = (i / 6) * Math.PI * 2;
        h.style.left = `${200 + Math.cos(a)*150 - 30}px`; h.style.top = `${200 + Math.sin(a)*150 - 27}px`;
        h.style.animationDelay = i * 0.5 + 's';
        hearts.appendChild(h);
    }

    // ── Líneas de entrelazamiento ──
    for (let i = 0; i < 8; i++) {
        const line = document.createElement('div'); line.className = 'entanglement-line';
        line.style.setProperty('--rot', (i * 45) + 'deg');
        line.style.animationDelay = i * 0.625 + 's';
        compassionEl.appendChild(line);
    }

    if (!reduce) {
        setInterval(() => {
            const w = document.createElement('div'); w.className = 'compassion-wave';
            w.style.left = '50%'; w.style.top = '50%'; w.style.transform = 'translate(-50%, -50%) scale(0)';
            compassionEl.appendChild(w); setTimeout(() => w.remove(), 4000);
        }, 1000);
        function createSuffering() {
            const p = document.createElement('div'); p.className = 'suffering-particle';
            p.style.left = Math.random()*100 + '%'; p.style.top = Math.random()*100 + '%';
            compassionEl.appendChild(p); setTimeout(() => p.remove(), 8000);
        }
        for (let i = 0; i < 3; i++) createSuffering();
        setInterval(createSuffering, 2000);
    }

    // ── Sabiduría (con tiempo de lectura) ──
    const wisdoms = [
        "Tu dolor es mi dolor<br>no por empatía, sino por entrelazamiento cuántico<br>somos uno en el campo de la compasión",
        "Cuando un ser sufre en cualquier lugar del universo<br>la vibración alcanza todos los rincones<br>por eso la compasión es inevitable",
        "No ayudas al otro<br>te ayudas a vos mismo en otra forma<br>la separación es la ilusión fundamental",
        "El bodhisattva no elige compasión<br>ES compasión<br>como el sol no elige brillar",
        "En el nivel cuántico<br>tu alegría es mi alegría<br>tu liberación es mi liberación"
    ];
    let wIdx = 0;
    setInterval(() => { wIdx = (wIdx + 1) % wisdoms.length; document.querySelector('.compassion-wisdom').innerHTML = wisdoms[wIdx]; }, 13000);

    // ── Audio (Web Audio puro, SIN CDN; nace al tocar) ──
    let actx = null, master = null, fxIn = null, started = false;
    const timers = [];
    function makeReverbIR(s, d) {
        const rate = actx.sampleRate, len = Math.floor(rate * s);
        const b = actx.createBuffer(2, len, rate);
        for (let c = 0; c < 2; c++) { const a = b.getChannelData(c); for (let i = 0; i < len; i++) a[i] = (Math.random()*2-1)*Math.pow(1-i/len, d); }
        return b;
    }
    function panner(p) { const s = actx.createStereoPanner(); s.pan.value = p; return s; }
    const CENTER = 220.00;

    function buildGraph() {
        actx = new (window.AudioContext || window.webkitAudioContext)();
        master = actx.createGain(); master.gain.value = 0; master.connect(actx.destination);
        const dry = actx.createGain(); dry.gain.value = 0.56; dry.connect(master);
        const conv = actx.createConvolver(); conv.buffer = makeReverbIR(12, 1.7);
        const wet = actx.createGain(); wet.gain.value = 0.6; conv.connect(wet); wet.connect(master);
        fxIn = actx.createGain(); fxIn.connect(dry); fxIn.connect(conv);

        // Campo de compasión: drone cálido (quinta) + om grave
        [146.83, 220.00].forEach(f => { [f, f*1.002].forEach(ff => { const o = actx.createOscillator(); o.type = 'sine'; o.frequency.value = ff; const g = actx.createGain(); g.gain.value = 0.024; o.connect(g); g.connect(fxIn); o.start(); }); });
        const om = actx.createOscillator(); om.type = 'sine'; om.frequency.value = 73.42; const og = actx.createGain(); og.gain.value = 0.05; om.connect(og); og.connect(fxIn); om.start();
    }

    // Entrelazamiento: dos tonos que se separan del mismo centro, correlacionados en espejo
    function playEntangled(t0) {
        const ratio = [1.2, 1.25, 1.333, 1.5][Math.floor(Math.random() * 4)];
        const up = actx.createOscillator(); up.type = 'sine';
        up.frequency.setValueAtTime(CENTER, t0); up.frequency.exponentialRampToValueAtTime(CENTER * ratio, t0 + 3);
        const dn = actx.createOscillator(); dn.type = 'sine';
        dn.frequency.setValueAtTime(CENTER, t0); dn.frequency.exponentialRampToValueAtTime(CENTER / ratio, t0 + 3);
        [[up, 0.5], [dn, -0.5]].forEach(([o, pan]) => {
            const g = actx.createGain();
            g.gain.setValueAtTime(0.0001, t0); g.gain.linearRampToValueAtTime(0.026, t0 + 1.5); g.gain.exponentialRampToValueAtTime(0.0001, t0 + 5);
            o.connect(g); g.connect(panner(pan)).connect(fxIn); o.start(t0); o.stop(t0 + 5.2);
        });
    }

    async function initSound() {
        if (started) return; started = true;
        buildGraph();
        if (actx.state === 'suspended') await actx.resume();
        master.gain.linearRampToValueAtTime(0.7, actx.currentTime + 5);
        const e = () => playEntangled(actx.currentTime + 0.05);
        e(); timers.push(setInterval(e, 6000));
        const h = document.getElementById('hint'); if (h) h.classList.add('oculto');
    }
    document.body.addEventListener('click', initSound, { once: true });
    </script>
</body>
</html>
