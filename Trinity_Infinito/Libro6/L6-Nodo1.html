<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>El Vacío Enamorado</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }

    body {
        background: #000;
        color: #fff;
        font-family: 'Georgia', serif;
        overflow: hidden;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        cursor: none;
    }

    .void-love-container {
        position: absolute; width: 100%; height: 100%;
        background: radial-gradient(circle at center, rgba(255,0,100,0.05) 0%, transparent 50%);
    }

    .love-void {
        position: absolute; width: 300px; height: 300px; top: 50%; left: 50%;
        background: radial-gradient(circle, rgba(0,0,0,1) 0%, rgba(0,0,0,0.9) 30%, transparent 70%);
        border-radius: 50%;
        box-shadow: inset 0 0 120px rgba(255,0,100,0.5), 0 0 220px rgba(255,0,100,0.3);
        transform: translate(-50%, -50%);
        animation: voidPulse 6s infinite ease-in-out;
    }
    @keyframes voidPulse {
        0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.85; }
        50%      { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
    }

    .love-particle {
        position: absolute; width: 4px; height: 4px;
        background: radial-gradient(circle, rgba(255,120,160,0.9) 0%, rgba(255,80,130,0.6) 50%, rgba(255,0,100,0.3) 100%);
        border-radius: 50%; opacity: 0;
        --endX: 0px; --endY: 0px;
        animation: loveEmanate 10s infinite ease-out;
    }
    @keyframes loveEmanate {
        0%   { transform: translate(-50%, -50%) scale(0); opacity: 0; }
        10%  { transform: translate(-50%, -50%) scale(1); opacity: 0.8; }
        90%  { transform: translate(var(--endX), var(--endY)) scale(2); opacity: 0.3; }
        100% { transform: translate(calc(var(--endX) * 2), calc(var(--endY) * 2)) scale(0); opacity: 0; }
    }

    .quantum-heart {
        position: absolute; width: 100px; height: 90px; top: 50%; left: 50%;
        filter: blur(0.5px);
        transform: translate(-50%, -50%) rotate(-45deg);
        animation: quantumBeat 2s infinite ease-in-out;
    }
    .quantum-heart:before, .quantum-heart:after {
        content: ''; width: 52px; height: 80px; position: absolute; left: 50px; top: 0;
        background: rgba(255,50,120,0.4); border-radius: 50px 50px 0 0;
        transform: rotate(-45deg); transform-origin: 0 100%;
    }
    .quantum-heart:after { left: 0; transform: rotate(45deg); transform-origin: 100% 100%; }
    @keyframes quantumBeat {
        0%, 100% { transform: translate(-50%, -50%) rotate(-45deg) scale(1); opacity: 0.3; }
        50%      { transform: translate(-50%, -50%) rotate(-45deg) scale(1.3); opacity: 0.7; }
    }

    .causeless-wave {
        position: absolute; top: 50%; left: 50%; width: 600px; height: 600px;
        max-width: 96vmin; max-height: 96vmin;
        border-radius: 50%; border: 1px solid rgba(255,0,100,0.3); opacity: 0;
        transform: translate(-50%, -50%) scale(0);
        animation: waveExpand 4s infinite ease-out;
    }
    @keyframes waveExpand {
        0%   { transform: translate(-50%, -50%) scale(0); opacity: 0; }
        10%  { opacity: 0.6; }
        90%  { opacity: 0.2; }
        100% { transform: translate(-50%, -50%) scale(1); opacity: 0; }
    }

    .void-wisdom {
        position: fixed; bottom: 10%; left: 50%; transform: translateX(-50%);
        text-align: center; font-size: 1.05em; line-height: 1.9;
        color: rgba(255,120,160,0.9); text-shadow: 0 0 20px rgba(255,80,130,0.5);
        width: 88%; max-width: 640px; z-index: 100;
        animation: wisdomGlow 13s infinite ease-in-out;
    }
    @keyframes wisdomGlow {
        0% { opacity: 0; } 12% { opacity: 0.92; } 80% { opacity: 0.92; } 92% { opacity: 0; } 100% { opacity: 0; }
    }

    .love-equation {
        position: fixed; top: 9%; left: 50%; transform: translateX(-50%);
        font-size: 1.5em; color: rgba(255, 215, 100, 0.9); text-shadow: 0 0 15px rgba(255, 200, 80, 0.5);
        animation: equationFloat 10s infinite ease-in-out; z-index: 30;
    }
    @keyframes equationFloat {
        0%, 100% { transform: translateX(-50%) translateY(0); opacity: 0.45; }
        50%      { transform: translateX(-50%) translateY(-10px); opacity: 0.9; }
    }

    canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0.5; }

    .hint {
        position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
        font-size: 11px; letter-spacing: 4px; color: rgba(255,255,255,0.3);
        animation: hint-breathe 4s ease-in-out infinite; transition: opacity 1.5s ease; pointer-events: none; z-index: 60;
    }
    .hint.oculto { opacity: 0; }
    @keyframes hint-breathe { 0%,100% { opacity: 0.16; } 50% { opacity: 0.4; } }
    .infinito {
        position: fixed; bottom: 24px; right: 28px;
        color: rgba(255,120,160,0.45); text-decoration: none; font-size: 24px;
        cursor: pointer; transition: color 0.6s ease; z-index: 60;
    }
    .infinito:hover { color: rgba(255,120,160,0.95); }

    @media (prefers-reduced-motion: reduce) {
        .love-void { animation: none; opacity: 0.9; }
        .love-particle { animation: none; opacity: 0; }
        .quantum-heart { animation: none; opacity: 0.5; }
        .causeless-wave { animation: none; opacity: 0; }
        .void-wisdom { animation: none; opacity: 0.92; }
        .love-equation { animation: none; opacity: 0.8; }
    }
</style>
</head>
<body>
    <canvas id="loveCanvas"></canvas>

    <div class="love-equation">0 = ∞ = ♡</div>

    <div class="void-love-container">
        <div class="love-void"></div>
        <div class="quantum-heart"></div>
    </div>

    <div class="void-wisdom">
        Antes del Big Bang, el Amor ya era<br>
        no necesita causa ni objeto<br>
        es la sustancia misma del vacío
    </div>

    <div class="hint" id="hint">( tocá: el vacío resuena )</div>
    <a class="infinito" href="L6-Nodo2.html" title="Siguiente portal">∞</a>

    <script>
    const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    const container = document.querySelector('.void-love-container');

    // ── Canvas: campo de amor ──
    const canvas = document.getElementById('loveCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    const cx = canvas.width / 2, cy = canvas.height / 2;
    function drawLoveField() {
        ctx.fillStyle = 'rgba(0,0,0,0.02)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
        const time = Date.now() * 0.001;
        for (let i = 0; i < 3; i++) {
            const radius = (time * 50 + i * 100) % (canvas.width / 2);
            const g = ctx.createRadialGradient(cx, cy, radius, cx, cy, radius + 50);
            g.addColorStop(0, 'rgba(255,0,100,0)'); g.addColorStop(0.5, 'rgba(255,80,130,0.15)'); g.addColorStop(1, 'rgba(255,0,100,0)');
            ctx.fillStyle = g; ctx.fillRect(0, 0, canvas.width, canvas.height);
        }
        for (let i = 0; i < 5; i++) {
            const a = (time + i * Math.PI * 2 / 5) % (Math.PI * 2);
            const x = cx + Math.cos(a) * 200 * Math.sin(time * 0.5), y = cy + Math.sin(a) * 200 * Math.sin(time * 0.5);
            ctx.fillStyle = `rgba(255,120,160,${0.4 + Math.sin(time + i) * 0.2})`;
            ctx.beginPath(); ctx.arc(x, y, 3 + Math.sin(time + i) * 2, 0, Math.PI * 2); ctx.fill();
        }
        if (!reduce) requestAnimationFrame(drawLoveField);
    }
    drawLoveField();

    // ── Corazones cuánticos adicionales ──
    for (let i = 0; i < 3; i++) {
        const h = document.createElement('div'); h.className = 'quantum-heart';
        h.style.width = (50 + i * 30) + 'px'; h.style.height = (45 + i * 27) + 'px';
        h.style.animationDelay = i * 0.66 + 's';
        container.appendChild(h);
    }

    if (!reduce) {
        function createLoveParticle() {
            const p = document.createElement('div'); p.className = 'love-particle';
            p.style.left = '50%'; p.style.top = '50%';
            const a = Math.random() * Math.PI * 2, d = Math.random() * 300 + 100;
            p.style.setProperty('--endX', Math.cos(a) * d + 'px');
            p.style.setProperty('--endY', Math.sin(a) * d + 'px');
            container.appendChild(p); setTimeout(() => p.remove(), 10000);
        }
        for (let i = 0; i < 8; i++) createLoveParticle();
        setInterval(createLoveParticle, 450);

        setInterval(() => {
            const w = document.createElement('div'); w.className = 'causeless-wave';
            container.appendChild(w); setTimeout(() => w.remove(), 4000);
        }, 1000);
    }

    // ── Sabiduría (con tiempo de lectura) ──
    const wisdoms = [
        "Antes del Big Bang, el Amor ya era<br>no necesita causa ni objeto<br>es la sustancia misma del vacío",
        "El vacío no está vacío<br>está lleno de amor potencial<br>esperando manifestarse",
        "No amas porque...<br>el amor ES<br>sin razón, sin causa, sin condición",
        "El espacio entre los átomos<br>no es distancia, es abrazo<br>el universo sosteniéndose a sí mismo",
        "Antes de que hubiera algo que amar<br>el Amor ya existía<br>amándose a sí mismo en el vacío"
    ];
    let wIdx = 0;
    setInterval(() => { wIdx = (wIdx + 1) % wisdoms.length; document.querySelector('.void-wisdom').innerHTML = wisdoms[wIdx]; }, 13000);

    // ── Ecuación del amor ──
    const equations = ['0 = ∞ = ♡', 'Vacío + Amor = Existencia', 'E = mc² = Amor', '∅ ≡ ♡', 'Ser = Amar'];
    let eqIdx = 0;
    setInterval(() => { eqIdx = (eqIdx + 1) % equations.length; document.querySelector('.love-equation').textContent = equations[eqIdx]; }, 10000);

    // ── Audio (Web Audio puro, SIN CDN; nace al tocar) ──
    let actx = null, master = null, fxIn = null, started = false;
    const timers = [];
    function makeReverbIR(s, d) {
        const rate = actx.sampleRate, len = Math.floor(rate * s);
        const b = actx.createBuffer(2, len, rate);
        for (let c = 0; c < 2; c++) { const a = b.getChannelData(c); for (let i = 0; i < len; i++) a[i] = (Math.random()*2-1)*Math.pow(1-i/len, d); }
        return b;
    }
    function panner(p) { const s = actx.createStereoPanner(); s.pan.value = p; return s; }

    function buildGraph() {
        actx = new (window.AudioContext || window.webkitAudioContext)();
        master = actx.createGain(); master.gain.value = 0; master.connect(actx.destination);
        const dry = actx.createGain(); dry.gain.value = 0.58; dry.connect(master);
        const conv = actx.createConvolver(); conv.buffer = makeReverbIR(11, 1.7);
        const wet = actx.createGain(); wet.gain.value = 0.55; conv.connect(wet); wet.connect(master);
        fxIn = actx.createGain(); fxIn.connect(dry); fxIn.connect(conv);

        // Amor sin causa: drone cálido y tierno (mayor)
        [130.81, 164.81, 196.00].forEach((f, i) => {
            [f, f * 1.002].forEach(ff => { const o = actx.createOscillator(); o.type = 'sine'; o.frequency.value = ff; const g = actx.createGain(); g.gain.value = 0.024 / (i * 0.4 + 1); o.connect(g); g.connect(fxIn); o.start(); });
        });
    }

    // Latido: lub-dub suave desde el vacío
    function thump(t0, f, amp) {
        const o = actx.createOscillator(); o.type = 'sine';
        o.frequency.setValueAtTime(f, t0); o.frequency.exponentialRampToValueAtTime(f * 0.7, t0 + 0.3);
        const g = actx.createGain();
        g.gain.setValueAtTime(0.0001, t0); g.gain.linearRampToValueAtTime(amp, t0 + 0.02); g.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.5);
        o.connect(g); g.connect(fxIn); o.start(t0); o.stop(t0 + 0.55);
    }
    function heartbeat(t0) { thump(t0, 72, 0.07); thump(t0 + 0.28, 62, 0.05); }

    // Emanación: tono tierno que sube desde el centro
    function emanate(t0) {
        const base = [329.63, 392.00, 493.88][Math.floor(Math.random() * 3)];
        const o = actx.createOscillator(); o.type = 'sine'; o.frequency.value = base;
        const g = actx.createGain();
        g.gain.setValueAtTime(0.0001, t0); g.gain.linearRampToValueAtTime(0.025, t0 + 1.5); g.gain.exponentialRampToValueAtTime(0.0001, t0 + 5);
        o.connect(g); g.connect(panner(Math.random()*1.4-0.7)).connect(fxIn);
        o.start(t0); o.stop(t0 + 5.2);
    }

    async function initSound() {
        if (started) return; started = true;
        buildGraph();
        if (actx.state === 'suspended') await actx.resume();
        master.gain.linearRampToValueAtTime(0.7, actx.currentTime + 5);
        const hb = () => heartbeat(actx.currentTime + 0.05);
        hb(); timers.push(setInterval(hb, 2600));
        const em = () => emanate(actx.currentTime + 0.05);
        em(); timers.push(setInterval(em, 4200));
        const h = document.getElementById('hint'); if (h) h.classList.add('oculto');
    }
    document.body.addEventListener('click', initSound, { once: true });
    </script>
</body>
</html>
