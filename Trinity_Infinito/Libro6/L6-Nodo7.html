<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>El Amor Que No Necesita Amar</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
        background: #000;
        color: #fff;
        font-family: 'Georgia', serif;
        overflow: hidden;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        cursor: none;
    }

    .unconditional-container { position: relative; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }

    .pure-being {
        position: absolute; width: 250px; height: 250px;
        background: radial-gradient(circle, rgba(255,255,255,0.9) 0%, rgba(255,255,255,0.5) 20%, rgba(255,105,180,0.3) 50%, transparent 100%);
        border-radius: 50%;
        animation: beingPulse 8s infinite ease-in-out;
    }
    @keyframes beingPulse {
        0%, 100% { transform: scale(1); opacity: 0.9; }
        25%      { transform: scale(1.2); opacity: 1; }
        50%      { transform: scale(0.8); opacity: 0.85; }
        75%      { transform: scale(1.1); opacity: 0.95; }
    }

    .needless-love {
        position: absolute; width: 400px; height: 400px;
        border: 2px solid rgba(255,105,180,0.2); border-radius: 50%;
        animation: needlessExpand 12s infinite ease-in-out;
    }
    @keyframes needlessExpand {
        0%, 100% { transform: scale(0); opacity: 1; }
        50%      { transform: scale(2); opacity: 0; }
    }

    .self-sufficient {
        position: absolute; width: 100px; height: 100px;
        background: conic-gradient(from 0deg, rgba(255,105,180,0.5), rgba(255,255,255,0.5), rgba(255,105,180,0.5), rgba(255,255,255,0.5), rgba(255,105,180,0.5));
        border-radius: 50%;
        animation: selfComplete 16s infinite linear;
    }
    @keyframes selfComplete { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    .causeless-particle {
        position: absolute; width: 2px; height: 2px; background: rgba(255,255,255,0.9); border-radius: 50%;
        --x1:0px; --y1:0px; --x2:0px; --y2:0px; --x3:0px; --y3:0px; --x4:0px; --y4:0px;
        animation: causelessFloat 20s infinite ease-in-out;
    }
    @keyframes causelessFloat {
        0%   { transform: translate(0,0) scale(0); opacity: 0; }
        20%  { transform: translate(var(--x1), var(--y1)) scale(1); opacity: 1; }
        40%  { transform: translate(var(--x2), var(--y2)) scale(2); opacity: 0.5; }
        60%  { transform: translate(var(--x3), var(--y3)) scale(1.5); opacity: 0.8; }
        80%  { transform: translate(var(--x4), var(--y4)) scale(1); opacity: 1; }
        100% { transform: translate(0,0) scale(0); opacity: 0; }
    }

    .sufi-wisdom {
        position: fixed; top: 9%; left: 50%; transform: translateX(-50%);
        text-align: center; font-size: 1.35em; font-style: italic;
        color: rgba(255,215,120,0.9); text-shadow: 0 0 20px rgba(255,200,80,0.5);
        width: 88%; max-width: 600px; z-index: 30;
        animation: sufiGlow 13s infinite ease-in-out;
    }
    @keyframes sufiGlow {
        0% { opacity: 0; } 13% { opacity: 0.92; } 82% { opacity: 0.92; } 93% { opacity: 0; } 100% { opacity: 0; }
    }

    .final-wisdom {
        position: fixed; bottom: 8%; left: 50%; transform: translateX(-50%);
        text-align: center; font-size: 1.1em; line-height: 1.9;
        color: rgba(255,105,180,0.9); text-shadow: 0 0 30px rgba(255,105,180,0.5);
        width: 90%; max-width: 660px; z-index: 100;
        animation: finalPulse 13s infinite ease-in-out;
    }
    @keyframes finalPulse {
        0% { opacity: 0; } 12% { opacity: 0.92; } 80% { opacity: 0.92; } 92% { opacity: 0; } 100% { opacity: 0; }
    }

    canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0.7; }

    .hint {
        position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
        font-size: 11px; letter-spacing: 4px; color: rgba(255,255,255,0.3);
        animation: hint-breathe 4s ease-in-out infinite; transition: opacity 1.5s ease; pointer-events: none; z-index: 60;
    }
    .hint.oculto { opacity: 0; }
    @keyframes hint-breathe { 0%,100% { opacity: 0.16; } 50% { opacity: 0.4; } }
    .infinito {
        position: fixed; bottom: 24px; right: 28px;
        color: rgba(255,105,180,0.45); text-decoration: none; font-size: 24px;
        cursor: pointer; transition: color 0.6s ease; z-index: 60;
    }
    .infinito:hover { color: rgba(255,105,180,0.95); }

    @media (prefers-reduced-motion: reduce) {
        .pure-being { animation: none; opacity: 0.9; }
        .needless-love { animation: none; opacity: 0; }
        .self-sufficient { animation: none; }
        .causeless-particle { animation: none; opacity: 0; }
        .sufi-wisdom { animation: none; opacity: 0.92; }
        .final-wisdom { animation: none; opacity: 0.92; }
    }
</style>
</head>
<body>
    <canvas id="unconditionalCanvas"></canvas>

    <div class="sufi-wisdom">"El Amor ES — no necesita objeto"</div>

    <div class="unconditional-container">
        <div class="pure-being"></div>
    </div>

    <div class="final-wisdom">
        El sol no elige a quién iluminar<br>
        el amor no elige a quién amar<br>
        simplemente ES
    </div>

    <div class="hint" id="hint">( tocá: el amor resuena )</div>
    <a class="infinito" href="../Libro7/L7-Nodo1.html" title="Siguiente libro">∞</a>

    <script>
    const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    const container = document.querySelector('.unconditional-container');

    // ── Canvas: amor radiando sin dirección ──
    const canvas = document.getElementById('unconditionalCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    const cx = canvas.width / 2, cy = canvas.height / 2;
    function drawUnconditionalField() {
        ctx.fillStyle = 'rgba(0,0,0,0.02)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
        const time = Date.now() * 0.0005;
        for (let i = 0; i < 360; i += 15) {
            const a = (i * Math.PI / 180) + time;
            const len = 200 + Math.sin(time * 2 + i * 0.1) * 100;
            const g = ctx.createLinearGradient(cx, cy, cx + Math.cos(a)*len, cy + Math.sin(a)*len);
            g.addColorStop(0, 'rgba(255,255,255,0.5)'); g.addColorStop(0.5, 'rgba(255,105,180,0.3)'); g.addColorStop(1, 'rgba(255,105,180,0)');
            ctx.strokeStyle = g; ctx.lineWidth = 1; ctx.beginPath(); ctx.moveTo(cx, cy); ctx.lineTo(cx + Math.cos(a)*len, cy + Math.sin(a)*len); ctx.stroke();
        }
        const ps = 20 + Math.sin(time * 3) * 10;
        ctx.fillStyle = 'rgba(255,255,255,0.8)'; ctx.beginPath(); ctx.arc(cx, cy, ps, 0, Math.PI*2); ctx.fill();
        if (!reduce) requestAnimationFrame(drawUnconditionalField);
    }
    drawUnconditionalField();

    // ── Esferas autosuficientes ──
    for (let i = 0; i < 6; i++) {
        const s = document.createElement('div'); s.className = 'self-sufficient';
        const a = (i / 6) * Math.PI * 2;
        s.style.left = `${window.innerWidth/2 + Math.cos(a)*180 - 50}px`;
        s.style.top = `${window.innerHeight/2 + Math.sin(a)*180 - 50}px`;
        s.style.animationDelay = i * 2.5 + 's';
        container.appendChild(s);
    }

    // ── Partículas sin causa ──
    for (let i = 0; i < 30; i++) {
        const p = document.createElement('div'); p.className = 'causeless-particle';
        p.style.left = '50%'; p.style.top = '50%';
        p.style.setProperty('--x1', (Math.random()-0.5)*300 + 'px'); p.style.setProperty('--y1', (Math.random()-0.5)*300 + 'px');
        p.style.setProperty('--x2', (Math.random()-0.5)*400 + 'px'); p.style.setProperty('--y2', (Math.random()-0.5)*400 + 'px');
        p.style.setProperty('--x3', (Math.random()-0.5)*350 + 'px'); p.style.setProperty('--y3', (Math.random()-0.5)*350 + 'px');
        p.style.setProperty('--x4', (Math.random()-0.5)*300 + 'px'); p.style.setProperty('--y4', (Math.random()-0.5)*300 + 'px');
        p.style.animationDelay = Math.random()*20 + 's';
        container.appendChild(p);
    }

    // ── Capas de ser puro ──
    for (let i = 0; i < 3; i++) {
        const b = document.createElement('div'); b.className = 'pure-being';
        b.style.width = (200 + i*100) + 'px'; b.style.height = (200 + i*100) + 'px';
        b.style.animationDelay = i*2.66 + 's';
        container.appendChild(b);
    }

    if (!reduce) {
        setInterval(() => {
            const c = document.createElement('div'); c.className = 'needless-love';
            container.appendChild(c); setTimeout(() => c.remove(), 12000);
        }, 2000);
    }

    // ── Sabiduría sufí (con tiempo de lectura) ──
    const sufi = [
        '"El Amor ES — no necesita objeto"',
        '"Lo divino no ama — ES amor"',
        '"El océano no necesita las olas"',
        '"La luz no busca qué iluminar"',
        '"El amor completo en sí mismo"'
    ];
    let sIdx = 0;
    setInterval(() => { sIdx = (sIdx + 1) % sufi.length; document.querySelector('.sufi-wisdom').textContent = sufi[sIdx]; }, 13000);

    // ── Sabiduría final (con tiempo de lectura) ──
    const finales = [
        "El sol no elige a quién iluminar<br>el amor no elige a quién amar<br>simplemente ES",
        "No amás porque...<br>no amás para...<br>el amor ES, sin causa ni propósito",
        "El amor que necesita razón no es amor<br>es negociación<br>el verdadero amor simplemente ES",
        "Como el espacio que todo lo abraza<br>sin brazos, sin esfuerzo<br>el amor sostiene toda la existencia",
        "Al final del camino descubrís:<br>no necesitabas aprender a amar<br>siempre fuiste amor"
    ];
    let fIdx = 0;
    setInterval(() => { fIdx = (fIdx + 1) % finales.length; document.querySelector('.final-wisdom').innerHTML = finales[fIdx]; }, 13000);

    // ── Audio (Web Audio puro, SIN CDN; nace al tocar) ──
    let actx = null, master = null, fxIn = null, started = false;
    const timers = [];
    function makeReverbIR(s, d) {
        const rate = actx.sampleRate, len = Math.floor(rate * s);
        const b = actx.createBuffer(2, len, rate);
        for (let c = 0; c < 2; c++) { const a = b.getChannelData(c); for (let i = 0; i < len; i++) a[i] = (Math.random()*2-1)*Math.pow(1-i/len, d); }
        return b;
    }
    function panner(p) { const s = actx.createStereoPanner(); s.pan.value = p; return s; }

    function buildGraph() {
        actx = new (window.AudioContext || window.webkitAudioContext)();
        master = actx.createGain(); master.gain.value = 0; master.connect(actx.destination);
        const dry = actx.createGain(); dry.gain.value = 0.55; dry.connect(master);
        const conv = actx.createConvolver(); conv.buffer = makeReverbIR(13, 1.6);
        const wet = actx.createGain(); wet.gain.value = 0.62; conv.connect(wet); wet.connect(master);
        fxIn = actx.createGain(); fxIn.connect(dry); fxIn.connect(conv);

        // Acorde radiante, completo, que simplemente ES (mayor, ancho, respirando apenas)
        const breath = actx.createGain(); breath.gain.value = 0.85; breath.connect(fxIn);
        const blfo = actx.createOscillator(); blfo.type = 'sine'; blfo.frequency.value = 0.04;
        const bdep = actx.createGain(); bdep.gain.value = 0.15; blfo.connect(bdep); bdep.connect(breath.gain); blfo.start();
        [[130.81, 0.038], [164.81, 0.03], [196.00, 0.032], [261.63, 0.028], [329.63, 0.014], [392.00, 0.012]].forEach(([f, amp], i) => {
            const pan = i % 2 === 0 ? -0.45 : 0.45;
            [f, f * 1.002].forEach(ff => {
                const o = actx.createOscillator(); o.type = 'sine'; o.frequency.value = ff;
                const g = actx.createGain(); g.gain.value = amp / 2;
                o.connect(g); g.connect(panner(pan)).connect(breath); o.start();
            });
        });
    }

    // Sobretono sin causa: florece y gira lento, sin dirección
    function radiate(t0) {
        const f = [523.25, 659.25, 784.00][Math.floor(Math.random() * 3)];
        const o = actx.createOscillator(); o.type = 'sine'; o.frequency.value = f;
        const g = actx.createGain();
        g.gain.setValueAtTime(0.0001, t0); g.gain.linearRampToValueAtTime(0.016, t0 + 2.5); g.gain.exponentialRampToValueAtTime(0.0001, t0 + 8);
        const pan = actx.createStereoPanner();
        const plfo = actx.createOscillator(); plfo.type = 'sine'; plfo.frequency.value = 0.06; plfo.connect(pan.pan); plfo.start(t0);
        o.connect(g); g.connect(pan); pan.connect(fxIn);
        o.start(t0); o.stop(t0 + 8.2); plfo.stop(t0 + 8.2);
    }

    async function initSound() {
        if (started) return; started = true;
        buildGraph();
        if (actx.state === 'suspended') await actx.resume();
        master.gain.linearRampToValueAtTime(0.7, actx.currentTime + 6);
        const r = () => radiate(actx.currentTime + 0.05);
        r(); timers.push(setInterval(r, 6000));
        const h = document.getElementById('hint'); if (h) h.classList.add('oculto');
    }
    document.body.addEventListener('click', initSound, { once: true });
    </script>
</body>
</html>
