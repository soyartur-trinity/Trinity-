<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>El Abrazo Sin Brazos</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
        background: #000;
        color: #fff;
        font-family: 'Georgia', serif;
        overflow: hidden;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        cursor: none;
    }

    .embrace-container { position: relative; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }

    .infinite-embrace {
        position: absolute; width: 400px; height: 400px; border-radius: 50%;
        background: radial-gradient(circle at center, transparent 30%, rgba(255,182,193,0.1) 40%, rgba(255,182,193,0.2) 50%, rgba(255,182,193,0.1) 60%, transparent 70%);
        animation: embracePulse 8s infinite ease-in-out;
    }
    @keyframes embracePulse {
        0%, 100% { transform: scale(1) rotate(0deg); opacity: 0.5; }
        25%      { transform: scale(1.2) rotate(90deg); opacity: 0.8; }
        50%      { transform: scale(0.8) rotate(180deg); opacity: 1; }
        75%      { transform: scale(1.1) rotate(270deg); opacity: 0.7; }
    }

    .space-embrace {
        position: absolute; width: 2px; height: 2px; background: rgba(255,255,255,0.9); border-radius: 50%;
        --x1:0px; --y1:0px; --x2:0px; --y2:0px; --x3:0px; --y3:0px;
        animation: spaceHug 10s infinite ease-in-out;
    }
    @keyframes spaceHug {
        0%   { transform: translate(0,0) scale(0); opacity: 0; }
        25%  { transform: translate(var(--x1), var(--y1)) scale(1); opacity: 1; }
        50%  { transform: translate(var(--x2), var(--y2)) scale(2); opacity: 0.7; }
        75%  { transform: translate(var(--x3), var(--y3)) scale(1); opacity: 1; }
        100% { transform: translate(0,0) scale(0); opacity: 0; }
    }

    .formless-arms {
        position: absolute; width: 300px; height: 300px; top: 50%; left: 50%;
        border-radius: 50%;
        background: conic-gradient(from 0deg, transparent, rgba(255,182,193,0.3), transparent, rgba(255,182,193,0.3), transparent);
        transform: translate(-50%, -50%);
        animation: armsRotate 16s infinite linear;
    }
    @keyframes armsRotate {
        from { transform: translate(-50%, -50%) rotate(0deg); }
        to   { transform: translate(-50%, -50%) rotate(360deg); }
    }

    .unity-sphere {
        position: absolute; width: 100px; height: 100px; top: 50%; left: 50%;
        background: radial-gradient(circle, rgba(255,255,255,0.9) 0%, rgba(255,182,193,0.5) 40%, transparent 70%);
        border-radius: 50%;
        box-shadow: 0 0 60px rgba(255,182,193,0.5);
        transform: translate(-50%, -50%);
        animation: unityBreathe 5s infinite ease-in-out;
    }
    @keyframes unityBreathe {
        0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.8; }
        50%      { transform: translate(-50%, -50%) scale(1.3); opacity: 1; }
    }

    .embrace-field {
        position: absolute; width: 100%; height: 100%;
        background: repeating-radial-gradient(circle at center, transparent 0px, transparent 40px, rgba(255,182,193,0.03) 40px, rgba(255,182,193,0.03) 41px);
        animation: fieldExpand 14s infinite linear;
    }
    @keyframes fieldExpand { from { transform: scale(1); } to { transform: scale(2); } }

    .rumi-verse {
        position: fixed; top: 9%; left: 50%; transform: translateX(-50%);
        text-align: center; font-size: 1.25em; font-style: italic;
        color: rgba(255,182,193,0.9); text-shadow: 0 0 20px rgba(255,182,193,0.5);
        width: 88%; max-width: 620px; z-index: 30;
        animation: verseFade 12s infinite ease-in-out;
    }
    @keyframes verseFade {
        0% { opacity: 0; } 14% { opacity: 0.9; } 82% { opacity: 0.9; } 94% { opacity: 0; } 100% { opacity: 0; }
    }

    .embrace-wisdom {
        position: fixed; bottom: 10%; left: 50%; transform: translateX(-50%);
        text-align: center; font-size: 1.05em; line-height: 1.9;
        color: rgba(255,255,255,0.92); text-shadow: 0 0 20px rgba(255,255,255,0.4);
        width: 88%; max-width: 640px; z-index: 100;
        animation: wisdomFloat 13s infinite ease-in-out;
    }
    @keyframes wisdomFloat {
        0% { opacity: 0; } 12% { opacity: 0.92; } 80% { opacity: 0.92; } 92% { opacity: 0; } 100% { opacity: 0; }
    }

    canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0.4; }

    .hint {
        position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
        font-size: 11px; letter-spacing: 4px; color: rgba(255,255,255,0.3);
        animation: hint-breathe 4s ease-in-out infinite; transition: opacity 1.5s ease; pointer-events: none; z-index: 60;
    }
    .hint.oculto { opacity: 0; }
    @keyframes hint-breathe { 0%,100% { opacity: 0.16; } 50% { opacity: 0.4; } }
    .infinito {
        position: fixed; bottom: 24px; right: 28px;
        color: rgba(255,182,193,0.45); text-decoration: none; font-size: 24px;
        cursor: pointer; transition: color 0.6s ease; z-index: 60;
    }
    .infinito:hover { color: rgba(255,182,193,0.95); }

    @media (prefers-reduced-motion: reduce) {
        .infinite-embrace { animation: none; opacity: 0.6; }
        .space-embrace { animation: none; opacity: 0; }
        .formless-arms { animation: none; }
        .unity-sphere { animation: none; opacity: 0.9; }
        .embrace-field { animation: none; }
        .rumi-verse { animation: none; opacity: 0.9; }
        .embrace-wisdom { animation: none; opacity: 0.92; }
    }
</style>
</head>
<body>
    <canvas id="embraceCanvas"></canvas>

    <div class="rumi-verse">"En tu luz aprendo a amar"</div>

    <div class="embrace-container">
        <div class="embrace-field"></div>
        <div class="infinite-embrace"></div>
        <div class="formless-arms"></div>
        <div class="unity-sphere"></div>
    </div>

    <div class="embrace-wisdom">
        El espacio entre nosotros no es distancia<br>
        es el abrazo mismo<br>
        el universo sosteniéndose en amor
    </div>

    <div class="hint" id="hint">( tocá: el abrazo resuena )</div>
    <a class="infinito" href="L6-Nodo5.html" title="Siguiente portal">∞</a>

    <script>
    const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    const container = document.querySelector('.embrace-container');

    // ── Canvas: curvas del abrazo ──
    const canvas = document.getElementById('embraceCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    const cx = canvas.width / 2, cy = canvas.height / 2;
    function drawEmbraceCurves() {
        ctx.fillStyle = 'rgba(0,0,0,0.02)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
        const time = Date.now() * 0.0005;
        for (let i = 0; i < 5; i++) {
            ctx.strokeStyle = `rgba(255,182,193,${0.2 - i*0.03})`; ctx.lineWidth = 2 - i*0.2; ctx.beginPath();
            for (let angle = 0; angle < Math.PI*2; angle += 0.01) {
                const r = 100 + 50 * Math.sin(angle*3 + time + i);
                const x = cx + r * Math.cos(angle + time*0.5), y = cy + r * Math.sin(angle + time*0.5);
                angle === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
            }
            ctx.closePath(); ctx.stroke();
        }
        if (!reduce) requestAnimationFrame(drawEmbraceCurves);
    }
    drawEmbraceCurves();

    // ── Partículas del abrazo espacial ──
    for (let i = 0; i < 50; i++) {
        const p = document.createElement('div'); p.className = 'space-embrace';
        p.style.left = '50%'; p.style.top = '50%';
        const a1 = Math.random()*Math.PI*2, a2 = Math.random()*Math.PI*2, a3 = Math.random()*Math.PI*2, r = 200;
        p.style.setProperty('--x1', Math.cos(a1)*r*0.5 + 'px'); p.style.setProperty('--y1', Math.sin(a1)*r*0.5 + 'px');
        p.style.setProperty('--x2', Math.cos(a2)*r + 'px'); p.style.setProperty('--y2', Math.sin(a2)*r + 'px');
        p.style.setProperty('--x3', Math.cos(a3)*r*0.7 + 'px'); p.style.setProperty('--y3', Math.sin(a3)*r*0.7 + 'px');
        p.style.animationDelay = Math.random()*10 + 's';
        container.appendChild(p);
    }

    // ── Esferas de abrazo infinito ──
    for (let i = 0; i < 3; i++) {
        const e = document.createElement('div'); e.className = 'infinite-embrace';
        e.style.width = (300 + i*100) + 'px'; e.style.height = (300 + i*100) + 'px';
        e.style.animationDelay = i*2.66 + 's';
        container.appendChild(e);
    }

    // ── Versos de Rumi ──
    const verses = [
        '"En tu luz aprendo a amar"',
        '"El espacio vacío está lleno de amor"',
        '"Cierra los ojos y verás claramente"',
        '"No busques el amor, remueve las barreras"',
        '"El amor es el puente entre vos y todo"'
    ];
    let vIdx = 0;
    setInterval(() => { vIdx = (vIdx + 1) % verses.length; document.querySelector('.rumi-verse').textContent = verses[vIdx]; }, 12000);

    // ── Sabiduría (con tiempo de lectura) ──
    const wisdoms = [
        "El espacio entre nosotros no es distancia<br>es el abrazo mismo<br>el universo sosteniéndose en amor",
        "No necesitas brazos para abrazar<br>el vacío abraza todo<br>sin tocar, sin soltar",
        "Cada átomo abraza a cada átomo<br>a través del espacio vacío<br>el amor es el medio invisible",
        "La distancia es una ilusión<br>siempre estamos abrazados<br>en el campo unificado del amor",
        "El abrazo más profundo<br>es el que no tiene forma<br>el espacio amando a través de nosotros"
    ];
    let wIdx = 0;
    setInterval(() => { wIdx = (wIdx + 1) % wisdoms.length; document.querySelector('.embrace-wisdom').innerHTML = wisdoms[wIdx]; }, 13000);

    // ── Audio (Web Audio puro, SIN CDN; nace al tocar) ──
    let actx = null, master = null, fxIn = null, noiseBuf = null, started = false;
    const timers = [];
    function makeReverbIR(s, d) {
        const rate = actx.sampleRate, len = Math.floor(rate * s);
        const b = actx.createBuffer(2, len, rate);
        for (let c = 0; c < 2; c++) { const a = b.getChannelData(c); for (let i = 0; i < len; i++) a[i] = (Math.random()*2-1)*Math.pow(1-i/len, d); }
        return b;
    }
    function makeNoise() {
        const len = actx.sampleRate * 2, b = actx.createBuffer(1, len, actx.sampleRate), d = b.getChannelData(0);
        for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
        return b;
    }
    function panner(p) { const s = actx.createStereoPanner(); s.pan.value = p; return s; }

    function buildGraph() {
        actx = new (window.AudioContext || window.webkitAudioContext)();
        master = actx.createGain(); master.gain.value = 0; master.connect(actx.destination);
        const dry = actx.createGain(); dry.gain.value = 0.55; dry.connect(master);
        const conv = actx.createConvolver(); conv.buffer = makeReverbIR(13, 1.6);
        const wet = actx.createGain(); wet.gain.value = 0.62; conv.connect(wet); wet.connect(master);
        fxIn = actx.createGain(); fxIn.connect(dry); fxIn.connect(conv);
        noiseBuf = makeNoise();

        // Pad que abraza: ancho (L/R) y respirando muy lento
        const swell = actx.createGain(); swell.gain.value = 0.6; swell.connect(fxIn);
        const slfo = actx.createOscillator(); slfo.type = 'sine'; slfo.frequency.value = 0.05;
        const sdep = actx.createGain(); sdep.gain.value = 0.35; slfo.connect(sdep); sdep.connect(swell.gain); slfo.start();
        [130.81, 196.00, 261.63].forEach((f, i) => {
            [[f, -0.55], [f * 1.003, 0.55]].forEach(([ff, pan]) => {
                const o = actx.createOscillator(); o.type = 'sine'; o.frequency.value = ff;
                const g = actx.createGain(); g.gain.value = 0.03 / (i * 0.4 + 1);
                o.connect(g); g.connect(panner(pan)).connect(swell); o.start();
            });
        });
    }

    // Ney: aliento tierno con vibrato y un susurro de aire
    function playNey(t0) {
        const f = [261.63, 293.66, 349.23, 392.00][Math.floor(Math.random() * 4)];
        const o = actx.createOscillator(); o.type = 'sine'; o.frequency.value = f;
        const vib = actx.createOscillator(); vib.type = 'sine'; vib.frequency.value = 5.5;
        const vibD = actx.createGain(); vibD.gain.value = f * 0.006; vib.connect(vibD); vibD.connect(o.frequency); vib.start(t0);
        // susurro de aire
        const air = actx.createBufferSource(); air.buffer = noiseBuf; air.loop = true;
        const bp = actx.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = f * 2; bp.Q.value = 4;
        const ag = actx.createGain(); ag.gain.value = 0.012; air.connect(bp); bp.connect(ag);
        const sp = panner(Math.random()*0.8-0.4);
        const g = actx.createGain();
        g.gain.setValueAtTime(0.0001, t0); g.gain.linearRampToValueAtTime(0.03, t0 + 1.8); g.gain.exponentialRampToValueAtTime(0.0001, t0 + 6);
        o.connect(g); ag.connect(g); g.connect(sp).connect(fxIn);
        o.start(t0); air.start(t0); o.stop(t0 + 6.2); air.stop(t0 + 6.2); vib.stop(t0 + 6.2);
    }

    async function initSound() {
        if (started) return; started = true;
        buildGraph();
        if (actx.state === 'suspended') await actx.resume();
        master.gain.linearRampToValueAtTime(0.7, actx.currentTime + 6);
        const n = () => playNey(actx.currentTime + 0.05);
        n(); timers.push(setInterval(n, 7000));
        const h = document.getElementById('hint'); if (h) h.classList.add('oculto');
    }
    document.body.addEventListener('click', initSound, { once: true });
    </script>
</body>
</html>
