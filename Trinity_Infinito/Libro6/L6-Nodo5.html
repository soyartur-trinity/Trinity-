<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amor Antes del Tiempo</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
        background: linear-gradient(to bottom, #000033, #000);
        color: #fff;
        font-family: 'Georgia', serif;
        overflow: hidden;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        cursor: none;
    }

    .pretemporal-container { position: relative; width: 100%; height: 100%; perspective: 1500px; }

    .timeless-love {
        position: absolute; width: 300px; height: 300px; top: 50%; left: 50%;
        background: radial-gradient(circle, rgba(219,112,147,0.8) 0%, rgba(219,112,147,0.4) 30%, transparent 70%);
        border-radius: 50%;
        transform: translate(-50%, -50%);
        animation: timelessPulse 7s infinite ease-in-out;
    }
    @keyframes timelessPulse {
        0%, 100% { transform: translate(-50%, -50%) scale(1) rotateX(0deg); opacity: 0.7; }
        50%      { transform: translate(-50%, -50%) scale(1.5) rotateX(180deg); opacity: 1; }
    }

    .before-time {
        position: absolute; width: 100%; height: 2px; top: 50%;
        background: linear-gradient(to right, transparent, rgba(219,112,147,0.8), rgba(255,255,255,1), rgba(219,112,147,0.8), transparent);
        animation: beforeFlow 10s infinite linear;
    }
    @keyframes beforeFlow {
        from { transform: translateX(-100%); }
        to   { transform: translateX(100%); }
    }

    .eternal-moment {
        position: absolute; width: 50px; height: 50px; border-radius: 50%;
        background: radial-gradient(circle, white 0%, rgba(219,112,147,0.5) 50%, transparent 100%);
        --x1:0px; --y1:0px; --x2:0px; --y2:0px; --x3:0px; --y3:0px;
        animation: momentFloat 15s infinite ease-in-out;
    }
    @keyframes momentFloat {
        0%   { transform: translate(0,0) scale(0); opacity: 0; }
        25%  { transform: translate(var(--x1), var(--y1)) scale(1); opacity: 1; }
        50%  { transform: translate(var(--x2), var(--y2)) scale(1.5); opacity: 0.7; }
        75%  { transform: translate(var(--x3), var(--y3)) scale(1); opacity: 1; }
        100% { transform: translate(0,0) scale(0); opacity: 0; }
    }

    .primordial-heart {
        position: absolute; width: 200px; height: 200px; top: 50%; left: 50%;
        transform: translate(-50%, -50%) rotateZ(45deg);
        animation: primordialBeat 4s infinite ease-in-out;
    }
    .primordial-heart::before, .primordial-heart::after {
        content: ''; position: absolute; width: 100px; height: 160px;
        background: rgba(219,112,147,0.2); border-radius: 100px 100px 0 0;
        transform: rotate(-45deg); transform-origin: 0 100%;
    }
    .primordial-heart::before { left: 100px; box-shadow: 0 0 50px rgba(219,112,147,0.5); }
    .primordial-heart::after { left: 0; transform: rotate(45deg); transform-origin: 100% 100%; box-shadow: 0 0 50px rgba(219,112,147,0.5); }
    @keyframes primordialBeat {
        0%, 100% { transform: translate(-50%, -50%) rotateZ(45deg) scale(1); opacity: 0.3; }
        50%      { transform: translate(-50%, -50%) rotateZ(45deg) scale(1.2); opacity: 0.8; }
    }

    .genesis-text {
        position: fixed; top: 9%; left: 50%; transform: translateX(-50%);
        text-align: center; font-size: 1.5em; font-style: italic;
        color: rgba(255,215,120,0.9); text-shadow: 0 0 20px rgba(255,200,80,0.5);
        width: 88%; max-width: 600px; z-index: 30;
        animation: genesisFade 13s infinite ease-in-out;
    }
    @keyframes genesisFade {
        0% { opacity: 0; } 13% { opacity: 0.9; } 82% { opacity: 0.9; } 93% { opacity: 0; } 100% { opacity: 0; }
    }

    .pretemporal-wisdom {
        position: fixed; bottom: 10%; left: 50%; transform: translateX(-50%);
        text-align: center; font-size: 1.05em; line-height: 1.9;
        color: rgba(219,112,147,0.9); text-shadow: 0 0 20px rgba(219,112,147,0.5);
        width: 88%; max-width: 640px; z-index: 100;
        animation: wisdomEternal 13s infinite ease-in-out;
    }
    @keyframes wisdomEternal {
        0% { opacity: 0; } 12% { opacity: 0.92; } 80% { opacity: 0.92; } 92% { opacity: 0; } 100% { opacity: 0; }
    }

    canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0.5; }

    .hint {
        position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
        font-size: 11px; letter-spacing: 4px; color: rgba(255,255,255,0.3);
        animation: hint-breathe 4s ease-in-out infinite; transition: opacity 1.5s ease; pointer-events: none; z-index: 60;
    }
    .hint.oculto { opacity: 0; }
    @keyframes hint-breathe { 0%,100% { opacity: 0.16; } 50% { opacity: 0.4; } }
    .infinito {
        position: fixed; bottom: 24px; right: 28px;
        color: rgba(219,112,147,0.45); text-decoration: none; font-size: 24px;
        cursor: pointer; transition: color 0.6s ease; z-index: 60;
    }
    .infinito:hover { color: rgba(219,112,147,0.95); }

    @media (prefers-reduced-motion: reduce) {
        .timeless-love { animation: none; opacity: 0.8; }
        .before-time { animation: none; opacity: 0; }
        .eternal-moment { animation: none; opacity: 0; }
        .primordial-heart { animation: none; opacity: 0.5; }
        .genesis-text { animation: none; opacity: 0.9; }
        .pretemporal-wisdom { animation: none; opacity: 0.92; }
    }
</style>
</head>
<body>
    <canvas id="pretemporalCanvas"></canvas>

    <div class="genesis-text">"En el principio era el Amor"</div>

    <div class="pretemporal-container">
        <div class="primordial-heart"></div>
        <div class="timeless-love"></div>
    </div>

    <div class="pretemporal-wisdom">
        Antes del primer segundo<br>
        antes del espacio mismo<br>
        el Amor ya era todo lo que había
    </div>

    <div class="hint" id="hint">( tocá: lo anterior al tiempo resuena )</div>
    <a class="infinito" href="L6-Nodo6.html" title="Siguiente portal">∞</a>

    <script>
    const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    const container = document.querySelector('.pretemporal-container');

    // ── Canvas: campo de amor antes del tiempo ──
    const canvas = document.getElementById('pretemporalCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    const cx = canvas.width / 2, cy = canvas.height / 2;
    const fieldParts = [];
    for (let i = 0; i < 100; i++) fieldParts.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, phase: Math.random()*Math.PI*2, size: Math.random()*3 + 1 });
    let ftime = 0;
    function animate() {
        ftime += 0.01;
        ctx.fillStyle = 'rgba(0,0,0,0.02)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
        fieldParts.forEach(p => {
            const brightness = Math.sin(ftime + p.phase) * 0.5 + 0.5;
            const dx = cx - p.x, dy = cy - p.y;
            p.x += dx * 0.001; p.y += dy * 0.001;
            const a = Math.atan2(dy, dx) + Math.PI / 2;
            p.x += Math.cos(a) * 2; p.y += Math.sin(a) * 2;
            if (p.x < 0 || p.x > canvas.width || p.y < 0 || p.y > canvas.height) { p.x = Math.random()*canvas.width; p.y = Math.random()*canvas.height; }
            ctx.fillStyle = `rgba(219,112,147,${brightness})`;
            ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill();
        });
        for (let i = 0; i < 3; i++) {
            const radius = (ftime * 50 + i * 100) % 400;
            ctx.strokeStyle = `rgba(219,112,147,${0.3 * (1 - radius/400)})`; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.arc(cx, cy, radius, 0, Math.PI*2); ctx.stroke();
        }
        if (!reduce) requestAnimationFrame(animate);
    }
    animate();

    // ── Flujos antes del tiempo ──
    for (let i = 0; i < 10; i++) {
        const flow = document.createElement('div'); flow.className = 'before-time';
        flow.style.top = (10 + i*8) + '%'; flow.style.animationDelay = i + 's'; flow.style.opacity = 0.5 - i*0.04;
        container.appendChild(flow);
    }

    // ── Momentos eternos ──
    for (let i = 0; i < 20; i++) {
        const m = document.createElement('div'); m.className = 'eternal-moment';
        m.style.left = Math.random()*100 + '%'; m.style.top = Math.random()*100 + '%';
        m.style.setProperty('--x1', (Math.random()-0.5)*200 + 'px'); m.style.setProperty('--y1', (Math.random()-0.5)*200 + 'px');
        m.style.setProperty('--x2', (Math.random()-0.5)*300 + 'px'); m.style.setProperty('--y2', (Math.random()-0.5)*300 + 'px');
        m.style.setProperty('--x3', (Math.random()-0.5)*200 + 'px'); m.style.setProperty('--y3', (Math.random()-0.5)*200 + 'px');
        m.style.animationDelay = Math.random()*15 + 's';
        container.appendChild(m);
    }

    // ── Capas de amor sin tiempo ──
    for (let i = 0; i < 3; i++) {
        const l = document.createElement('div'); l.className = 'timeless-love';
        l.style.width = (200 + i*100) + 'px'; l.style.height = (200 + i*100) + 'px';
        l.style.animationDelay = i*2.33 + 's';
        container.appendChild(l);
    }

    // ── Génesis (con tiempo de lectura) ──
    const genesis = [
        '"En el principio era el Amor"',
        '"Antes del Verbo, el Amor"',
        '"Antes de la Luz, el Amor"',
        '"Antes del Vacío, el Amor"',
        '"El Amor sin principio"'
    ];
    let gIdx = 0;
    setInterval(() => { gIdx = (gIdx + 1) % genesis.length; document.querySelector('.genesis-text').textContent = genesis[gIdx]; }, 13000);

    // ── Sabiduría pretemporal (con tiempo de lectura) ──
    const wisdoms = [
        "Antes del primer segundo<br>antes del espacio mismo<br>el Amor ya era todo lo que había",
        "No hubo un momento en que el amor comenzó<br>el tiempo comenzó en el amor<br>como una ola en el océano",
        "¿Qué había antes del Big Bang?<br>Amor<br>siempre ha sido amor",
        "El amor no nació con el universo<br>el universo nació del amor<br>como hijo de su madre eterna",
        "Antes de que hubiera un 'antes'<br>el Amor ya era<br>sin tiempo, sin causa, sin fin"
    ];
    let wIdx = 0;
    setInterval(() => { wIdx = (wIdx + 1) % wisdoms.length; document.querySelector('.pretemporal-wisdom').innerHTML = wisdoms[wIdx]; }, 13000);

    // ── Audio (Web Audio puro, SIN CDN; nace al tocar) ──
    let actx = null, master = null, fxIn = null, started = false;
    const timers = [];
    function makeReverbIR(s, d) {
        const rate = actx.sampleRate, len = Math.floor(rate * s);
        const b = actx.createBuffer(2, len, rate);
        for (let c = 0; c < 2; c++) { const a = b.getChannelData(c); for (let i = 0; i < len; i++) a[i] = (Math.random()*2-1)*Math.pow(1-i/len, d); }
        return b;
    }
    function panner(p) { const s = actx.createStereoPanner(); s.pan.value = p; return s; }

    function buildGraph() {
        actx = new (window.AudioContext || window.webkitAudioContext)();
        master = actx.createGain(); master.gain.value = 0; master.connect(actx.destination);
        const dry = actx.createGain(); dry.gain.value = 0.52; dry.connect(master);
        const conv = actx.createConvolver(); conv.buffer = makeReverbIR(14, 1.5); // vasto, sin bordes: antes del espacio
        const wet = actx.createGain(); wet.gain.value = 0.66; conv.connect(wet); wet.connect(master);
        fxIn = actx.createGain(); fxIn.connect(dry); fxIn.connect(conv);

        // Drone primordial: SIN pulso (el tiempo no empezó), ancho, a la deriva en swells lentísimos
        const drift = actx.createGain(); drift.gain.value = 0.8; drift.connect(fxIn);
        const dlfo = actx.createOscillator(); dlfo.type = 'sine'; dlfo.frequency.value = 0.035;
        const ddep = actx.createGain(); ddep.gain.value = 0.22; dlfo.connect(ddep); ddep.connect(drift.gain); dlfo.start();
        [[110.00, -0.5], [164.81, 0.5], [220.00, -0.3], [329.63, 0.3]].forEach(([f, pan], i) => {
            [f, f * 1.0025].forEach(ff => {
                const o = actx.createOscillator(); o.type = 'sine'; o.frequency.value = ff;
                const g = actx.createGain(); g.gain.value = 0.028 / (i * 0.35 + 1);
                o.connect(g); g.connect(panner(pan)).connect(drift); o.start();
            });
        });
    }

    // Génesis: un tono que emerge muy lento desde el silencio (lo primero, antes del primer segundo)
    function playGenesis(t0) {
        const f = [82.41, 110.00, 164.81][Math.floor(Math.random() * 3)];
        const o = actx.createOscillator(); o.type = 'sine'; o.frequency.value = f;
        const o2 = actx.createOscillator(); o2.type = 'sine'; o2.frequency.value = f * 1.5;
        const g2 = actx.createGain(); g2.gain.value = 0.4; o2.connect(g2);
        const g = actx.createGain();
        g.gain.setValueAtTime(0.0001, t0);
        g.gain.linearRampToValueAtTime(0.03, t0 + 4);       // emerge lentísimo
        g.gain.exponentialRampToValueAtTime(0.0001, t0 + 11);
        o.connect(g); g2.connect(g); g.connect(panner(Math.random()*1.2-0.6)).connect(fxIn);
        o.start(t0); o2.start(t0); o.stop(t0 + 11.2); o2.stop(t0 + 11.2);
    }

    async function initSound() {
        if (started) return; started = true;
        buildGraph();
        if (actx.state === 'suspended') await actx.resume();
        master.gain.linearRampToValueAtTime(0.7, actx.currentTime + 7);
        const g = () => playGenesis(actx.currentTime + 0.05);
        g(); timers.push(setInterval(g, 9000));
        const h = document.getElementById('hint'); if (h) h.classList.add('oculto');
    }
    document.body.addEventListener('click', initSound, { once: true });
    </script>
</body>
</html>
