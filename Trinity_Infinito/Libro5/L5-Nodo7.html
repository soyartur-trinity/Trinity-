<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La Vida Sin Opuesto</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
        background: radial-gradient(circle at center, #001122, #000);
        color: #fff;
        font-family: 'Georgia', serif;
        overflow: hidden;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        cursor: none;
    }

    .undying-container { position: relative; width: 100%; height: 100%; transform-style: preserve-3d; }

    .life-sphere {
        position: absolute; width: 300px; height: 300px; top: 50%; left: 50%;
        background: radial-gradient(circle, rgba(0,255,150,0.8) 0%, rgba(0,255,150,0.4) 30%, rgba(0,255,150,0.2) 60%, transparent 100%);
        border-radius: 50%;
        transform: translate(-50%, -50%);
        animation: lifePulse 5s infinite ease-in-out;
    }
    @keyframes lifePulse {
        0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.85; }
        50%      { transform: translate(-50%, -50%) scale(1.3); opacity: 1; }
    }

    .beyond-duality {
        position: absolute; width: 400px; height: 400px; top: 50%; left: 50%;
        transform: translate(-50%, -50%);
        animation: beyondRotate 24s infinite linear;
    }
    @keyframes beyondRotate {
        from { transform: translate(-50%, -50%) rotate(0deg); }
        to   { transform: translate(-50%, -50%) rotate(360deg); }
    }

    .unity-symbol {
        position: absolute; width: 100px; height: 100px;
        background: conic-gradient(from 0deg, rgba(255,255,255,0.8), rgba(0,0,0,0.8), rgba(255,255,255,0.8));
        border-radius: 50%;
        animation: unityMerge 8s infinite ease-in-out;
    }
    @keyframes unityMerge {
        0%, 100% { transform: scale(1) rotate(0deg); opacity: 0.85; }
        50%      { transform: scale(1.5) rotate(180deg); opacity: 0.6; }
    }

    .eternal-life {
        position: absolute; width: 2px; height: 200px;
        background: linear-gradient(to top, transparent, rgba(0,255,150,1), transparent);
        transform-origin: center;
        animation: lifeStream 4s infinite ease-in-out;
    }
    @keyframes lifeStream {
        0%   { transform: rotate(var(--rot)) scaleY(0); opacity: 0; }
        50%  { transform: rotate(var(--rot)) scaleY(1); opacity: 1; }
        100% { transform: rotate(var(--rot)) scaleY(0); opacity: 0; }
    }

    .no-opposite {
        position: absolute; font-size: 72px; color: rgba(255,255,255,0.1); font-weight: bold;
        animation: noOpposite 10s infinite ease-in-out;
    }
    @keyframes noOpposite {
        0%, 100% { transform: scale(1) rotate(0deg); opacity: 0.1; }
        50%      { transform: scale(2) rotate(180deg); opacity: 0; }
    }

    .consciousness-field {
        position: absolute; width: 100%; height: 100%;
        background: repeating-radial-gradient(circle at center, transparent 0px, transparent 50px, rgba(0,255,150,0.05) 50px, rgba(0,255,150,0.05) 52px);
        animation: fieldExpand 10s infinite linear;
    }
    @keyframes fieldExpand { from { transform: scale(1); } to { transform: scale(2); } }

    .deathless-wisdom {
        position: fixed; bottom: 8%; left: 50%; transform: translateX(-50%);
        text-align: center; font-size: 1.1em; line-height: 1.9;
        color: rgba(0,255,150,0.9); text-shadow: 0 0 30px rgba(0,255,150,0.5);
        width: 90%; max-width: 660px; z-index: 100;
        animation: wisdomEternal 13s infinite ease-in-out;
    }
    @keyframes wisdomEternal {
        0% { opacity: 0; } 12% { opacity: 0.92; } 80% { opacity: 0.92; } 92% { opacity: 0; } 100% { opacity: 0; }
    }

    canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0.6; }

    .hint {
        position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
        font-size: 11px; letter-spacing: 4px; color: rgba(255,255,255,0.3);
        animation: hint-breathe 4s ease-in-out infinite; transition: opacity 1.5s ease; pointer-events: none; z-index: 60;
    }
    .hint.oculto { opacity: 0; }
    @keyframes hint-breathe { 0%,100% { opacity: 0.16; } 50% { opacity: 0.4; } }
    .infinito {
        position: fixed; bottom: 24px; right: 28px;
        color: rgba(0,255,150,0.4); text-decoration: none; font-size: 24px;
        cursor: pointer; transition: color 0.6s ease; z-index: 60;
    }
    .infinito:hover { color: rgba(0,255,150,0.95); }

    @media (prefers-reduced-motion: reduce) {
        .life-sphere { animation: none; opacity: 0.85; }
        .beyond-duality { animation: none; }
        .unity-symbol { animation: none; opacity: 0.7; }
        .eternal-life { animation: none; opacity: 0; }
        .no-opposite { animation: none; opacity: 0.1; }
        .consciousness-field { animation: none; }
        .deathless-wisdom { animation: none; opacity: 0.92; }
    }
</style>
</head>
<body>
    <canvas id="lifeCanvas"></canvas>

    <div class="undying-container">
        <div class="consciousness-field"></div>
        <div class="beyond-duality"></div>
        <div class="life-sphere"></div>
        <div class="no-opposite">MUERTE</div>
    </div>

    <div class="deathless-wisdom">
        La Vida con V mayúscula no tiene opuesto<br>
        lo que nace y muere son las formas<br>
        la Vida misma es eterna, sin principio ni fin
    </div>

    <div class="hint" id="hint">( tocá: la Vida resuena )</div>
    <a class="infinito" href="../Libro6/L6-Nodo1.html" title="Siguiente libro">∞</a>

    <script>
    const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    const container = document.querySelector('.undying-container');

    // ── Canvas: red de vida (nunca decae) ──
    const canvas = document.getElementById('lifeCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    class LifeParticle {
        constructor() { this.reset(); }
        reset() {
            this.x = Math.random()*canvas.width; this.y = Math.random()*canvas.height;
            this.size = Math.random()*3+1; this.sx = (Math.random()-0.5)*2; this.sy = (Math.random()-0.5)*2;
            this.color = `hsl(${150 + Math.random()*60}, 100%, 55%)`;
        }
        update() {
            this.x += this.sx; this.y += this.sy;
            const dx = canvas.width/2 - this.x, dy = canvas.height/2 - this.y, d = Math.hypot(dx, dy);
            if (d > 100) { this.sx += dx/d*0.05; this.sy += dy/d*0.05; }
            if (this.x < 0 || this.x > canvas.width) this.sx *= -1;
            if (this.y < 0 || this.y > canvas.height) this.sy *= -1;
        }
        draw() {
            ctx.fillStyle = this.color; ctx.globalAlpha = 0.8;
            ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill();
            ctx.strokeStyle = this.color; ctx.globalAlpha = 0.3;
            ctx.beginPath(); ctx.arc(this.x, this.y, this.size*3, 0, Math.PI*2); ctx.stroke();
        }
    }
    const parts = [];
    for (let i = 0; i < 70; i++) parts.push(new LifeParticle());
    function animateLife() {
        ctx.fillStyle = 'rgba(0,0,0,0.05)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.globalAlpha = 1;
        for (let i = 0; i < parts.length; i++) for (let j = i+1; j < parts.length; j++) {
            const d = Math.hypot(parts[i].x - parts[j].x, parts[i].y - parts[j].y);
            if (d < 100) { ctx.strokeStyle = `rgba(0,255,150,${0.2*(1 - d/100)})`; ctx.lineWidth = 1; ctx.beginPath(); ctx.moveTo(parts[i].x, parts[i].y); ctx.lineTo(parts[j].x, parts[j].y); ctx.stroke(); }
        }
        parts.forEach(p => { p.update(); p.draw(); });
        if (!reduce) requestAnimationFrame(animateLife);
    }
    animateLife();

    // ── Símbolos de unidad (la dualidad fundiéndose) ──
    const duality = document.querySelector('.beyond-duality');
    for (let i = 0; i < 4; i++) {
        const sym = document.createElement('div'); sym.className = 'unity-symbol';
        const a = (i / 4) * Math.PI * 2;
        sym.style.left = `${200 + Math.cos(a)*150 - 50}px`;
        sym.style.top = `${200 + Math.sin(a)*150 - 50}px`;
        sym.style.animationDelay = i * 2 + 's';
        duality.appendChild(sym);
    }

    // ── Corrientes de vida eterna ──
    for (let i = 0; i < 20; i++) {
        const s = document.createElement('div'); s.className = 'eternal-life';
        s.style.left = Math.random()*100 + '%'; s.style.top = Math.random()*100 + '%';
        s.style.setProperty('--rot', (Math.random()*360) + 'deg');
        s.style.animationDelay = Math.random()*4 + 's';
        container.appendChild(s);
    }

    // ── Esferas de vida adicionales ──
    for (let i = 0; i < 3; i++) {
        const sph = document.createElement('div'); sph.className = 'life-sphere';
        sph.style.width = (200 + i*100) + 'px'; sph.style.height = (200 + i*100) + 'px';
        sph.style.animationDelay = i*1.66 + 's';
        container.appendChild(sph);
    }

    // ── "MUERTE" que se desplaza y desvanece ──
    const deathText = document.querySelector('.no-opposite');
    deathText.style.left = '50%'; deathText.style.top = '45%';
    if (!reduce) setInterval(() => { deathText.style.left = Math.random()*window.innerWidth + 'px'; deathText.style.top = Math.random()*window.innerHeight + 'px'; }, 5000);

    // ── Campo de conciencia pulsante ──
    if (!reduce) {
        const field = document.querySelector('.consciousness-field');
        setInterval(() => {
            const pulse = document.createElement('div');
            pulse.style.cssText = 'position:absolute;width:100%;height:100%;background:radial-gradient(circle at center, rgba(0,255,150,0.3), transparent);pointer-events:none;';
            pulse.style.animation = 'fieldExpand 3s ease-out';
            field.appendChild(pulse); setTimeout(() => pulse.remove(), 3000);
        }, 2000);
    }

    // ── Sabiduría de la Vida sin opuesto (con tiempo de lectura) ──
    const wisdoms = [
        "La Vida con V mayúscula no tiene opuesto<br>lo que nace y muere son las formas<br>la Vida misma es eterna, sin principio ni fin",
        "La muerte es un concepto<br>la Vida es la realidad<br>los conceptos van y vienen, la realidad ES",
        "No eres algo vivo que puede morir<br>eres la Vida misma<br>expresándose temporalmente como forma",
        "El cuerpo muere, la mente muere<br>pero lo que eres realmente<br>nunca nació, nunca puede morir",
        "Más allá del nacimiento y la muerte<br>está Aquello que observa ambos<br>eso eres vos: la Vida consciente de sí misma"
    ];
    let wIdx = 0;
    setInterval(() => { wIdx = (wIdx + 1) % wisdoms.length; document.querySelector('.deathless-wisdom').innerHTML = wisdoms[wIdx]; }, 13000);

    // ── Audio (Web Audio puro, SIN CDN; nace al tocar) ──
    let actx = null, master = null, fxIn = null, started = false;
    const timers = [];
    function makeReverbIR(s, d) {
        const rate = actx.sampleRate, len = Math.floor(rate * s);
        const b = actx.createBuffer(2, len, rate);
        for (let c = 0; c < 2; c++) { const a = b.getChannelData(c); for (let i = 0; i < len; i++) a[i] = (Math.random()*2-1)*Math.pow(1-i/len, d); }
        return b;
    }
    function panner(p) { const s = actx.createStereoPanner(); s.pan.value = p; return s; }

    function buildGraph() {
        actx = new (window.AudioContext || window.webkitAudioContext)();
        master = actx.createGain(); master.gain.value = 0; master.connect(actx.destination);
        const dry = actx.createGain(); dry.gain.value = 0.58; dry.connect(master);
        const conv = actx.createConvolver(); conv.buffer = makeReverbIR(12, 1.7);
        const wet = actx.createGain(); wet.gain.value = 0.55; conv.connect(wet); wet.connect(master);
        fxIn = actx.createGain(); fxIn.connect(dry); fxIn.connect(conv);

        // La Vida: drone cálido en entonación justa (raíz, tercera, quinta, octava) — nunca decae
        const f0 = 98.00;
        [[1, 0.045], [1.25, 0.03], [1.5, 0.032], [2, 0.028], [3, 0.02]].forEach(([r, amp]) => {
            [f0 * r, f0 * r * 1.002].forEach(f => {
                const o = actx.createOscillator(); o.type = 'sine'; o.frequency.value = f;
                const g = actx.createGain(); g.gain.value = amp / 2;
                // respira, pero jamás se apaga
                const lfo = actx.createOscillator(); lfo.type = 'sine'; lfo.frequency.value = 1 / 17;
                const dep = actx.createGain(); dep.gain.value = amp * 0.15; lfo.connect(dep); dep.connect(g.gain);
                o.connect(g); g.connect(fxIn); o.start(); lfo.start();
            });
        });
    }

    // Una forma: nace y muere sobre la Vida que permanece
    function playForm(t0) {
        const f0 = 98.00;
        const ratio = [2, 2.5, 3, 4][Math.floor(Math.random() * 4)];
        const o = actx.createOscillator(); o.type = 'sine'; o.frequency.value = f0 * ratio;
        const o2 = actx.createOscillator(); o2.type = 'sine'; o2.frequency.value = f0 * ratio * 1.5;
        const g2 = actx.createGain(); g2.gain.value = 0.25; o2.connect(g2);
        const g = actx.createGain();
        g.gain.setValueAtTime(0.0001, t0);
        g.gain.linearRampToValueAtTime(0.03, t0 + 1.5);   // nace
        g.gain.exponentialRampToValueAtTime(0.0001, t0 + 6); // muere
        o.connect(g); g2.connect(g); g.connect(panner(Math.random()*1.4-0.7)).connect(fxIn);
        o.start(t0); o2.start(t0); o.stop(t0 + 6.2); o2.stop(t0 + 6.2);
    }

    async function initSound() {
        if (started) return; started = true;
        buildGraph();
        if (actx.state === 'suspended') await actx.resume();
        master.gain.linearRampToValueAtTime(0.7, actx.currentTime + 6);
        const f = () => playForm(actx.currentTime + 0.05);
        f(); timers.push(setInterval(f, 5000));
        const h = document.getElementById('hint'); if (h) h.classList.add('oculto');
    }
    document.body.addEventListener('click', initSound, { once: true });
    </script>
</body>
</html>
