<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Olas en el Océano</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
        background: linear-gradient(to bottom, #001a33, #003366, #004080);
        color: #fff;
        font-family: 'Georgia', serif;
        overflow: hidden;
        height: 100vh;
        position: relative;
        cursor: none;
    }

    .ocean-container { position: absolute; width: 100%; height: 100%; perspective: 1000px; }

    .wave {
        position: absolute; width: 200%; height: 100px;
        background: linear-gradient(to top, rgba(0,100,200,0.8), rgba(0,150,255,0.5), transparent);
        border-radius: 50%;
        transform-origin: center;
        animation: waveMotion 8s infinite ease-in-out;
    }
    @keyframes waveMotion {
        0%, 100% { transform: translateX(-50%) translateY(0) scaleY(1); }
        50%      { transform: translateX(-50%) translateY(-30px) scaleY(1.5); }
    }

    .individual-drop {
        position: absolute; width: 20px; height: 20px;
        background: radial-gradient(circle, rgba(255,255,255,0.9), rgba(100,200,255,0.5));
        border-radius: 50%;
        animation: dropJourney 10s infinite ease-in-out;
    }
    @keyframes dropJourney {
        0%   { transform: translate(0, -300px) scale(1); opacity: 1; }
        40%  { transform: translate(var(--arcX), var(--arcY)) scale(1.2); opacity: 1; }
        60%  { transform: translate(0, 0) scale(1); opacity: 0.8; }
        80%  { transform: translate(0, 50px) scale(2); opacity: 0.3; }
        100% { transform: translate(0, 100px) scale(5); opacity: 0; }
    }

    .ocean-depth {
        position: absolute; bottom: 0; width: 100%; height: 50%;
        background: linear-gradient(to top, rgba(0,20,40,1), rgba(0,50,100,0.8), transparent);
        animation: depthPulse 12s infinite ease-in-out;
    }
    @keyframes depthPulse { 0%, 100% { opacity: 0.8; } 50% { opacity: 1; } }

    .unity-point {
        position: absolute; width: 10px; height: 10px;
        background: radial-gradient(circle, rgba(255,255,255,0.95), rgba(200,230,255,0.4));
        border-radius: 50%; top: 70%; left: 50%;
        box-shadow: 0 0 30px rgba(255,255,255,0.5), 0 0 70px rgba(180,220,255,0.3);
        transform: translate(-50%, -50%);
        animation: unityGlow 5s infinite ease-in-out;
    }
    @keyframes unityGlow {
        0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.55; }
        50%      { transform: translate(-50%, -50%) scale(1.9); opacity: 1; }
    }

    .foam-particle {
        position: absolute; width: 5px; height: 5px; background: rgba(255,255,255,0.85); border-radius: 50%;
        --floatX:0px; --floatY:0px; --endX:0px; --endY:0px;
        animation: foamFloat 6s infinite ease-in-out;
    }
    @keyframes foamFloat {
        0%   { transform: translate(0,0) scale(0); opacity: 0; }
        50%  { transform: translate(var(--floatX), var(--floatY)) scale(1); opacity: 0.7; }
        100% { transform: translate(var(--endX), var(--endY)) scale(0); opacity: 0; }
    }

    .ocean-wisdom {
        position: fixed; bottom: 10%; left: 50%; transform: translateX(-50%);
        text-align: center; font-size: 1.1em; line-height: 1.9;
        color: rgba(255,255,255,0.92); text-shadow: 0 0 26px rgba(255,255,255,0.4);
        width: 88%; max-width: 660px; z-index: 100;
        animation: wisdomWave 13s infinite ease-in-out;
    }
    @keyframes wisdomWave {
        0%   { opacity: 0; }
        12%  { opacity: 0.92; }
        80%  { opacity: 0.92; }
        92%  { opacity: 0; }
        100% { opacity: 0; }
    }

    .moon-reflection {
        position: absolute; top: 20%; left: 50%; width: 100px; height: 100px;
        background: radial-gradient(circle, rgba(255,255,200,0.9), rgba(255,255,200,0.5), transparent);
        border-radius: 50%;
        transform: translateX(-50%);
        animation: moonGlow 6s infinite ease-in-out;
    }
    @keyframes moonGlow {
        0%, 100% { transform: translateX(-50%) scale(1); opacity: 0.75; }
        50%      { transform: translateX(-50%) scale(1.1); opacity: 1; }
    }

    canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0.6; }

    .hint {
        position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
        font-size: 11px; letter-spacing: 4px; color: rgba(255,255,255,0.3);
        animation: hint-breathe 4s ease-in-out infinite; transition: opacity 1.5s ease; pointer-events: none; z-index: 60;
    }
    .hint.oculto { opacity: 0; }
    @keyframes hint-breathe { 0%,100% { opacity: 0.16; } 50% { opacity: 0.4; } }
    .infinito {
        position: fixed; bottom: 24px; right: 28px;
        color: rgba(150,210,255,0.45); text-decoration: none; font-size: 24px;
        cursor: pointer; transition: color 0.6s ease; z-index: 60;
    }
    .infinito:hover { color: rgba(150,210,255,0.95); }

    @media (prefers-reduced-motion: reduce) {
        .wave { animation: none; }
        .individual-drop { animation: none; opacity: 0; }
        .ocean-depth { animation: none; }
        .unity-point { animation: none; opacity: 0.9; }
        .foam-particle { animation: none; opacity: 0; }
        .ocean-wisdom { animation: none; opacity: 0.92; }
        .moon-reflection { animation: none; opacity: 0.9; }
    }
</style>
</head>
<body>
    <canvas id="oceanCanvas"></canvas>

    <div class="moon-reflection"></div>

    <div class="ocean-container">
        <div class="ocean-depth"></div>
        <div class="unity-point"></div>
    </div>

    <div class="ocean-wisdom">
        La ola cree que muere al regresar al mar<br>
        pero solo está volviendo a casa<br>
        nunca fue diferente del océano
    </div>

    <div class="hint" id="hint">( tocá: el océano resuena )</div>
    <a class="infinito" href="L5-Nodo5.html" title="Siguiente portal">∞</a>

    <script>
    const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    const container = document.querySelector('.ocean-container');

    // ── Canvas: sistema de olas en capas ──
    const canvas = document.getElementById('oceanCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    let t = 0;
    function animateOcean() {
        t += 0.02;
        ctx.fillStyle = 'rgba(0,20,40,0.05)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
        for (let layer = 0; layer < 5; layer++) {
            ctx.strokeStyle = `rgba(100,200,255,${0.3 - layer*0.05})`; ctx.lineWidth = 2 - layer*0.2;
            ctx.beginPath();
            for (let x = 0; x <= canvas.width; x += 5) {
                const y = canvas.height*0.6 + Math.sin(x*0.01 + t + layer)*30 + Math.sin(x*0.02 + t*1.5 + layer)*20 + layer*20;
                x === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
            }
            ctx.stroke();
        }
        if (!reduce) requestAnimationFrame(animateOcean);
    }
    animateOcean();

    // ── Olas ──
    for (let i = 0; i < 10; i++) {
        const wave = document.createElement('div'); wave.className = 'wave';
        wave.style.bottom = (20 + i*5) + '%'; wave.style.left = '-50%';
        wave.style.animationDelay = i*0.8 + 's'; wave.style.opacity = 0.5 - i*0.04;
        container.appendChild(wave);
    }

    // ── Espuma ──
    for (let i = 0; i < 40; i++) {
        const foam = document.createElement('div'); foam.className = 'foam-particle';
        foam.style.left = Math.random()*100 + '%'; foam.style.top = (50 + Math.random()*30) + '%';
        foam.style.setProperty('--floatX', (Math.random()-0.5)*100 + 'px');
        foam.style.setProperty('--floatY', -Math.random()*50 + 'px');
        foam.style.setProperty('--endX', (Math.random()-0.5)*200 + 'px');
        foam.style.setProperty('--endY', Math.random()*100 + 'px');
        foam.style.animationDelay = Math.random()*6 + 's';
        container.appendChild(foam);
    }

    // ── Reflejo de luna en el agua (columna) ──
    const moonCol = document.createElement('div');
    moonCol.style.cssText = 'position:absolute;width:100px;height:300px;left:50%;top:40%;transform:translateX(-50%);background:linear-gradient(to bottom, transparent, rgba(255,255,200,0.2), transparent);filter:blur(20px);';
    moonCol.style.animation = 'moonGlow 6s infinite ease-in-out';
    container.appendChild(moonCol);

    if (!reduce) {
        function createDrop() {
            const drop = document.createElement('div'); drop.className = 'individual-drop';
            drop.style.left = Math.random()*100 + '%'; drop.style.top = '80%';
            drop.style.setProperty('--arcX', (Math.random()-0.5)*200 + 'px');
            drop.style.setProperty('--arcY', -Math.random()*200 + 'px');
            container.appendChild(drop);
            setTimeout(() => drop.remove(), 10000);
        }
        for (let i = 0; i < 4; i++) createDrop();
        setInterval(createDrop, 2500);
    }

    // ── Sabiduría oceánica (con tiempo de lectura) ──
    const wisdoms = [
        "La ola cree que muere al regresar al mar<br>pero solo está volviendo a casa<br>nunca fue diferente del océano",
        "Mil olas, un solo océano<br>mil vidas, una sola conciencia<br>la separación es la ilusión",
        "La gota contiene el océano<br>el océano está en cada gota<br>¿Dónde termina una y empieza el otro?",
        "Emerges del océano como ola<br>juegas un momento en la superficie<br>y regresas siendo lo que siempre fuiste",
        "No temas disolverte<br>es recordar quién eres<br>el océano infinito del ser"
    ];
    let wIdx = 0;
    setInterval(() => { wIdx = (wIdx + 1) % wisdoms.length; document.querySelector('.ocean-wisdom').innerHTML = wisdoms[wIdx]; }, 13000);

    // ── Audio (Web Audio puro, SIN CDN; nace al tocar) ──
    let actx = null, master = null, fxIn = null, started = false;
    const timers = [];
    function makeReverbIR(s, d) {
        const rate = actx.sampleRate, len = Math.floor(rate * s);
        const b = actx.createBuffer(2, len, rate);
        for (let c = 0; c < 2; c++) { const a = b.getChannelData(c); for (let i = 0; i < len; i++) a[i] = (Math.random()*2-1)*Math.pow(1-i/len, d); }
        return b;
    }
    function makeNoise() {
        const len = actx.sampleRate * 3, b = actx.createBuffer(1, len, actx.sampleRate), d = b.getChannelData(0);
        for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
        return b;
    }
    function panner(p) { const s = actx.createStereoPanner(); s.pan.value = p; return s; }

    function surf(period, phase, pan) {
        // ruido pasabajos cuya amplitud sube y baja = ola que rompe y se retira
        const src = actx.createBufferSource(); src.buffer = makeNoise(); src.loop = true;
        const lp = actx.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 420; lp.Q.value = 0.4;
        const g = actx.createGain(); g.gain.value = 0.0001;
        const lfo = actx.createOscillator(); lfo.type = 'sine'; lfo.frequency.value = 1 / period;
        const lfoD = actx.createGain(); lfoD.gain.value = 0.05;
        const lfoB = actx.createConstantSource(); lfoB.offset.value = 0.05;
        lfo.connect(lfoD); lfoD.connect(g.gain); lfoB.connect(g.gain);
        src.connect(lp); lp.connect(g); g.connect(panner(pan)).connect(fxIn);
        src.start(); lfo.start(actx.currentTime + phase); lfoB.start();
    }

    function buildGraph() {
        actx = new (window.AudioContext || window.webkitAudioContext)();
        master = actx.createGain(); master.gain.value = 0; master.connect(actx.destination);
        const dry = actx.createGain(); dry.gain.value = 0.6; dry.connect(master);
        const conv = actx.createConvolver(); conv.buffer = makeReverbIR(12, 1.7);
        const wet = actx.createGain(); wet.gain.value = 0.55; conv.connect(wet); wet.connect(master);
        fxIn = actx.createGain(); fxIn.connect(dry); fxIn.connect(conv);

        // Olas: dos capas desfasadas
        surf(9, 0, -0.4);
        surf(11, 4, 0.4);

        // El único océano: drone profundo bajo las muchas olas
        [43.65, 65.41].forEach(f => { const o = actx.createOscillator(); o.type = 'sine'; o.frequency.value = f; const g = actx.createGain(); g.gain.value = 0.05; o.connect(g); g.connect(fxIn); o.start(); });

        // La luna: tono agudo puro, apenas latiendo
        [880, 880 * 1.003].forEach(f => { const o = actx.createOscillator(); o.type = 'sine'; o.frequency.value = f; const g = actx.createGain(); g.gain.value = 0.008; o.connect(g); g.connect(fxIn); o.start(); });
    }

    // Gota que se disuelve: tono que desciende y se funde
    function playDrop(t0) {
        const base = [329.63, 392.00, 493.88][Math.floor(Math.random() * 3)];
        const o = actx.createOscillator(); o.type = 'sine';
        o.frequency.setValueAtTime(base, t0);
        o.frequency.exponentialRampToValueAtTime(base * 0.5, t0 + 3.5);
        const g = actx.createGain();
        g.gain.setValueAtTime(0.0001, t0);
        g.gain.linearRampToValueAtTime(0.03, t0 + 0.8);
        g.gain.exponentialRampToValueAtTime(0.0001, t0 + 3.5);
        o.connect(g); g.connect(panner(Math.random()*1.2-0.6)).connect(fxIn);
        o.start(t0); o.stop(t0 + 3.7);
    }

    async function initSound() {
        if (started) return; started = true;
        buildGraph();
        if (actx.state === 'suspended') await actx.resume();
        master.gain.linearRampToValueAtTime(0.7, actx.currentTime + 6);
        const d = () => playDrop(actx.currentTime + 0.05);
        timers.push(setInterval(d, 5500));
        const h = document.getElementById('hint'); if (h) h.classList.add('oculto');
    }
    document.body.addEventListener('click', initSound, { once: true });
    </script>
</body>
</html>
