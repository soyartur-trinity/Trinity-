<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La Danza de Shiva</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
        background: radial-gradient(ellipse at center, #1a0033, #000);
        color: #fff;
        font-family: 'Georgia', serif;
        overflow: hidden;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        cursor: none;
    }

    .nataraja-container {
        position: relative; width: 600px; height: 600px;
        max-width: 92vw; max-height: 92vh;
        transform-style: preserve-3d;
        animation: cosmicDance 34s infinite linear;
    }
    @keyframes cosmicDance { from { transform: rotateY(0deg); } to { transform: rotateY(360deg); } }

    .ring-of-fire {
        position: absolute; width: 400px; height: 400px; top: 50%; left: 50%;
        border-radius: 50%;
        background: conic-gradient(from 0deg, #ff6600, #ff9900, #ffcc00, #ff9900, #ff6600, #ff3300, #ff6600);
        -webkit-mask: radial-gradient(transparent 45%, black 45%, black 55%, transparent 55%);
        mask: radial-gradient(transparent 45%, black 45%, black 55%, transparent 55%);
        transform: translate(-50%, -50%);
        animation: fireRing 5s infinite linear;
    }
    @keyframes fireRing {
        from { transform: translate(-50%, -50%) rotate(0deg); }
        to { transform: translate(-50%, -50%) rotate(360deg); }
    }

    /* Partículas de creación/destrucción: color fijo variado (los muchos universos) */
    .creation-particle {
        position: absolute; width: 4px; height: 4px; border-radius: 50%;
        animation: createDestroy 8s infinite ease-in-out;
    }
    @keyframes createDestroy {
        0%   { transform: scale(0) translate(0,0); opacity: 0; }
        25%  { transform: scale(1) translate(var(--x1), var(--y1)); opacity: 1; }
        50%  { transform: scale(1.5) translate(var(--x2), var(--y2)); opacity: 1; }
        75%  { transform: scale(1) translate(var(--x3), var(--y3)); opacity: 1; }
        100% { transform: scale(0) translate(0,0); opacity: 0; }
    }

    .om-symbol {
        position: absolute; top: 50%; left: 50%;
        font-size: 120px; color: #d0c0a0; text-shadow: 0 0 45px rgba(208,192,160,0.6), 0 0 90px rgba(208,192,160,0.3);
        transform: translate(-50%, -50%);
        animation: omPulse 4s infinite ease-in-out;
    }
    @keyframes omPulse {
        0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.4; }
        50%      { transform: translate(-50%, -50%) scale(1.2); opacity: 0.85; }
    }

    .drum-beat {
        position: absolute; width: 300px; height: 300px; top: 50%; left: 50%;
        border-radius: 50%; border: 2px solid rgba(255,255,255,0.7);
        transform: translate(-50%, -50%);
        animation: drumExpand 2s infinite ease-out;
    }
    @keyframes drumExpand {
        0%   { transform: translate(-50%, -50%) scale(0); opacity: 0.9; }
        100% { transform: translate(-50%, -50%) scale(2); opacity: 0; }
    }

    .cosmic-dancer { position: absolute; width: 200px; height: 200px; top: 50%; left: 50%; transform: translate(-50%, -50%); }
    .dance-trail {
        position: absolute; width: 100%; height: 100%;
        border: 1px solid rgba(160,90,220,0.35); border-radius: 50%;
        animation: trailSpin 3s infinite linear;
    }
    @keyframes trailSpin {
        from { transform: rotate(0deg) scale(1); opacity: 1; }
        to   { transform: rotate(360deg) scale(1.5); opacity: 0; }
    }

    .shiva-wisdom {
        position: fixed; bottom: 6%; left: 50%; transform: translateX(-50%);
        text-align: center; font-size: 1.05em; line-height: 1.9;
        color: rgba(255,255,255,0.9); text-shadow: 0 0 20px rgba(255,255,255,0.4);
        width: 90%; max-width: 660px; z-index: 100;
        animation: wisdomGlow 13s infinite ease-in-out;
    }
    @keyframes wisdomGlow {
        0% { opacity: 0; } 12% { opacity: 0.9; } 80% { opacity: 0.9; } 92% { opacity: 0; } 100% { opacity: 0; }
    }

    canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0.4; }

    .hint {
        position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
        font-size: 11px; letter-spacing: 4px; color: rgba(255,255,255,0.3);
        animation: hint-breathe 4s ease-in-out infinite; transition: opacity 1.5s ease; pointer-events: none; z-index: 60;
    }
    .hint.oculto { opacity: 0; }
    @keyframes hint-breathe { 0%,100% { opacity: 0.16; } 50% { opacity: 0.4; } }
    .infinito {
        position: fixed; bottom: 24px; right: 28px;
        color: rgba(255,153,0,0.45); text-decoration: none; font-size: 24px;
        cursor: pointer; transition: color 0.6s ease; z-index: 60;
    }
    .infinito:hover { color: rgba(255,180,60,0.95); }

    @media (prefers-reduced-motion: reduce) {
        .nataraja-container { animation: none; }
        .ring-of-fire { animation: none; }
        .creation-particle { animation: none; opacity: 0; }
        .om-symbol { animation: none; opacity: 0.7; }
        .drum-beat { animation: none; opacity: 0; }
        .dance-trail { animation: none; opacity: 0; }
        .shiva-wisdom { animation: none; opacity: 0.9; }
    }
</style>
</head>
<body>
    <canvas id="danceCanvas"></canvas>

    <div class="nataraja-container">
        <div class="ring-of-fire"></div>
        <div class="om-symbol">ॐ</div>
        <div class="cosmic-dancer"></div>
    </div>

    <div class="shiva-wisdom">
        Creación y destrucción: dos caras de la misma moneda<br>
        en mi danza, los universos nacen y mueren<br>
        pero la danza misma es eterna
    </div>

    <div class="hint" id="hint">( tocá: la danza resuena )</div>
    <a class="infinito" href="L5-Nodo3.html" title="Siguiente portal">∞</a>

    <script>
    const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    const container = document.querySelector('.nataraja-container');

    // ── Canvas: energía cósmica (fuego/violeta) ──
    const canvas = document.getElementById('danceCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    const cx = canvas.width / 2, cy = canvas.height / 2;
    const spiralColors = ['rgba(255,120,40,0.3)','rgba(255,170,50,0.28)','rgba(255,90,40,0.28)','rgba(180,110,220,0.26)','rgba(255,210,120,0.26)'];
    function drawCosmicEnergy() {
        ctx.fillStyle = 'rgba(0,0,0,0.06)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
        const time = Date.now() * 0.001;
        for (let i = 0; i < 5; i++) {
            const angle = time + (i * Math.PI * 2 / 5);
            const radius = 150 + Math.sin(time * 2 + i) * 50;
            ctx.strokeStyle = spiralColors[i]; ctx.lineWidth = 2; ctx.beginPath();
            for (let j = 0; j < 100; j++) {
                const t = j / 100, r = radius * t, a = angle + t * Math.PI * 4;
                const x = cx + Math.cos(a) * r, y = cy + Math.sin(a) * r;
                j === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
            }
            ctx.stroke();
        }
        if (!reduce) requestAnimationFrame(drawCosmicEnergy);
    }
    drawCosmicEnergy();

    // ── Partículas de creación/destrucción (colores fijos: los universos) ──
    const cosmos = ['rgba(90,220,230,0.95)','rgba(150,230,150,0.95)','rgba(240,210,90,0.95)','rgba(230,110,190,0.95)','rgba(180,140,240,0.95)'];
    for (let i = 0; i < 50; i++) {
        const p = document.createElement('div'); p.className = 'creation-particle';
        const angle = (i / 50) * Math.PI * 2, radius = 150 + Math.random() * 100;
        p.style.left = `${300 + Math.cos(angle) * radius}px`;
        p.style.top = `${300 + Math.sin(angle) * radius}px`;
        p.style.background = cosmos[i % cosmos.length];
        p.style.setProperty('--x1', (Math.random()-0.5)*200 + 'px');
        p.style.setProperty('--y1', (Math.random()-0.5)*200 + 'px');
        p.style.setProperty('--x2', (Math.random()-0.5)*300 + 'px');
        p.style.setProperty('--y2', (Math.random()-0.5)*300 + 'px');
        p.style.setProperty('--x3', (Math.random()-0.5)*200 + 'px');
        p.style.setProperty('--y3', (Math.random()-0.5)*200 + 'px');
        p.style.animationDelay = (i * 0.16) + 's';
        container.appendChild(p);
    }

    if (!reduce) {
        // Latidos del tambor (damaru)
        setInterval(() => {
            const drum = document.createElement('div'); drum.className = 'drum-beat';
            container.appendChild(drum); setTimeout(() => drum.remove(), 2000);
        }, 1000);
        // Rastros de danza
        const dancer = document.querySelector('.cosmic-dancer');
        setInterval(() => {
            const trail = document.createElement('div'); trail.className = 'dance-trail';
            dancer.appendChild(trail); setTimeout(() => trail.remove(), 3000);
        }, 700);
    }

    // ── Sabiduría (con tiempo de lectura) ──
    const wisdoms = [
        "Creación y destrucción: dos caras de la misma moneda<br>en mi danza, los universos nacen y mueren<br>pero la danza misma es eterna",
        "No hay muerte, solo transformación<br>no hay nacimiento, solo manifestación<br>la danza continúa sin principio ni fin",
        "Destruyo para crear<br>creo para destruir<br>el ciclo eterno del devenir",
        "En cada latido del tambor, un universo nace<br>en cada silencio entre latidos, un universo muere<br>el ritmo es eterno",
        "Soy el que danza y la danza misma<br>el destructor y lo destruido<br>el creador y la creación"
    ];
    let wIdx = 0;
    setInterval(() => { wIdx = (wIdx + 1) % wisdoms.length; document.querySelector('.shiva-wisdom').innerHTML = wisdoms[wIdx]; }, 13000);

    // ── Audio (Web Audio puro, SIN CDN; nace al tocar) ──
    let actx = null, master = null, fxIn = null, started = false;
    const timers = [];
    function makeReverbIR(s, d) {
        const rate = actx.sampleRate, len = Math.floor(rate * s);
        const b = actx.createBuffer(2, len, rate);
        for (let c = 0; c < 2; c++) { const a = b.getChannelData(c); for (let i = 0; i < len; i++) a[i] = (Math.random()*2-1)*Math.pow(1-i/len, d); }
        return b;
    }
    function panner(p) { const s = actx.createStereoPanner(); s.pan.value = p; return s; }

    function buildGraph() {
        actx = new (window.AudioContext || window.webkitAudioContext)();
        master = actx.createGain(); master.gain.value = 0; master.connect(actx.destination);
        const dry = actx.createGain(); dry.gain.value = 0.55; dry.connect(master);
        const conv = actx.createConvolver(); conv.buffer = makeReverbIR(11, 1.7);
        const wet = actx.createGain(); wet.gain.value = 0.6; conv.connect(wet); wet.connect(master);
        fxIn = actx.createGain(); fxIn.connect(dry); fxIn.connect(conv);

        // OM: drone sagrado (136.1 Hz) — la danza misma, eterna
        [68.05, 136.1, 272.2].forEach((f, i) => {
            [f, f * 1.003].forEach(ff => {
                const o = actx.createOscillator(); o.type = 'sine'; o.frequency.value = ff;
                const g = actx.createGain(); g.gain.value = 0.035 / (i * 0.5 + 1);
                o.connect(g); g.connect(fxIn); o.start();
            });
        });
    }

    // Damaru: cada latido, un universo
    function playDrum(t0) {
        const o = actx.createOscillator(); o.type = 'sine';
        o.frequency.setValueAtTime(105, t0);
        o.frequency.exponentialRampToValueAtTime(52, t0 + 0.25);
        const g = actx.createGain();
        g.gain.setValueAtTime(0.0001, t0);
        g.gain.linearRampToValueAtTime(0.09, t0 + 0.01);
        g.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.5);
        o.connect(g); g.connect(fxIn); o.start(t0); o.stop(t0 + 0.55);
    }

    // Creación (asciende) / destrucción (desciende), alternadas
    let crea = true;
    function playCycle(t0) {
        const base = [220, 293.66, 349.23][Math.floor(Math.random() * 3)];
        const o = actx.createOscillator(); o.type = 'sine';
        if (crea) { o.frequency.setValueAtTime(base, t0); o.frequency.exponentialRampToValueAtTime(base * 1.5, t0 + 3); }
        else { o.frequency.setValueAtTime(base * 1.5, t0); o.frequency.exponentialRampToValueAtTime(base, t0 + 3); }
        crea = !crea;
        const g = actx.createGain();
        g.gain.setValueAtTime(0.0001, t0);
        g.gain.linearRampToValueAtTime(0.03, t0 + 1);
        g.gain.exponentialRampToValueAtTime(0.0001, t0 + 3);
        o.connect(g); g.connect(panner(Math.random()*1.2-0.6)).connect(fxIn);
        o.start(t0); o.stop(t0 + 3.2);
    }

    async function initSound() {
        if (started) return; started = true;
        buildGraph();
        if (actx.state === 'suspended') await actx.resume();
        master.gain.linearRampToValueAtTime(0.7, actx.currentTime + 5);
        const drum = () => playDrum(actx.currentTime + 0.05);
        drum(); timers.push(setInterval(drum, 1200));
        const cyc = () => playCycle(actx.currentTime + 0.05);
        cyc(); timers.push(setInterval(cyc, 4000));
        const h = document.getElementById('hint'); if (h) h.classList.add('oculto');
    }
    document.body.addEventListener('click', initSound, { once: true });
    </script>
</body>
</html>
