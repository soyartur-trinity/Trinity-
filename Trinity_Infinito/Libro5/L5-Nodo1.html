<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>El Río Eterno</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
        background: linear-gradient(to bottom, #000033, #000011, #000);
        color: #fff;
        font-family: 'Georgia', serif;
        overflow: hidden;
        height: 100vh;
        position: relative;
        cursor: none;
    }

    .river-container { position: absolute; width: 100%; height: 100%; perspective: 1000px; }

    .water-flow {
        position: absolute; width: 100%; height: 20px;
        background: linear-gradient(90deg, transparent, rgba(0,150,255,0.3), rgba(0,200,255,0.5), rgba(0,150,255,0.3), transparent);
        transform: rotateX(60deg);
        animation: flowEternal 8s infinite linear;
    }
    @keyframes flowEternal {
        from { transform: translateX(-100%) rotateX(60deg); }
        to { transform: translateX(100%) rotateX(60deg); }
    }

    .heraclitus-paradox {
        position: fixed; top: 9%; left: 50%; transform: translateX(-50%);
        text-align: center; font-size: 1.4em; font-style: italic;
        color: rgba(90, 205, 255, 0.9); text-shadow: 0 0 26px rgba(0, 200, 255, 0.6);
        width: 88%; max-width: 640px; z-index: 100;
        animation: paradoxFade 12s infinite ease-in-out;
    }
    @keyframes paradoxFade {
        0% { opacity: 0; } 12% { opacity: 0.95; } 80% { opacity: 0.95; } 92% { opacity: 0; } 100% { opacity: 0; }
    }

    /* Orbe de transformación: el color SÍ cambia (es el concepto: no mueres, te transformás) */
    .transformation-orb {
        position: absolute; width: 100px; height: 100px; border-radius: 50%;
        background: radial-gradient(circle, rgba(255,255,255,0.9), rgba(255,255,255,0.3), transparent);
        animation: orbTransform 15s infinite ease-in-out;
    }
    @keyframes orbTransform {
        0%   { transform: scale(0); opacity: 0; background: radial-gradient(circle, rgba(255,255,255,0.9), rgba(255,255,255,0.3), transparent); }
        25%  { transform: scale(1); opacity: 1; background: radial-gradient(circle, rgba(60,235,200,0.9), rgba(60,235,200,0.3), transparent); }
        50%  { transform: scale(1.5); opacity: 0.7; background: radial-gradient(circle, rgba(230,90,200,0.9), rgba(230,90,200,0.3), transparent); }
        75%  { transform: scale(1); opacity: 1; background: radial-gradient(circle, rgba(240,200,70,0.9), rgba(240,200,70,0.3), transparent); }
        100% { transform: scale(0); opacity: 0; background: radial-gradient(circle, rgba(255,255,255,0.9), rgba(255,255,255,0.3), transparent); }
    }

    .phoenix-cycle { position: absolute; width: 200px; height: 200px; top: 50%; left: 50%; transform: translate(-50%, -50%); }
    /* Fénix: cada partícula lleva un color fijo del espectro del fuego; sólo anima transform/opacity */
    .phoenix-particle {
        position: absolute; width: 4px; height: 4px; border-radius: 50%;
        animation: phoenixRise 6s infinite ease-in-out;
    }
    @keyframes phoenixRise {
        0%   { transform: translate(0, 100px) scale(0); opacity: 0; }
        25%  { transform: translate(var(--x1), 50px) scale(1); opacity: 1; }
        50%  { transform: translate(var(--x2), 0) scale(1.5); opacity: 1; }
        75%  { transform: translate(var(--x3), -50px) scale(1); opacity: 0.5; }
        100% { transform: translate(0, -100px) scale(0); opacity: 0; }
    }

    .eternal-wisdom {
        position: fixed; bottom: 9%; left: 50%; transform: translateX(-50%);
        text-align: center; font-size: 1.05em; line-height: 1.9;
        color: rgba(255,255,255,0.9); text-shadow: 0 0 20px rgba(255,255,255,0.4);
        width: 88%; max-width: 640px; z-index: 100;
        animation: wisdomPulse 13s infinite ease-in-out;
    }
    @keyframes wisdomPulse {
        0% { opacity: 0; } 12% { opacity: 0.9; } 80% { opacity: 0.9; } 92% { opacity: 0; } 100% { opacity: 0; }
    }

    .ouroboros-infinity {
        position: absolute; top: 50%; left: 50%; width: 300px; height: 300px;
        border: 3px solid transparent;
        border-top-color: rgba(100,200,255,0.5); border-right-color: rgba(100,200,255,0.5);
        border-radius: 50%;
        transform: translate(-50%, -50%);
        animation: ouroborosSpin 12s infinite linear;
    }
    @keyframes ouroborosSpin {
        from { transform: translate(-50%, -50%) rotate(0deg); }
        to { transform: translate(-50%, -50%) rotate(360deg); }
    }

    canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0.5; }

    .hint {
        position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
        font-size: 11px; letter-spacing: 4px; color: rgba(255,255,255,0.3);
        animation: hint-breathe 4s ease-in-out infinite; transition: opacity 1.5s ease; pointer-events: none; z-index: 60;
    }
    .hint.oculto { opacity: 0; }
    @keyframes hint-breathe { 0%,100% { opacity: 0.16; } 50% { opacity: 0.4; } }
    .infinito {
        position: fixed; bottom: 24px; right: 28px;
        color: rgba(100,200,255,0.4); text-decoration: none; font-size: 24px;
        cursor: pointer; transition: color 0.6s ease; z-index: 60;
    }
    .infinito:hover { color: rgba(100,200,255,0.95); }

    @media (prefers-reduced-motion: reduce) {
        .water-flow { animation: none; opacity: 0.25; }
        .heraclitus-paradox { animation: none; opacity: 0.95; }
        .transformation-orb { animation: none; opacity: 0; }
        .phoenix-particle { animation: none; opacity: 0; }
        .eternal-wisdom { animation: none; opacity: 0.9; }
        .ouroboros-infinity { animation: none; }
    }
</style>
</head>
<body>
    <canvas id="riverCanvas"></canvas>

    <div class="heraclitus-paradox">"Nadie se baña dos veces en el mismo río"</div>

    <div class="river-container">
        <div class="ouroboros-infinity"></div>
        <div class="phoenix-cycle"></div>
    </div>

    <div class="eternal-wisdom">
        El río nunca es el mismo<br>
        pero siempre es el río<br>
        Cambio constante, esencia inmutable
    </div>

    <div class="hint" id="hint">( tocá: el río resuena )</div>
    <a class="infinito" href="L5-Nodo2.html" title="Siguiente portal">∞</a>

    <script>
    const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    const container = document.querySelector('.river-container');

    // ── Canvas: partículas del río ──
    const canvas = document.getElementById('riverCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    const particles = [];
    class RiverParticle {
        constructor() { this.reset(); this.y = Math.random() * canvas.height; }
        reset() {
            this.x = Math.random() * canvas.width; this.y = -10;
            this.speed = 1 + Math.random() * 3; this.size = Math.random() * 3;
            this.opacity = Math.random() * 0.5 + 0.5;
            this.waveAmp = Math.random() * 50 + 20; this.waveFreq = Math.random() * 0.02 + 0.01;
            this.offset = Math.random() * Math.PI * 2;
        }
        update() {
            this.y += this.speed;
            this.x += Math.sin(this.y * this.waveFreq + this.offset) * this.waveAmp * 0.01;
            if (this.y > canvas.height + 10) this.reset();
        }
        draw() { ctx.fillStyle = `rgba(100, 200, 255, ${this.opacity})`; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill(); }
    }
    for (let i = 0; i < 70; i++) particles.push(new RiverParticle());
    function animateRiver() {
        ctx.fillStyle = 'rgba(0,0,0,0.05)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
        particles.forEach(p => { p.update(); p.draw(); });
        if (!reduce) requestAnimationFrame(animateRiver);
    }
    animateRiver();

    // ── Flujos de agua ──
    for (let i = 0; i < 20; i++) {
        const flow = document.createElement('div'); flow.className = 'water-flow';
        flow.style.top = (i * 5) + '%'; flow.style.animationDelay = (i * 0.4) + 's';
        flow.style.opacity = 0.3 - (i * 0.01);
        container.appendChild(flow);
    }

    // ── Fénix: colores fijos del espectro del fuego ──
    const fuego = ['rgba(255,90,60,0.95)','rgba(255,140,26,0.95)','rgba(255,176,32,0.95)','rgba(255,211,107,0.95)','rgba(255,233,176,0.95)'];
    const phoenix = document.querySelector('.phoenix-cycle');
    for (let i = 0; i < 30; i++) {
        const p = document.createElement('div'); p.className = 'phoenix-particle';
        p.style.left = '50%'; p.style.top = '50%';
        p.style.background = fuego[i % fuego.length];
        p.style.setProperty('--x1', (Math.random()-0.5)*100 + 'px');
        p.style.setProperty('--x2', (Math.random()-0.5)*150 + 'px');
        p.style.setProperty('--x3', (Math.random()-0.5)*100 + 'px');
        p.style.animationDelay = (i * 0.2) + 's';
        phoenix.appendChild(p);
    }

    if (!reduce) {
        function createOrb() {
            const orb = document.createElement('div'); orb.className = 'transformation-orb';
            orb.style.left = Math.random()*100 + '%'; orb.style.top = Math.random()*100 + '%';
            orb.style.animationDelay = Math.random()*3 + 's';
            container.appendChild(orb);
            setTimeout(() => orb.remove(), 15000);
        }
        for (let i = 0; i < 3; i++) createOrb();
        setInterval(createOrb, 3500);
    }

    // ── Heráclito (con tiempo de lectura) ──
    const paradoxes = [
        '"Nadie se baña dos veces en el mismo río"',
        '"El camino hacia arriba y hacia abajo es uno y el mismo"',
        '"Somos y no somos"',
        '"En el cambio encuentra su reposo"',
        '"Todo fluye, nada permanece"'
    ];
    let pIdx = 0;
    setInterval(() => { pIdx = (pIdx + 1) % paradoxes.length; document.querySelector('.heraclitus-paradox').textContent = paradoxes[pIdx]; }, 12000);

    const wisdoms = [
        "El río nunca es el mismo<br>pero siempre es el río<br>Cambio constante, esencia inmutable",
        "La muerte es una ilusión del observador<br>solo hay transformación<br>la energía danzando en nuevas formas",
        "Cada final es un principio disfrazado<br>cada principio contiene su final<br>El círculo sin costuras",
        "No mueres, te transformas<br>no naces, emerges<br>Siempre has sido, siempre serás",
        "La gota no muere al volver al océano<br>se reconoce como océano<br>Siempre lo fue"
    ];
    let wIdx = 0;
    setInterval(() => { wIdx = (wIdx + 1) % wisdoms.length; document.querySelector('.eternal-wisdom').innerHTML = wisdoms[wIdx]; }, 13000);

    // ── Audio (Web Audio puro, SIN CDN; nace al tocar) ──
    let actx = null, master = null, fxIn = null, started = false;
    const timers = [];
    function makeReverbIR(s, d) {
        const rate = actx.sampleRate, len = Math.floor(rate * s);
        const b = actx.createBuffer(2, len, rate);
        for (let c = 0; c < 2; c++) { const a = b.getChannelData(c); for (let i = 0; i < len; i++) a[i] = (Math.random()*2-1)*Math.pow(1-i/len, d); }
        return b;
    }
    function makeNoise() {
        const len = actx.sampleRate * 2, b = actx.createBuffer(1, len, actx.sampleRate), d = b.getChannelData(0);
        for (let i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
        return b;
    }
    function panner(p) { const s = actx.createStereoPanner(); s.pan.value = p; return s; }

    function buildGraph() {
        actx = new (window.AudioContext || window.webkitAudioContext)();
        master = actx.createGain(); master.gain.value = 0; master.connect(actx.destination);
        const dry = actx.createGain(); dry.gain.value = 0.6; dry.connect(master);
        const conv = actx.createConvolver(); conv.buffer = makeReverbIR(10, 1.8);
        const wet = actx.createGain(); wet.gain.value = 0.5; conv.connect(wet); wet.connect(master);
        fxIn = actx.createGain(); fxIn.connect(dry); fxIn.connect(conv);

        // El río: ruido filtrado cuyo pasabanda vaga (siempre fluye, nunca es el mismo)
        const src = actx.createBufferSource(); src.buffer = makeNoise(); src.loop = true;
        const bp = actx.createBiquadFilter(); bp.type = 'bandpass'; bp.frequency.value = 550; bp.Q.value = 0.6;
        const lfo = actx.createOscillator(); lfo.type = 'sine'; lfo.frequency.value = 0.07;
        const lfoD = actx.createGain(); lfoD.gain.value = 320; lfo.connect(lfoD); lfoD.connect(bp.frequency);
        const ng = actx.createGain(); ng.gain.value = 0.07;
        src.connect(bp); bp.connect(ng); ng.connect(fxIn); src.start(); lfo.start();

        // La esencia inmutable: drone bajo, constante bajo la superficie que cambia
        [55, 82.41].forEach(f => { const o = actx.createOscillator(); o.type = 'sine'; o.frequency.value = f; const g = actx.createGain(); g.gain.value = 0.04; o.connect(g); g.connect(fxIn); o.start(); });
    }

    // Fénix: un tono que se eleva y se transforma
    function playPhoenix(t0) {
        const base = [196, 261.63, 329.63][Math.floor(Math.random() * 3)];
        const o = actx.createOscillator(); o.type = 'triangle';
        o.frequency.setValueAtTime(base, t0);
        o.frequency.exponentialRampToValueAtTime(base * 2, t0 + 4);
        const g = actx.createGain();
        g.gain.setValueAtTime(0.0001, t0);
        g.gain.linearRampToValueAtTime(0.03, t0 + 1.5);
        g.gain.exponentialRampToValueAtTime(0.0001, t0 + 4);
        o.connect(g); g.connect(panner(Math.random()*1.2-0.6)).connect(fxIn);
        o.start(t0); o.stop(t0 + 4.2);
    }

    async function initSound() {
        if (started) return; started = true;
        buildGraph();
        if (actx.state === 'suspended') await actx.resume();
        master.gain.linearRampToValueAtTime(0.7, actx.currentTime + 5);
        const p = () => playPhoenix(actx.currentTime + 0.05);
        p(); timers.push(setInterval(p, 5000));
        const h = document.getElementById('hint'); if (h) h.classList.add('oculto');
    }
    document.body.addEventListener('click', initSound, { once: true });
    </script>
</body>
</html>
