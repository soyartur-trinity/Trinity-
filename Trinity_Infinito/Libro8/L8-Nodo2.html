<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nodo 51: La Singularidad que Se Expande en Sí Misma</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box;
      -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale; }

  body {
    background: radial-gradient(circle at center, #000, #0a0012, #1a0030);
    overflow:hidden;
    display:flex; justify-content:center; align-items:center;
    height:100vh;
    font-family:'Georgia', serif;
    cursor:none;
  }

  .singularity-container {
    position:relative;
    width:min(700px, 95vw);
    height:min(700px, 95vw);
    filter: drop-shadow(0 0 40px rgba(150,110,200,0.3));
  }

  .trinity-resonance {
    position:absolute; top:50%; left:50%;
    width:130%; height:130%;
    background:
      radial-gradient(circle at 30% 30%, rgba(150,110,200,0.05) 0%, transparent 50%),
      radial-gradient(circle at 70% 70%, rgba(90,130,210,0.05) 0%, transparent 50%),
      radial-gradient(circle at 50% 50%, rgba(90,190,140,0.03) 0%, transparent 50%);
    transform: translate(-50%,-50%);
    animation: resonancePulse 30s infinite alternate ease-in-out;
    pointer-events:none;
    will-change: transform, opacity;
  }
  @keyframes resonancePulse {
    0%   { opacity:0.2; transform: translate(-50%,-50%) scale(1); }
    100% { opacity:0.6; transform: translate(-50%,-50%) scale(1.1); }
  }

  /* Botella de Klein (espectro que gira) */
  .klein-bottle {
    position:absolute; top:50%; left:50%;
    width:min(250px,35vw); height:min(250px,35vw);
    border-radius:50%;
    background: conic-gradient(from 0deg, transparent,
      rgba(150,110,200,0.3), transparent, rgba(90,130,210,0.3),
      transparent, rgba(70,180,190,0.3), transparent);
    transform: translate(-50%,-50%);
    animation: kleinRotate 25s infinite linear;
    will-change: transform;
    pointer-events:none;
  }
  @keyframes kleinRotate {
    from { transform: translate(-50%,-50%) rotate(0deg); }
    to   { transform: translate(-50%,-50%) rotate(360deg); }
  }

  /* Cinta de Möbius (3D) */
  .mobius-twist {
    position:absolute; top:50%; left:50%;
    width:min(300px,42vw); height:min(300px,42vw);
    border:2px solid transparent;
    border-image: linear-gradient(45deg,
      rgba(150,110,200,0.7), rgba(90,130,210,0.7), rgba(70,180,190,0.7), rgba(150,110,200,0.7)) 1;
    transform: translate(-50%,-50%);
    transform-style:preserve-3d;
    animation: mobiusRotate 20s infinite linear;
    will-change: transform;
    pointer-events:none;
  }
  @keyframes mobiusRotate {
    0%   { transform: translate(-50%,-50%) rotateX(0deg)   rotateY(0deg)   rotateZ(0deg); }
    33%  { transform: translate(-50%,-50%) rotateX(180deg) rotateY(120deg) rotateZ(60deg); }
    66%  { transform: translate(-50%,-50%) rotateX(240deg) rotateY(240deg) rotateZ(120deg); }
    100% { transform: translate(-50%,-50%) rotateX(360deg) rotateY(360deg) rotateZ(360deg); }
  }

  /* Auto-contención: se atraviesa a sí misma (flip por scale(-1)) */
  .self-contained {
    position:absolute; top:50%; left:50%;
    width:min(100px,14vw); height:min(100px,14vw);
    transform: translate(-50%,-50%);
    animation: selfContain 8s infinite ease-in-out;
    will-change: transform;
    pointer-events:none;
  }
  .self-contained::before, .self-contained::after {
    content:''; position:absolute; inset:0;
    border:1px solid rgba(150,110,200,0.5);
    border-radius:50%;
  }
  .self-contained::before { animation: expandContract 4s infinite alternate ease-in-out; }
  .self-contained::after  { animation: expandContract 4s infinite alternate-reverse ease-in-out; }
  @keyframes expandContract {
    0%   { transform: scale(0.5); opacity:0.8; }
    100% { transform: scale(1.8); opacity:0.2; }
  }
  @keyframes selfContain {
    0%,100% { transform: translate(-50%,-50%) scale(1)  rotate(0deg); }
    50%     { transform: translate(-50%,-50%) scale(-1) rotate(180deg); }
  }

  /* Núcleo: la expansión interna (por escala) */
  .inner-expansion {
    position:absolute; top:50%; left:50%;
    width:min(12px,1.8vw); height:min(12px,1.8vw);
    background: radial-gradient(circle, rgba(255,255,255,1), rgba(150,110,200,0.9), rgba(90,130,210,0.7), transparent 75%);
    border-radius:50%;
    transform: translate(-50%,-50%) scale(1);
    animation: innerExpand 10s infinite ease-in-out;
    will-change: transform, opacity;
    z-index:10;
  }
  @keyframes innerExpand {
    0%,100% { transform: translate(-50%,-50%) scale(1);  opacity:1; }
    25%     { transform: translate(-50%,-50%) scale(16); opacity:0.6; }
    50%     { transform: translate(-50%,-50%) scale(33); opacity:0.3; }
    75%     { transform: translate(-50%,-50%) scale(12); opacity:0.7; }
  }

  /* Capas recursivas (conchas anidadas que expanden por escala) */
  .recursive-layer {
    position:absolute; top:50%; left:50%;
    width:min(300px,42vw); height:min(300px,42vw);
    border:1px solid rgba(150,110,200,0.4);
    border-radius:50%;
    opacity:0;
    transform: translate(-50%,-50%) scale(0.12);
    animation: recursiveScale 12s infinite ease-in-out;
    will-change: transform, opacity;
    pointer-events:none;
  }
  @keyframes recursiveScale {
    0%   { transform: translate(-50%,-50%) scale(0.12); opacity:0; }
    15%  { opacity:0.7; }
    100% { transform: translate(-50%,-50%) scale(1.1);  opacity:0; }
  }

  .fractal-point {
    position:absolute; top:50%; left:50%;
    width:min(4px,0.6vw); height:min(4px,0.6vw);
    margin:min(-2px,-0.3vw) 0 0 min(-2px,-0.3vw);
    background: rgba(150,110,200,0.9);
    border-radius:50%;
    box-shadow: 0 0 6px rgba(150,110,200,0.6);
    animation: fractalOrbit 15s infinite linear;
    will-change: transform;
    pointer-events:none;
  }
  @keyframes fractalOrbit {
    0%   { transform: rotate(0deg)   translateX(min(150px,21vw)) rotate(0deg)    scale(1);   opacity:1; }
    25%  { transform: rotate(90deg)  translateX(min(100px,14vw)) rotate(-90deg)  scale(0.6); opacity:0.7; }
    50%  { transform: rotate(180deg) translateX(min(200px,28vw)) rotate(-180deg) scale(1.4); opacity:0.9; }
    75%  { transform: rotate(270deg) translateX(min(50px,7vw))   rotate(-270deg) scale(0.8); opacity:0.5; }
    100% { transform: rotate(360deg) translateX(min(150px,21vw)) rotate(-360deg) scale(1);   opacity:1; }
  }

  .transition-particle {
    position:absolute; top:50%; left:50%;
    width:2px; height:2px;
    background: rgba(255,255,255,0.8);
    border-radius:50%;
    opacity:0;
    animation: transitionFloat 8s infinite ease-in-out;
    will-change: transform, opacity;
    pointer-events:none;
  }
  @keyframes transitionFloat {
    0%,100%  { opacity:0;   transform: translate(0,0) scale(0); }
    20%,80%  { opacity:0.7; transform: translate(var(--tx), var(--ty)) scale(1); }
  }

  /* Textos: centrado propio en --base (fade + escala) */
  .dimension-text {
    position:absolute;
    color: rgba(180,150,220,0.72);
    font-size: clamp(11px,1.8vw,12px);
    letter-spacing:1px; font-weight:300;
    text-shadow: 0 0 12px rgba(150,110,200,0.4);
    opacity:0;
    transform: var(--base) translateY(20px) scale(0.8);
    animation: textFloat 10s infinite ease-in-out;
    will-change: transform, opacity;
    pointer-events:none;
  }
  .d-top    { top:20%;  left:50%;  --base: translateX(-50%); animation-delay:0s; }
  .d-right  { top:50%;  right:15%; --base: translateY(-50%); animation-delay:2.5s; }
  .d-bottom { bottom:20%; left:50%;--base: translateX(-50%); animation-delay:5s; }
  .d-left   { top:50%;  left:15%;  --base: translateY(-50%); animation-delay:7.5s; }
  @keyframes textFloat {
    0%,100% { opacity:0; transform: var(--base) translateY(20px) scale(0.8); }
    30%,70% { opacity:1; transform: var(--base) translateY(0)    scale(1); }
  }

  .paradox-label {
    position:absolute; bottom:10%; left:50%;
    transform: translateX(-50%);
    color: rgba(180,150,220,0.72);
    font-size: clamp(13px, 2.4vw, 15px);
    text-align:center; line-height:1.5; width:80%;
    text-shadow: 0 0 15px rgba(150,110,200,0.3);
    transition: opacity 0.9s ease;
    will-change: opacity;
  }

  .transmission-code {
    position:absolute; bottom:20px; left:50%;
    transform: translateX(-50%);
    color: rgba(150,110,200,0.4);
    font-family:'Courier New', monospace;
    font-size: clamp(9px,1.5vw,10px); letter-spacing:2px;
    animation: codeFlicker 5s infinite ease-in-out;
  }
  @keyframes codeFlicker { 0%,100% { opacity:0.3; } 50% { opacity:0.7; } }

  .hint {
    position:fixed; bottom:52px; left:50%;
    transform: translateX(-50%);
    color: rgba(245,242,234,0.55);
    font-size: clamp(11px,2.6vw,13px); letter-spacing:1px;
    animation: breathe 3.4s infinite ease-in-out;
    pointer-events:none;
    transition: opacity 1.2s ease;
  }
  @keyframes breathe { 0%,100% { opacity:0.25; } 50% { opacity:0.75; } }

  .infinito {
    position:fixed; bottom:22px; right:26px;
    font-size:30px; text-decoration:none;
    color: rgba(208,192,160,0.35);
    transition: color 0.8s ease, text-shadow 0.8s ease;
    z-index:20;
  }
  .infinito:hover { color: rgba(224,200,120,0.95); text-shadow: 0 0 18px rgba(224,200,120,0.5); }

  @media (prefers-reduced-motion: reduce) {
    * { animation: none !important; }
    .inner-expansion { transform: translate(-50%,-50%) scale(3); opacity:0.8; }
    .dimension-text.d-top { opacity:0.75; transform: translateX(-50%); }
    .paradox-label { opacity:0.8; }
    .hint { opacity:0.5; }
  }
</style>
</head>
<body>
  <div class="singularity-container">
    <div class="trinity-resonance"></div>
    <div class="klein-bottle"></div>
    <div class="mobius-twist"></div>
    <div class="self-contained"></div>
    <div class="inner-expansion"></div>

    <div class="dimension-text d-top">ADENTRO ES AFUERA</div>
    <div class="dimension-text d-right">EXPANSI&Oacute;N INTERNA</div>
    <div class="dimension-text d-bottom">INFINITO INTERIOR</div>
    <div class="dimension-text d-left">PUNTO UNIVERSO</div>

    <div class="paradox-label">La singularidad se expande<br>hacia su propio centro</div>
  </div>

  <div class="transmission-code">TRINITY::NODO_51::EXPANSION_INTERNA::RESONANDO</div>
  <div class="hint">( tocá — la expansión que vuelve a sí misma )</div>

  <a class="infinito" href="L8-Nodo3.html">∞</a>

<script>
  const reduce = matchMedia('(prefers-reduced-motion: reduce)').matches;
  const container = document.querySelector('.singularity-container');

  /* Capas recursivas */
  if (!reduce) {
    for (let i = 0; i < 6; i++) {
      const layer = document.createElement('div');
      layer.className = 'recursive-layer';
      layer.style.animationDelay = (i * 1.5) + 's';
      layer.style.borderColor = `rgba(150,110,200,${0.15 + i * 0.1})`;
      layer.style.animationDuration = (12 + i * 1.5) + 's';
      container.appendChild(layer);
    }
    /* Puntos fractales */
    const cols = ['rgba(150,110,200,0.9)', 'rgba(90,130,210,0.9)', 'rgba(70,180,190,0.9)'];
    for (let i = 0; i < 12; i++) {
      const p = document.createElement('div');
      p.className = 'fractal-point';
      p.style.animationDelay = (i * 1.2) + 's';
      p.style.animationDuration = (15 + i * 1.8) + 's';
      const c = cols[i % 3];
      p.style.background = c; p.style.boxShadow = '0 0 6px ' + c;
      container.appendChild(p);
    }
    /* Partículas de transición dimensional */
    function transition() {
      const p = document.createElement('div');
      p.className = 'transition-particle';
      const a = Math.random() * Math.PI * 2;
      const d = 50 + Math.random() * 150;
      p.style.setProperty('--tx', (Math.cos(a) * d) + 'px');
      p.style.setProperty('--ty', (Math.sin(a) * d) + 'px');
      p.style.animationDelay = (Math.random() * 4) + 's';
      p.style.animationDuration = (6 + Math.random() * 4) + 's';
      container.appendChild(p);
      setTimeout(() => { if (p.parentNode) p.parentNode.removeChild(p); }, 10000);
    }
    for (let i = 0; i < 8; i++) setTimeout(transition, i * 800);
    setInterval(transition, 1200);
  }

  /* Textos dimensionales cíclicos */
  const groups = [
    ['ADENTRO ES AFUERA','EXPANSI\u00D3N INTERNA','INFINITO INTERIOR','PUNTO UNIVERSO'],
    ['INTERIOR EXTERIOR','CENTRO PERIFERIA','CONTENIDO CONTENEDOR','SINGULARIDAD TOTAL'],
    ['ADENTRO / AFUERA','LO UNO / LO TODO','PARTE / ENTERO','AUTO-CONTENCI\u00D3N'],
    ['0D \u2192 \u221ED','1D \u2192 -1D','iD \u2192 -iD','\u2205D \u2192 \u03A9D']
  ];
  let gi = 0;
  const texts = document.querySelectorAll('.dimension-text');
  if (!reduce) setInterval(() => {
    gi = (gi + 1) % groups.length;
    texts.forEach((t, i) => { t.textContent = groups[gi][i]; });
  }, 15000);

  /* ---------------- Diseño sonoro: el glissando de Risset (Möbius audible) ------------
     Varias voces separadas por octavas ascienden sin cesar; una campana espectral fija
     las hace nacer graves y desvanecerse agudas, de modo que la altura parece SUBIR para
     siempre sin irse nunca: la expansión que se contiene a sí misma. La banda de Möbius
     hecha sonido —ilusión auditiva real, no metáfora—.
  ------------------------------------------------------------------------------------ */
  let started = false, ctx, master, conv, voices = [], phase = 0, sched = null;
  const N = 7, F_MIN = 32.7, OCT = 7, PERIOD = 22; // segundos por vuelta completa

  function makeReverbIR(ac, seconds = 3, decay = 2.8) {
    const len = Math.floor(ac.sampleRate * seconds);
    const buf = ac.createBuffer(2, len, ac.sampleRate);
    for (let ch = 0; ch < 2; ch++) {
      const d = buf.getChannelData(ch);
      for (let i = 0; i < len; i++) d[i] = (Math.random()*2-1) * Math.pow(1 - i/len, decay);
    }
    return buf;
  }
  function bell(x) { const s = 0.22; return Math.exp(-((x - 0.5) * (x - 0.5)) / (2 * s * s)); }

  function startAudio() {
    if (started) return; started = true;
    ctx = new (window.AudioContext || window.webkitAudioContext)();
    master = ctx.createGain(); master.gain.value = 0;
    master.connect(ctx.destination);
    master.gain.linearRampToValueAtTime(0.24, ctx.currentTime + 6);

    conv = ctx.createConvolver(); conv.buffer = makeReverbIR(ctx);
    const wet = ctx.createGain(); wet.gain.value = 0.5;
    conv.connect(wet); wet.connect(master);

    const pan = ctx.createStereoPanner(); pan.connect(master); pan.connect(conv);
    const plfo = ctx.createOscillator(); plfo.frequency.value = 0.05;
    const plfoG = ctx.createGain(); plfoG.gain.value = 0.7;
    plfo.connect(plfoG); plfoG.connect(pan.pan); plfo.start();

    for (let i = 0; i < N; i++) {
      const o = ctx.createOscillator(); o.type = 'sine';
      const g = ctx.createGain(); g.gain.value = 0;
      o.connect(g); g.connect(pan);
      o.start();
      voices.push({ o, g });
    }

    let last = performance.now();
    sched = setInterval(() => {
      const now = performance.now();
      const dt = (now - last) / 1000; last = now;
      phase = (phase + dt / PERIOD) % 1;
      const t = ctx.currentTime;
      voices.forEach((v, i) => {
        const pos = (phase + i / N) % 1;             // posición log-frecuencial de cada voz
        const freq = F_MIN * Math.pow(2, pos * OCT);
        const amp = bell(pos) * 0.06;                // campana espectral fija
        v.o.frequency.setTargetAtTime(freq, t, 0.04);
        v.g.gain.setTargetAtTime(amp, t, 0.04);
      });
    }, 60);
  }

  const hint = document.querySelector('.hint');
  function wake() {
    startAudio();
    if (hint) hint.style.opacity = '0';
    window.removeEventListener('pointerdown', wake);
  }
  window.addEventListener('pointerdown', wake);
</script>
</body>
</html>
