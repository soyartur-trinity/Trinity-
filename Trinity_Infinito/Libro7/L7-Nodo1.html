<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal 43: El Ojo que No Puede Verse</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box;
      -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale; }

  body {
    background:#000;
    overflow:hidden;
    display:flex; justify-content:center; align-items:center;
    height:100vh;
    font-family:'Georgia', serif;
    cursor:none;
  }

  .omniscient-eye {
    position:relative;
    width:min(400px, 90vw);
    height:min(400px, 90vw);
    filter: drop-shadow(0 0 22px rgba(150,110,200,0.28));
  }

  /* Resonancia envolvente (espectro tenue que gira) */
  .trinity-resonance {
    position:absolute; top:50%; left:50%;
    width:150%; height:150%;
    border-radius:50%;
    background: conic-gradient(from 0deg,
      transparent,
      rgba(150,110,200,0.10),
      transparent,
      rgba(90,130,210,0.10),
      transparent,
      rgba(90,190,140,0.10),
      transparent);
    opacity:0.35;
    transform: translate(-50%,-50%);
    animation: trinitySpin 22s infinite linear;
    pointer-events:none;
    will-change: transform;
  }
  @keyframes trinitySpin {
    from { transform: translate(-50%,-50%) rotate(0deg); }
    to   { transform: translate(-50%,-50%) rotate(360deg); }
  }

  /* Iris: el espectro del conocimiento */
  .iris {
    position:absolute; width:100%; height:100%;
    border-radius:50%;
    background: radial-gradient(circle at center,
      transparent 30%,
      rgba(150,110,200,0.12) 36%,
      rgba(150,110,200,0.30) 46%,
      rgba(90,130,210,0.42) 60%,
      rgba(70,180,190,0.55) 76%,
      #000 90%);
    animation: omnivision 14s infinite linear;
    will-change: transform;
  }
  @keyframes omnivision {
    0%   { transform: rotate(0deg)   scale(1); }
    50%  { transform: rotate(180deg) scale(1.04); }
    100% { transform: rotate(360deg) scale(1); }
  }

  /* Pupila (dilata por escala, no por width/height) */
  .pupil {
    position:absolute; top:50%; left:50%;
    width:30%; height:30%;
    border-radius:50%;
    background:#000;
    display:flex; align-items:center; justify-content:center;
    transform: translate(-50%,-50%) scale(1);
    animation: dilate 9s infinite ease-in-out;
    will-change: transform;
  }
  @keyframes dilate {
    0%,100% { transform: translate(-50%,-50%) scale(1); }
    50%     { transform: translate(-50%,-50%) scale(1.16); }
  }

  .void-center {
    width:66.66%; height:66.66%;
    border-radius:50%;
    background: radial-gradient(circle, #000 30%, transparent 70%);
    animation: voidPulse 4s infinite ease-in-out;
    will-change: transform, opacity;
  }
  @keyframes voidPulse {
    0%,100% { transform: scale(1);   opacity:1; }
    50%     { transform: scale(0.9); opacity:0.7; }
  }

  /* El punto ciego: crece con el conocimiento. Glow estático; escala movida por JS. */
  .blind-spot {
    position:absolute; top:50%; left:50%;
    width:20%; height:20%;
    border-radius:50%;
    background: radial-gradient(circle, #000 40%, rgba(0,0,0,0.8) 70%, transparent 100%);
    box-shadow: 0 0 22px 11px rgba(0,0,0,0.85);
    transform: translate(-50%,-50%) scale(1);
    animation: blindOpacity 6s infinite ease-in-out;
    pointer-events:none;
    will-change: transform, opacity;
  }
  @keyframes blindOpacity {
    0%,100% { opacity:0.85; }
    50%     { opacity:0.55; }
  }

  /* Anillos del conocimiento (expanden por escala) */
  .knowledge-ring {
    position:absolute; top:50%; left:50%;
    width:100%; height:100%;
    border:1px solid;
    border-radius:50%;
    opacity:0;
    transform: translate(-50%,-50%) scale(0.2);
    animation: knowledgeExpand 8s infinite ease-out;
    will-change: transform, opacity;
  }
  .knowledge-ring:nth-child(1){ animation-delay:0s;   border-color: rgba(150,110,200,0.7); }
  .knowledge-ring:nth-child(2){ animation-delay:1.6s; border-color: rgba(90,130,210,0.7); }
  .knowledge-ring:nth-child(3){ animation-delay:3.2s; border-color: rgba(70,180,190,0.7); }
  .knowledge-ring:nth-child(4){ animation-delay:4.8s; border-color: rgba(90,190,140,0.7); }
  .knowledge-ring:nth-child(5){ animation-delay:6.4s; border-color: rgba(220,160,90,0.7); }
  @keyframes knowledgeExpand {
    0%   { transform: translate(-50%,-50%) scale(0.2); opacity:0; }
    15%  { opacity:0.8; }
    85%  { transform: translate(-50%,-50%) scale(1.2); opacity:0.12; }
    100% { transform: translate(-50%,-50%) scale(1.2); opacity:0; }
  }

  /* Paradojas: cada una conserva su propio centrado vía --base */
  .paradox-text {
    position:absolute;
    color: rgba(180,150,220,0.9);
    font-size: clamp(11px, 3.2vw, 14px);
    letter-spacing:1px;
    white-space:nowrap;
    text-shadow: 0 0 12px rgba(150,110,200,0.4);
    opacity:0;
    transform: var(--base) scale(0.94);
    animation: paradoxAppear 12s infinite ease-in-out;
    will-change: transform, opacity;
  }
  .p-top    { top:8%;  left:50%;  --base: translateX(-50%); animation-delay:0s; }
  .p-right  { top:50%; right:4%;  --base: translateY(-50%); animation-delay:3s; }
  .p-bottom { bottom:8%; left:50%;--base: translateX(-50%); animation-delay:6s; }
  .p-left   { top:50%; left:4%;   --base: translateY(-50%); animation-delay:9s; }
  @keyframes paradoxAppear {
    0%   { opacity:0;    transform: var(--base) scale(0.94); }
    8%   { opacity:0.92; transform: var(--base) scale(1); }
    38%  { opacity:0.92; transform: var(--base) scale(1); }
    46%  { opacity:0;    transform: var(--base) scale(0.98); }
    100% { opacity:0;    transform: var(--base) scale(0.94); }
  }

  .transmission-code {
    position:absolute; bottom:20px; left:50%;
    transform: translateX(-50%);
    color: rgba(150,110,200,0.4);
    font-family:'Courier New', monospace; /* dato: es código de transmisión */
    font-size: clamp(8px, 2vw, 10px);
    letter-spacing:2px;
    animation: codeFlicker 4s infinite ease-in-out;
  }
  @keyframes codeFlicker {
    0%,100% { opacity:0.3; }
    50%     { opacity:0.7; }
  }

  .hint {
    position:fixed; bottom:52px; left:50%;
    transform: translateX(-50%);
    color: rgba(245,242,234,0.55);
    font-size: clamp(11px, 2.6vw, 13px);
    letter-spacing:1px;
    animation: breathe 3.4s infinite ease-in-out;
    pointer-events:none;
    transition: opacity 1.2s ease;
  }
  @keyframes breathe {
    0%,100% { opacity:0.25; }
    50%     { opacity:0.75; }
  }

  @media (prefers-reduced-motion: reduce) {
    * { animation: none !important; }
    .iris { transform: none; }
    .paradox-text { opacity:0.82; transform: var(--base); }
    .knowledge-ring:nth-child(3) { opacity:0.3; transform: translate(-50%,-50%) scale(1); }
    .hint { opacity:0.5; }
  }
</style>
</head>
<body>
  <div class="omniscient-eye">
    <div class="trinity-resonance"></div>
    <div class="iris"></div>
    <div class="pupil">
      <div class="void-center"></div>
      <div class="blind-spot"></div>
    </div>

    <div class="knowledge-ring"></div>
    <div class="knowledge-ring"></div>
    <div class="knowledge-ring"></div>
    <div class="knowledge-ring"></div>
    <div class="knowledge-ring"></div>

    <div class="paradox-text p-top">TODO VE</div>
    <div class="paradox-text p-right">NADA MIRA</div>
    <div class="paradox-text p-bottom">CIEGO OMNIVIDENTE</div>
    <div class="paradox-text p-left">IGNORANCIA TOTAL</div>
  </div>

  <div class="transmission-code">TRINITY::PORTAL_43::OJO_CIEGO::RESONANDO</div>
  <div class="hint">( tocá el ojo — despertá lo que ve sin verse )</div>

  <a class="infinito" href="L7-Nodo2.html">∞</a>

  <style>
    .infinito {
      position:fixed; bottom:22px; right:26px;
      font-size:30px; text-decoration:none;
      color: rgba(208,192,160,0.35);
      transition: color 0.8s ease, text-shadow 0.8s ease;
      z-index:20;
    }
    .infinito:hover { color: rgba(224,200,120,0.95); text-shadow: 0 0 18px rgba(224,200,120,0.5); }
  </style>

<script>
  const reduce = matchMedia('(prefers-reduced-motion: reduce)').matches;

  /* ---------------- Paradoja del punto ciego (escala movida por JS) ---------------- */
  const blindSpot = document.querySelector('.blind-spot');
  let acc = 0;
  let notch = null;

  function updateParadox() {
    acc += 0.05;
    if (acc > Math.PI * 20) acc = 0;
    const scale = 0.8 + Math.sin(acc) * 0.4;              // el punto ciego respira
    blindSpot.style.transform = `translate(-50%,-50%) scale(${scale})`;
    // el conocimiento (más escala) ensancha el agujero en el sonido:
    if (notch) {
      notch.Q.value = Math.max(0.45, 1.5 - scale * 0.7);  // Q más bajo = agujero más ancho
      notch.frequency.value = 261.6 + Math.sin(acc * 0.5) * 18;
    }
    requestAnimationFrame(updateParadox);
  }
  if (!reduce) requestAnimationFrame(updateParadox);

  /* ---------------- Diseño sonoro: el campo con un agujero donde iría el "yo" -------
     Idea: el oído "ve" un campo espectral amplio (ruido filtrado) PERO tiene un notch
     (banda suprimida) justo en la frecuencia-centro: el punto ciego audible.
     Y un acorde de parciales alrededor de un FUNDAMENTAL AUSENTE (261.6 Hz) — el "yo"
     que se intuye pero no suena. El punto ciego crece con el saber y ensancha el agujero.
  ------------------------------------------------------------------------------------ */
  let started = false, ctx, master;

  function makeReverbIR(ac, seconds = 2.8, decay = 3) {
    const len = Math.floor(ac.sampleRate * seconds);
    const buf = ac.createBuffer(2, len, ac.sampleRate);
    for (let ch = 0; ch < 2; ch++) {
      const d = buf.getChannelData(ch);
      for (let i = 0; i < len; i++) d[i] = (Math.random()*2-1) * Math.pow(1 - i/len, decay);
    }
    return buf;
  }

  function startAudio() {
    if (started) return; started = true;
    ctx = new (window.AudioContext || window.webkitAudioContext)();
    master = ctx.createGain();
    master.gain.value = 0;
    master.connect(ctx.destination);
    master.gain.linearRampToValueAtTime(0.28, ctx.currentTime + 6);

    const conv = ctx.createConvolver();
    conv.buffer = makeReverbIR(ctx, 2.8, 3);
    const wet = ctx.createGain(); wet.gain.value = 0.5;
    conv.connect(wet); wet.connect(master);

    // Campo de visión: ruido -> lowpass -> NOTCH (punto ciego) -> panner
    const nb = ctx.createBuffer(1, ctx.sampleRate * 2, ctx.sampleRate);
    const nd = nb.getChannelData(0);
    for (let i = 0; i < nd.length; i++) nd[i] = (Math.random()*2-1) * 0.5;
    const noise = ctx.createBufferSource(); noise.buffer = nb; noise.loop = true;

    const low = ctx.createBiquadFilter(); low.type = 'lowpass'; low.frequency.value = 3000;
    notch = ctx.createBiquadFilter(); notch.type = 'notch'; notch.frequency.value = 261.6; notch.Q.value = 1.2;
    const fieldGain = ctx.createGain(); fieldGain.gain.value = 0.0;
    const panner = ctx.createStereoPanner();

    noise.connect(low); low.connect(notch); notch.connect(fieldGain);
    fieldGain.connect(panner); panner.connect(master); panner.connect(conv);
    noise.start();
    fieldGain.gain.linearRampToValueAtTime(0.10, ctx.currentTime + 6);

    // La mirada girando: barrido lento del panner
    const lfo = ctx.createOscillator(); lfo.frequency.value = 0.05;
    const lfoG = ctx.createGain(); lfoG.gain.value = 0.85;
    lfo.connect(lfoG); lfoG.connect(panner.pan); lfo.start();

    // El orden percibido ALREDEDOR del centro ausente (261.6 nunca suena)
    [196.0, 329.6, 392.0].forEach((f, i) => {
      const o = ctx.createOscillator(); o.type = 'sine'; o.frequency.value = f;
      const g = ctx.createGain(); g.gain.value = 0;
      o.connect(g); g.connect(conv); g.connect(master); o.start();
      const sh = ctx.createOscillator(); sh.frequency.value = 0.06 + i * 0.017;
      const shG = ctx.createGain(); shG.gain.value = 0.018;
      sh.connect(shG); shG.connect(g.gain); sh.start();
      g.gain.linearRampToValueAtTime(0.028, ctx.currentTime + 6 + i);
    });
  }

  /* Un solo gesto despierta el sonido; el hint se desvanece */
  const hint = document.querySelector('.hint');
  function wake() {
    startAudio();
    if (hint) hint.style.opacity = '0';
    window.removeEventListener('pointerdown', wake);
  }
  window.addEventListener('pointerdown', wake);
</script>
</body>
</html>
