<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal 44: La Biblioteca que Se Lee a Sí Misma</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box;
      -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale; }

  body {
    background:#0a0a0a;
    overflow:hidden;
    display:flex; justify-content:center; align-items:center;
    height:100vh;
    font-family:'Georgia', serif;
    cursor:none;
  }

  .infinite-library {
    position:relative;
    width:min(500px, 92vw);
    height:min(500px, 92vw);
    perspective:1000px;
  }

  .book-layer {
    position:absolute; width:100%; height:100%;
    transform-style:preserve-3d;
    animation: libraryRotate 24s infinite linear;
    will-change: transform;
  }
  @keyframes libraryRotate {
    from { transform: rotateY(0deg); }
    to   { transform: rotateY(360deg); }
  }

  .book {
    position:absolute;
    top:50%; left:50%;
    width:60px; height:80px;
    margin:-40px 0 0 -30px;
    background: linear-gradient(135deg, rgba(150,110,200,0.32), rgba(90,130,210,0.32));
    border:1px solid rgba(150,110,200,0.5);
    box-shadow: 0 0 14px rgba(150,110,200,0.35);   /* glow estático */
    transform-style:preserve-3d;
    animation: selfRead 8s infinite ease-in-out;
    will-change: transform;
  }
  .book::before {
    content:'';
    position:absolute; inset:0;
    background: repeating-linear-gradient(0deg,
      transparent, transparent 2px,
      rgba(255,255,255,0.10) 2px, rgba(255,255,255,0.10) 3px);
    animation: textFlow 3s infinite linear;
  }
  .book:nth-child(1){ transform: rotateY(0deg)   translateZ(200px); animation-delay:0s; }
  .book:nth-child(2){ transform: rotateY(45deg)  translateZ(200px); animation-delay:1s; }
  .book:nth-child(3){ transform: rotateY(90deg)  translateZ(200px); animation-delay:2s; }
  .book:nth-child(4){ transform: rotateY(135deg) translateZ(200px); animation-delay:3s; }
  .book:nth-child(5){ transform: rotateY(180deg) translateZ(200px); animation-delay:4s; }
  .book:nth-child(6){ transform: rotateY(225deg) translateZ(200px); animation-delay:5s; }
  .book:nth-child(7){ transform: rotateY(270deg) translateZ(200px); animation-delay:6s; }
  .book:nth-child(8){ transform: rotateY(315deg) translateZ(200px); animation-delay:7s; }

  /* selfRead: la rotación base de cada libro se conserva vía --face; sólo late la escala */
  .book:nth-child(1){ --face: rotateY(0deg)   translateZ(200px); }
  .book:nth-child(2){ --face: rotateY(45deg)  translateZ(200px); }
  .book:nth-child(3){ --face: rotateY(90deg)  translateZ(200px); }
  .book:nth-child(4){ --face: rotateY(135deg) translateZ(200px); }
  .book:nth-child(5){ --face: rotateY(180deg) translateZ(200px); }
  .book:nth-child(6){ --face: rotateY(225deg) translateZ(200px); }
  .book:nth-child(7){ --face: rotateY(270deg) translateZ(200px); }
  .book:nth-child(8){ --face: rotateY(315deg) translateZ(200px); }
  @keyframes selfRead {
    0%,100% { transform: var(--face) scale(1); }
    50%     { transform: var(--face) scale(1.16); }
  }
  @keyframes textFlow { from { transform: translateY(0); } to { transform: translateY(-10px); } }

  .reading-consciousness {
    position:absolute; top:50%; left:50%;
    width:150px; height:150px;
    border-radius:50%;
    background: radial-gradient(circle, rgba(150,110,200,0.3), transparent 70%);
    transform: translate(-50%,-50%);
    animation: consciousnessPulse 4s infinite ease-in-out;
    will-change: transform, opacity;
  }
  @keyframes consciousnessPulse {
    0%,100% { transform: translate(-50%,-50%) scale(1);   opacity:0.7; }
    50%     { transform: translate(-50%,-50%) scale(1.3); opacity:0.3; }
  }

  /* Streams: cada uno lleva su orientación en --dir, el keyframe sólo mueve/opacidad */
  .knowledge-stream {
    position:absolute;
    width:2px; height:100px;
    background: linear-gradient(to bottom, transparent, rgba(90,130,210,0.6), transparent);
    opacity:0;
    animation: streamFlow 3s infinite ease-in-out;
    will-change: transform, opacity;
  }
  .s-top    { top:0;    left:50%; --dir: translateX(-50%); animation-delay:0s;    }
  .s-right  { top:50%;  right:0;  --dir: translateY(-50%) rotate(90deg); animation-delay:0.75s; }
  .s-bottom { bottom:0; left:50%; --dir: translateX(-50%); animation-delay:1.5s;  }
  .s-left   { top:50%;  left:0;   --dir: translateY(-50%) rotate(90deg); animation-delay:2.25s; }
  @keyframes streamFlow {
    0%   { opacity:0;   transform: var(--dir) translateY(-46px); }
    50%  { opacity:0.8; }
    100% { opacity:0;   transform: var(--dir) translateY(46px); }
  }

  .meta-text {
    position:absolute; left:50%;
    color: rgba(180,150,220,0.75);
    font-size: clamp(13px, 3.2vw, 15px);
    font-style:italic;
    text-shadow: 0 0 12px rgba(150,110,200,0.35);
    opacity:0;
    transform: translateX(-50%);
    animation: metaAppear 13s infinite ease-in-out;
    will-change: opacity, transform;
  }
  .meta-text.m1 { top:18%; animation-delay:0s; }
  .meta-text.m2 { top:80%; animation-delay:6.5s; }
  @keyframes metaAppear {
    0%   { opacity:0;    transform: translateX(-50%) scale(0.97); }
    12%  { opacity:0.9;  transform: translateX(-50%) scale(1); }
    80%  { opacity:0.9;  transform: translateX(-50%) scale(1); }
    92%  { opacity:0;    transform: translateX(-50%) scale(0.99); }
    100% { opacity:0;    transform: translateX(-50%) scale(0.97); }
  }

  .ouroboros-text {
    position:absolute; top:50%; left:50%;
    width:300px; height:300px;
    transform: translate(-50%,-50%);
    animation: textCircle 26s infinite linear;
    will-change: transform;
  }
  .ouroboros-text span {
    position:absolute; left:50%;
    font-size:10px;
    color: rgba(70,180,190,0.55);
    transform-origin: 0 150px;
    text-shadow: 0 0 5px rgba(70,180,190,0.3);
  }
  @keyframes textCircle {
    from { transform: translate(-50%,-50%) rotate(0deg); }
    to   { transform: translate(-50%,-50%) rotate(360deg); }
  }

  .transmission-code {
    position:absolute; bottom:20px; left:50%;
    transform: translateX(-50%);
    color: rgba(150,110,200,0.4);
    font-family:'Courier New', monospace;
    font-size:10px; letter-spacing:2px;
    animation: codeFlicker 3s infinite ease-in-out;
  }
  @keyframes codeFlicker { 0%,100% { opacity:0.4; } 50% { opacity:0.7; } }

  .hint {
    position:fixed; bottom:52px; left:50%;
    transform: translateX(-50%);
    color: rgba(245,242,234,0.55);
    font-size: clamp(11px, 2.6vw, 13px);
    letter-spacing:1px;
    animation: breathe 3.4s infinite ease-in-out;
    pointer-events:none;
    transition: opacity 1.2s ease;
  }
  @keyframes breathe { 0%,100% { opacity:0.25; } 50% { opacity:0.75; } }

  .infinito {
    position:fixed; bottom:22px; right:26px;
    font-size:30px; text-decoration:none;
    color: rgba(208,192,160,0.35);
    transition: color 0.8s ease, text-shadow 0.8s ease;
    z-index:20;
  }
  .infinito:hover { color: rgba(224,200,120,0.95); text-shadow: 0 0 18px rgba(224,200,120,0.5); }

  @media (prefers-reduced-motion: reduce) {
    * { animation: none !important; }
    .book-layer { transform: rotateY(25deg); }
    .meta-text.m1 { opacity:0.85; }
    .reading-consciousness { opacity:0.5; }
    .hint { opacity:0.5; }
  }
</style>
</head>
<body>
  <div class="infinite-library">
    <div class="book-layer">
      <div class="book"></div><div class="book"></div>
      <div class="book"></div><div class="book"></div>
      <div class="book"></div><div class="book"></div>
      <div class="book"></div><div class="book"></div>
    </div>

    <div class="reading-consciousness"></div>

    <div class="knowledge-stream s-top"></div>
    <div class="knowledge-stream s-right"></div>
    <div class="knowledge-stream s-bottom"></div>
    <div class="knowledge-stream s-left"></div>

    <div class="ouroboros-text"></div>

    <div class="meta-text m1">Leyéndose a sí misma</div>
    <div class="meta-text m2">El lector es lo leído</div>
  </div>

  <div class="transmission-code">PORTAL_44::BIBLIOTECA_OUROBOROS::ACTIVO</div>
  <div class="hint">( tocá — dejá que la biblioteca se lea a sí misma )</div>

  <a class="infinito" href="L7-Nodo3.html">∞</a>

<script>
  const reduce = matchMedia('(prefers-reduced-motion: reduce)').matches;

  /* Texto circular ouroboros */
  const ouro = document.querySelector('.ouroboros-text');
  const text = 'TODO LIBRO CONTIENE TODOS LOS LIBROS \u2022 ';
  [...text].forEach((ch, i) => {
    const s = document.createElement('span');
    s.textContent = ch;
    s.style.transform = `rotate(${i * (360 / text.length)}deg)`;
    ouro.appendChild(s);
  });

  /* ---------------- Diseño sonoro: la recursión que se lee a sí misma --------------
     Cada "lectura" (un motivo breve de dos notas) entra a un DelayNode realimentado:
     el eco del eco. Cada repetición queda anidada dentro de la anterior — ouroboros.
     Un lowpass en el lazo oscurece las lecturas viejas: se hunden en los estantes.
  ------------------------------------------------------------------------------------ */
  let started = false, ctx, master, delay, readTimer;

  function makeReverbIR(ac, seconds = 3, decay = 3) {
    const len = Math.floor(ac.sampleRate * seconds);
    const buf = ac.createBuffer(2, len, ac.sampleRate);
    for (let ch = 0; ch < 2; ch++) {
      const d = buf.getChannelData(ch);
      for (let i = 0; i < len; i++) d[i] = (Math.random()*2-1) * Math.pow(1 - i/len, decay);
    }
    return buf;
  }

  function readOnce() {
    if (!started) return;
    const t = ctx.currentTime;
    [330, 247].forEach((f, i) => {
      const o = ctx.createOscillator(); o.type = 'triangle'; o.frequency.value = f;
      const g = ctx.createGain(); g.gain.value = 0;
      o.connect(g); g.connect(delay); g.connect(master);   // seca + hacia la recursión
      const st = t + i * 0.30;
      g.gain.setValueAtTime(0, st);
      g.gain.linearRampToValueAtTime(0.06, st + 0.04);
      g.gain.exponentialRampToValueAtTime(0.0008, st + 0.95);
      o.start(st); o.stop(st + 1.1);
    });
  }

  function startAudio() {
    if (started) return; started = true;
    ctx = new (window.AudioContext || window.webkitAudioContext)();
    master = ctx.createGain();
    master.gain.value = 0;
    master.connect(ctx.destination);
    master.gain.linearRampToValueAtTime(0.26, ctx.currentTime + 6);

    const conv = ctx.createConvolver();
    conv.buffer = makeReverbIR(ctx, 3, 3);
    const wet = ctx.createGain(); wet.gain.value = 0.5;
    conv.connect(wet); wet.connect(master);

    // Presencia de la biblioteca: drone grave
    [98, 147].forEach((f) => {
      const o = ctx.createOscillator(); o.type = 'sine'; o.frequency.value = f;
      const g = ctx.createGain(); g.gain.value = 0;
      o.connect(g); g.connect(conv); g.connect(master); o.start();
      g.gain.linearRampToValueAtTime(0.026, ctx.currentTime + 6);
    });

    // Lazo recursivo (eco del eco) con panner que gira como la biblioteca
    delay = ctx.createDelay(2.0); delay.delayTime.value = 0.66;
    const fb = ctx.createGain(); fb.gain.value = 0.74;
    const fbLow = ctx.createBiquadFilter(); fbLow.type = 'lowpass'; fbLow.frequency.value = 2200;
    const dPan = ctx.createStereoPanner();
    delay.connect(fbLow); fbLow.connect(fb); fb.connect(delay);   // realimentación
    delay.connect(dPan); dPan.connect(master); dPan.connect(conv);

    const lfo = ctx.createOscillator(); lfo.frequency.value = 0.04;
    const lfoG = ctx.createGain(); lfoG.gain.value = 0.9;
    lfo.connect(lfoG); lfoG.connect(dPan.pan); lfo.start();

    setTimeout(readOnce, 800);
    readTimer = setInterval(readOnce, 4600);
  }

  const hint = document.querySelector('.hint');
  function wake() {
    startAudio();
    if (hint) hint.style.opacity = '0';
    window.removeEventListener('pointerdown', wake);
  }
  window.addEventListener('pointerdown', wake);
</script>
</body>
</html>
