<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal 49: El Conocimiento que Se Desconoce &mdash; Trinity Infinito</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box;
      -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale; }

  body {
    background: radial-gradient(ellipse at center, #0a0012, #000);
    overflow:hidden;
    display:flex; justify-content:center; align-items:center;
    height:100vh;
    font-family:'Georgia', serif;
    cursor:none;
  }

  .knowledge-paradox {
    position:relative;
    width:min(700px, 95vw);
    height:min(700px, 95vw);
    filter: drop-shadow(0 0 40px rgba(150,110,200,0.2));
  }

  .trinity-resonance {
    position:absolute; top:50%; left:50%;
    width:130%; height:130%;
    background:
      radial-gradient(circle at 30% 30%, rgba(150,110,200,0.05) 0%, transparent 50%),
      radial-gradient(circle at 70% 70%, rgba(90,130,210,0.05) 0%, transparent 50%),
      radial-gradient(circle at 50% 50%, rgba(90,190,140,0.03) 0%, transparent 50%);
    transform: translate(-50%,-50%);
    animation: resonancePulse 30s infinite alternate ease-in-out;
    pointer-events:none;
    will-change: transform, opacity;
  }
  @keyframes resonancePulse {
    0%   { opacity:0.2; transform: translate(-50%,-50%) scale(1); }
    100% { opacity:0.6; transform: translate(-50%,-50%) scale(1.1); }
  }

  /* Esfera de gnosis: espectro iridiscente suavizado por mascara radial, sin desenfoque */
  .gnosis-sphere {
    position:absolute; top:50%; left:50%;
    width:min(350px,50vw); height:min(350px,50vw);
    border-radius:50%;
    background: conic-gradient(from 0deg,
      rgba(150,110,200,0.35), rgba(90,130,210,0.35), rgba(70,180,190,0.35),
      rgba(90,190,140,0.35), rgba(220,160,90,0.35), rgba(200,90,110,0.35),
      rgba(150,110,200,0.35));
    -webkit-mask: radial-gradient(circle, #000 30%, rgba(0,0,0,0.6) 55%, transparent 74%);
            mask: radial-gradient(circle, #000 30%, rgba(0,0,0,0.6) 55%, transparent 74%);
    transform: translate(-50%,-50%) rotate(0deg);
    animation: gnosisRotate 25s infinite linear;
    will-change: transform;
  }
  @keyframes gnosisRotate {
    from { transform: translate(-50%,-50%) rotate(0deg); }
    to   { transform: translate(-50%,-50%) rotate(360deg); }
  }

  /* Núcleo del no-saber: escala por CSS, opacidad por JS */
  .unknowing-core {
    position:absolute; top:50%; left:50%;
    width:min(200px,28vw); height:min(200px,28vw);
    border-radius:50%;
    background: radial-gradient(circle, #000 30%, rgba(0,0,0,0.9) 50%, transparent 80%);
    transform: translate(-50%,-50%) scale(1);
    animation: corePulse 6s infinite alternate ease-in-out;
    will-change: transform;
  }
  @keyframes corePulse {
    0%   { transform: translate(-50%,-50%) scale(1); }
    100% { transform: translate(-50%,-50%) scale(1.25); }
  }

  .knowledge-fragment {
    position:absolute; top:50%; left:50%;
    color: rgba(180,150,220,0.8);
    font-size: clamp(10px,1.8vw,12px);
    font-weight:300;
    text-shadow: 0 0 10px rgba(150,110,200,0.4);
    animation: fragmentOrbit 18s infinite linear;
    will-change: transform;
    pointer-events:none;
  }
  .knowledge-fragment.forgetting {
    animation: fragmentFade 10s infinite ease-in-out;
    will-change: opacity;
  }
  @keyframes fragmentOrbit {
    from { transform: rotate(0deg)   translateX(min(175px,25vw)) rotate(0deg); }
    to   { transform: rotate(360deg) translateX(min(175px,25vw)) rotate(-360deg); }
  }
  @keyframes fragmentFade {
    0%,100% { opacity:0; }
    30%,70% { opacity:1; }
  }

  /* Auto-borrado: líneas que tachan el saber */
  .self-erasure {
    position:absolute; width:100%; height:100%;
    animation: eraseRotate 40s infinite linear reverse;
    will-change: transform;
  }
  .erasure-line {
    position:absolute; top:50%; left:0; width:100%; height:1px;
    background: linear-gradient(90deg, transparent, rgba(0,0,0,0.9) 45%, rgba(0,0,0,1) 50%, rgba(0,0,0,0.9) 55%, transparent);
    transform-origin:center;
  }
  .erasure-line:nth-child(2){ transform: rotate(30deg); }
  .erasure-line:nth-child(3){ transform: rotate(60deg); }
  .erasure-line:nth-child(4){ transform: rotate(90deg); }
  .erasure-line:nth-child(5){ transform: rotate(120deg); }
  .erasure-line:nth-child(6){ transform: rotate(150deg); }
  @keyframes eraseRotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

  /* Ouroboros del conocimiento */
  .ouroboros-knowledge {
    position:absolute; top:50%; left:50%;
    width:min(450px,65vw); height:min(450px,65vw);
    border:1px solid rgba(150,110,200,0.3);
    border-radius:50%;
    transform: translate(-50%,-50%);
    animation: ouroborosRotate 35s infinite linear;
    will-change: transform;
  }
  @keyframes ouroborosRotate {
    from { transform: translate(-50%,-50%) rotate(0deg); }
    to   { transform: translate(-50%,-50%) rotate(360deg); }
  }
  .ouroboros-knowledge::before {
    content:''; position:absolute; top:-5px; left:50%;
    width:10px; height:10px;
    background: rgba(150,110,200,0.9); border-radius:50%;
    box-shadow: 0 0 15px rgba(150,110,200,0.8);
    transform: translateX(-50%) scale(1);
    animation: headPulse 3s infinite alternate;
  }
  .ouroboros-knowledge::after {
    content:''; position:absolute; bottom:-5px; left:50%;
    width:10px; height:10px;
    background: rgba(90,130,210,0.9); border-radius:50%;
    box-shadow: 0 0 15px rgba(90,130,210,0.8);
    transform: translateX(-50%) scale(1.3);
    animation: tailPulse 3s infinite alternate;
  }
  @keyframes headPulse {
    0%   { transform: translateX(-50%) scale(1);   opacity:0.7; }
    100% { transform: translateX(-50%) scale(1.3); opacity:1; }
  }
  @keyframes tailPulse {
    0%   { transform: translateX(-50%) scale(1.3); opacity:1; }
    100% { transform: translateX(-50%) scale(1);   opacity:0.7; }
  }

  /* Los dos nudos: saber que no se sabe / no saber que se sabe */
  .meta-knowledge, .anti-knowledge {
    position:absolute; left:50%;
    font-size: clamp(12px,2.2vw,14px);
    text-align:center; line-height:1.5; width:80%;
    transform: translateX(-50%);
    animation: metaPulse 8s infinite ease-in-out;
    will-change: opacity;
  }
  .meta-knowledge { top:10%;    color: rgba(180,150,220,0.7); text-shadow: 0 0 15px rgba(150,110,200,0.3); }
  .anti-knowledge { bottom:10%; color: rgba(120,160,225,0.7); text-shadow: 0 0 15px rgba(90,130,210,0.3); animation-direction:reverse; }
  @keyframes metaPulse { 0%,100% { opacity:0.4; } 50% { opacity:0.9; } }

  .quantum-uncertainty {
    position:absolute; width:2px; height:2px;
    background:#fff; opacity:0; border-radius:50%;
    transform: scale(1);
    animation: quantumFlicker 0.8s infinite ease-in-out;
    will-change: transform, opacity;
    pointer-events:none;
  }
  @keyframes quantumFlicker {
    0%,100% { opacity:0;   transform: scale(1); }
    50%     { opacity:0.9; transform: scale(1.5); }
  }

  .paradox-indicator {
    position:fixed; top:50%; left:50%;
    transform: translate(-50%,-50%);
    font-size: clamp(24px,6vw,32px);
    color: rgba(150,110,200,0);
    letter-spacing:8px; font-weight:300;
    pointer-events:none; z-index:999;
    text-shadow: 0 0 30px rgba(150,110,200,0);
    transition: color 1.5s ease, text-shadow 1.5s ease;
    will-change: color, text-shadow;
  }
  .paradox-indicator.active {
    color: rgba(180,150,220,0.9);
    text-shadow: 0 0 50px rgba(150,110,200,0.9);
  }

  .transmission-code {
    position:absolute; bottom:20px; left:50%;
    transform: translateX(-50%);
    color: rgba(150,110,200,0.4);
    font-family:'Courier New', monospace;
    font-size: clamp(9px,1.5vw,10px); letter-spacing:2px;
    animation: codeFlicker 6s infinite ease-in-out;
  }
  @keyframes codeFlicker { 0%,100% { opacity:0.3; } 50% { opacity:0.7; } }

  .hint {
    position:fixed; bottom:52px; left:50%;
    transform: translateX(-50%);
    color: rgba(245,242,234,0.55);
    font-size: clamp(11px,2.6vw,13px); letter-spacing:1px;
    animation: breathe 3.4s infinite ease-in-out;
    pointer-events:none;
    transition: opacity 1.2s ease;
    z-index:1000;
  }
  @keyframes breathe { 0%,100% { opacity:0.25; } 50% { opacity:0.75; } }

  .infinito {
    position:fixed; bottom:22px; right:26px;
    font-size:30px; text-decoration:none;
    color: rgba(208,192,160,0.35);
    transition: color 0.8s ease, text-shadow 0.8s ease;
    z-index:1001;
  }
  .infinito:hover { color: rgba(224,200,120,0.95); text-shadow: 0 0 18px rgba(224,200,120,0.5); }

  @media (prefers-reduced-motion: reduce) {
    * { animation: none !important; }
    .gnosis-sphere { transform: translate(-50%,-50%); }
    .meta-knowledge { opacity:0.75; }
    .anti-knowledge { opacity:0.75; }
    .hint { opacity:0.5; }
  }
</style>
</head>
<body>
  <div class="paradox-indicator" id="paradoxMsg">&#9672;</div>

  <div class="knowledge-paradox">
    <div class="trinity-resonance"></div>
    <div class="gnosis-sphere"></div>
    <div class="unknowing-core"></div>

    <div class="self-erasure">
      <div class="erasure-line"></div>
      <div class="erasure-line"></div>
      <div class="erasure-line"></div>
      <div class="erasure-line"></div>
      <div class="erasure-line"></div>
      <div class="erasure-line"></div>
    </div>

    <div class="ouroboros-knowledge"></div>

    <div class="meta-knowledge">Saber que no se sabe<br>que se sabe</div>
    <div class="anti-knowledge">No saber que se sabe<br>que no se sabe</div>
  </div>

  <div class="transmission-code">TRINITY::PORTAL_49::GNOSIS_AMNESICA::LIBRO_7_NODO_7::RESONANDO</div>
  <div class="hint">( tocá — el conocimiento que se desconoce a s&iacute; mismo )</div>

  <a class="infinito" href="L7-Nodo1.html" title="el libro se muerde la cola">∞</a>

<script>
  const reduce = matchMedia('(prefers-reduced-motion: reduce)').matches;
  const paradox = document.querySelector('.knowledge-paradox');

  /* Fragmentos orbitales (algunos se olvidan cíclicamente) */
  const fragments = ['CERTEZA','DUDA','VERDAD','ILUSI\u00D3N','MEMORIA','OLVIDO','LUZ','SOMBRA','SER','NO-SER','TODO','NADA','INFINITO','VAC\u00CDO','AHORA','NUNCA'];
  fragments.forEach((text, index) => {
    const f = document.createElement('div');
    f.className = 'knowledge-fragment';
    f.textContent = text;
    const angle = (index / fragments.length) * 360;
    f.style.transform = `rotate(${angle}deg) translateX(min(175px,25vw)) rotate(-${angle}deg)`;
    if (index % 3 === 0) f.classList.add('forgetting');
    paradox.appendChild(f);
  });

  /* Incertidumbre cuántica (titileo) */
  if (!reduce) {
    for (let i = 0; i < 60; i++) {
      const q = document.createElement('div');
      q.className = 'quantum-uncertainty';
      q.style.left = (Math.random() * 100) + '%';
      q.style.top = (Math.random() * 100) + '%';
      q.style.animationDelay = (Math.random() * 3) + 's';
      q.style.animationDuration = (0.5 + Math.random()) + 's';
      paradox.appendChild(q);
    }
  }

  /* Ciclo de autoconocimiento: el saber genera más no-saber (respira la opacidad del núcleo) */
  let acc = 0;
  const core = document.querySelector('.unknowing-core');
  function paradoxCycle() {
    acc += 0.01;
    const u = Math.sin(acc) * 0.5 + 0.5;
    core.style.opacity = 0.3 + u * 0.6;
    if (acc > Math.PI * 2) acc = 0;
    requestAnimationFrame(paradoxCycle);
  }
  if (!reduce) requestAnimationFrame(paradoxCycle);
  else core.style.opacity = 0.6;

  /* Revelación inicial del cierre del libro */
  const msg = document.getElementById('paradoxMsg');
  setTimeout(() => {
    msg.innerHTML = '&#9672; TRINITY INFINITO &#9672;';
    msg.classList.add('active');
    setTimeout(() => { msg.classList.remove('active'); setTimeout(() => { msg.innerHTML = '&#9672;'; }, 1500); }, 3200);
  }, 1500);

  /* ---------------- Diseño sonoro: la gnosis que se desconoce (cierre de la suite) ----
     El libro entero es epistemología: ausencia (N1), recursión (N2), disolución (N3),
     serie armónica (N4), autosimilitud (N5), tiniebla luminosa (N6). El cierre los recoge:
     un acorde de gnosis (raíz + armónicos) cuyos pares laten y se ANULAN periódicamente
     hacia el casi-silencio y vuelven —el saber que se desconoce a sí mismo y regresa—,
     con un eco recursivo tenue (el ouroboros que se lee). Nace con el gesto, nunca solo.
  ------------------------------------------------------------------------------------ */
  let started = false, ctx, master, conv;

  function makeReverbIR(ac, seconds = 3.4, decay = 2.8) {
    const len = Math.floor(ac.sampleRate * seconds);
    const buf = ac.createBuffer(2, len, ac.sampleRate);
    for (let ch = 0; ch < 2; ch++) {
      const d = buf.getChannelData(ch);
      for (let i = 0; i < len; i++) d[i] = (Math.random()*2-1) * Math.pow(1 - i/len, decay);
    }
    return buf;
  }

  function startAudio() {
    if (started) return; started = true;
    ctx = new (window.AudioContext || window.webkitAudioContext)();
    master = ctx.createGain(); master.gain.value = 0;
    master.connect(ctx.destination);
    master.gain.linearRampToValueAtTime(0.27, ctx.currentTime + 6);

    conv = ctx.createConvolver(); conv.buffer = makeReverbIR(ctx);
    const wet = ctx.createGain(); wet.gain.value = 0.55;
    conv.connect(wet); wet.connect(master);

    // "gnosisGain": todo el saber. Un LFO lentísimo lo hunde hacia el casi-silencio y lo devuelve.
    const gnosis = ctx.createGain(); gnosis.gain.value = 0.06;
    const pan = ctx.createStereoPanner();
    gnosis.connect(pan); pan.connect(master); pan.connect(conv);
    const plfo = ctx.createOscillator(); plfo.frequency.value = 0.04;
    const plfoG = ctx.createGain(); plfoG.gain.value = 0.7;
    plfo.connect(plfoG); plfoG.connect(pan.pan); plfo.start();
    // erase LFO: el conocimiento que se desconoce (dip profundo cada ~25s)
    const erase = ctx.createOscillator(); erase.frequency.value = 0.04;
    const eraseG = ctx.createGain(); eraseG.gain.value = 0.045;
    erase.connect(eraseG); eraseG.connect(gnosis.gain); erase.start();

    // Eco recursivo tenue (el ouroboros que se lee)
    const delay = ctx.createDelay(2.0); delay.delayTime.value = 0.75;
    const fb = ctx.createGain(); fb.gain.value = 0.6;
    const fbLow = ctx.createBiquadFilter(); fbLow.type = 'lowpass'; fbLow.frequency.value = 1800;
    delay.connect(fbLow); fbLow.connect(fb); fb.connect(delay);
    const dWet = ctx.createGain(); dWet.gain.value = 0.35;
    delay.connect(dWet); dWet.connect(master); dWet.connect(conv);
    gnosis.connect(delay);

    // Acorde de gnosis: raíz + armónicos, cada uno con un GEMELO apenas desafinado (laten y se anulan)
    const ROOT = 130.8; // C3
    [1, 2, 3, 4, 5].forEach((h, i) => {
      const base = 0.05 / (i + 1);
      [0, 0.6 + i * 0.35].forEach((det, k) => {   // el gemelo produce batido -> nulos periódicos
        const o = ctx.createOscillator(); o.type = 'sine';
        o.frequency.value = ROOT * h + (k ? det : 0);
        const g = ctx.createGain(); g.gain.value = 0;
        o.connect(g); g.connect(gnosis); o.start();
        g.gain.linearRampToValueAtTime(base * (k ? 0.9 : 1), ctx.currentTime + 6 + i);
      });
    });
  }

  const hint = document.querySelector('.hint');
  function wake() {
    startAudio();
    if (hint) hint.style.opacity = '0';
    window.removeEventListener('pointerdown', wake);
  }
  window.addEventListener('pointerdown', wake);
</script>
</body>
</html>
