<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portal 45: El Sabio que Olvida Todo</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box;
      -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale; }

  body {
    background: radial-gradient(circle at center, #0a0a0a, #000);
    overflow:hidden;
    display:flex; justify-content:center; align-items:center;
    height:100vh;
    font-family:'Georgia', serif;
    cursor:none;
  }

  .sage-container {
    position:relative;
    width:min(600px, 95vw);
    height:min(600px, 95vw);
    filter: drop-shadow(0 0 30px rgba(150,110,200,0.2));
  }

  .trinity-resonance {
    position:absolute; top:50%; left:50%;
    width:120%; height:120%;
    border-radius:50%;
    background: conic-gradient(from 0deg,
      transparent, rgba(150,110,200,0.05), transparent,
      rgba(90,130,210,0.05), transparent, rgba(90,190,140,0.05), transparent);
    opacity:0.4;
    transform: translate(-50%,-50%);
    animation: trinitySpin 25s infinite linear;
    pointer-events:none;
    will-change: transform;
  }
  @keyframes trinitySpin {
    from { transform: translate(-50%,-50%) rotate(0deg); }
    to   { transform: translate(-50%,-50%) rotate(360deg); }
  }

  /* Mente: pulso por escala (sin blur) */
  .mind-sphere {
    position:absolute; top:50%; left:50%;
    width:min(300px, 50vw); height:min(300px, 50vw);
    border-radius:50%;
    background: radial-gradient(circle at center,
      rgba(150,110,200,0.10), rgba(90,130,210,0.05), transparent 70%);
    transform: translate(-50%,-50%) scale(1);
    animation: mindPulse 8s infinite alternate ease-in-out;
    will-change: transform, opacity;
  }
  @keyframes mindPulse {
    0%   { transform: translate(-50%,-50%) scale(1);    opacity:0.9; }
    50%  { transform: translate(-50%,-50%) scale(1.15); opacity:0.6; }
    100% { transform: translate(-50%,-50%) scale(0.98); opacity:1; }
  }

  /* Partículas de conocimiento que flotan y se disuelven (olvido) */
  .knowledge-particle {
    position:absolute; top:50%; left:50%;
    width:4px; height:4px;
    background: rgba(150,110,200,0.7);
    border-radius:50%;
    box-shadow: 0 0 6px rgba(150,110,200,0.4);
    opacity:0;
    animation: knowledgeFloat 12s infinite ease-out;
    will-change: transform, opacity;
  }
  @keyframes knowledgeFloat {
    0%   { transform: translate(0,0) scale(1); opacity:0; }
    20%  { opacity:0.9; }
    50%  { transform: translate(calc(var(--x)*min(150px,25vw)), calc(var(--y)*min(150px,25vw))) scale(1.8); opacity:0.8; }
    80%  { opacity:0.3; }
    100% { transform: translate(calc(var(--x)*min(300px,50vw)), calc(var(--y)*min(300px,50vw))) scale(0); opacity:0; }
  }

  /* Núcleo de sabiduría: el vacío que gira */
  .wisdom-core {
    position:absolute; top:50%; left:50%;
    width:min(80px,13vw); height:min(80px,13vw);
    border-radius:50%;
    background:#000;
    border:2px solid rgba(150,110,200,0.35);
    display:flex; align-items:center; justify-content:center;
    transform: translate(-50%,-50%);
    animation: coreRotate 20s infinite linear;
    will-change: transform;
  }
  @keyframes coreRotate {
    from { transform: translate(-50%,-50%) rotate(0deg); }
    to   { transform: translate(-50%,-50%) rotate(360deg); }
  }
  .void-symbol {
    width:50%; height:50%;
    border:1px solid rgba(90,130,210,0.5);
    border-radius:50%;
    animation: voidExpand 5s infinite alternate ease-in-out;
    will-change: transform, opacity;
  }
  @keyframes voidExpand {
    0%   { transform: scale(1);   opacity:0.6; }
    100% { transform: scale(1.6); opacity:0.1; }
  }

  /* Trazas de memoria que se desvanecen */
  .memory-trace {
    position:absolute; width:100%; height:100%;
    opacity:0;
    animation: memoryFade 12s infinite ease-in-out;
    will-change: transform, opacity;
  }
  .memory-trace::before {
    content: attr(data-memory);
    position:absolute;
    color: rgba(180,150,220,0.75);
    font-size: clamp(13px, 2.4vw, 15px);
    white-space:nowrap;
    top: var(--top); left: var(--left);
    transform: translate(-50%,-50%);
    text-shadow: 0 0 12px rgba(150,110,200,0.4);
    font-weight:300; letter-spacing:1px;
  }
  .memory-trace:nth-child(1){ --top:20%; --left:50%; animation-delay:0s; }
  .memory-trace:nth-child(2){ --top:50%; --left:80%; animation-delay:3s; }
  .memory-trace:nth-child(3){ --top:80%; --left:50%; animation-delay:6s; }
  .memory-trace:nth-child(4){ --top:50%; --left:20%; animation-delay:9s; }
  @keyframes memoryFade {
    0%   { opacity:0;   transform: scale(0.85); }
    12%  { opacity:1;   transform: scale(1); }
    40%  { opacity:0.9; transform: scale(1); }
    60%  { opacity:0.5; transform: scale(1.1); }
    80%,100% { opacity:0; transform: scale(1.3); }
  }

  /* Olas de olvido: expanden por escala */
  .forgetting-wave {
    position:absolute; top:50%; left:50%;
    width:min(120px,20vw); height:min(120px,20vw);
    border-radius:50%;
    border:1px solid rgba(90,130,210,0.4);
    opacity:0;
    transform: translate(-50%,-50%) scale(1);
    animation: waveExpand 6s infinite ease-out;
    will-change: transform, opacity;
  }
  .forgetting-wave:nth-child(2){ animation-delay:2s; }
  .forgetting-wave:nth-child(3){ animation-delay:4s; }
  @keyframes waveExpand {
    0%   { transform: translate(-50%,-50%) scale(0.85); opacity:0; }
    15%  { opacity:0.7; }
    85%  { opacity:0.1; }
    100% { transform: translate(-50%,-50%) scale(4.2); opacity:0; }
  }

  /* Texto de iluminación (rota con meseta legible) */
  .enlightenment-text {
    position:absolute; bottom:10%; left:50%;
    transform: translateX(-50%);
    color: rgba(180,150,220,0.78);
    font-size: clamp(15px, 2.6vw, 17px);
    text-align:center; line-height:1.5; font-weight:300;
    text-shadow: 0 0 20px rgba(150,110,200,0.4);
    width:90%;
    transition: opacity 0.9s ease;
    will-change: opacity;
  }

  .transmission-code {
    position:absolute; bottom:20px; left:50%;
    transform: translateX(-50%);
    color: rgba(150,110,200,0.4);
    font-family:'Courier New', monospace;
    font-size: clamp(9px,1.5vw,10px); letter-spacing:2px;
    animation: codeFlicker 4s infinite ease-in-out;
  }
  @keyframes codeFlicker { 0%,100% { opacity:0.3; } 50% { opacity:0.7; } }

  .hint {
    position:fixed; bottom:52px; left:50%;
    transform: translateX(-50%);
    color: rgba(245,242,234,0.55);
    font-size: clamp(11px,2.6vw,13px); letter-spacing:1px;
    animation: breathe 3.4s infinite ease-in-out;
    pointer-events:none;
    transition: opacity 1.2s ease;
  }
  @keyframes breathe { 0%,100% { opacity:0.25; } 50% { opacity:0.75; } }

  .infinito {
    position:fixed; bottom:22px; right:26px;
    font-size:30px; text-decoration:none;
    color: rgba(208,192,160,0.35);
    transition: color 0.8s ease, text-shadow 0.8s ease;
    z-index:20;
  }
  .infinito:hover { color: rgba(224,200,120,0.95); text-shadow: 0 0 18px rgba(224,200,120,0.5); }

  @media (prefers-reduced-motion: reduce) {
    * { animation: none !important; }
    .mind-sphere { transform: translate(-50%,-50%); }
    .enlightenment-text { opacity:0.8; }
    .memory-trace:nth-child(1){ opacity:0.85; }
    .hint { opacity:0.5; }
  }
</style>
</head>
<body>
  <div class="sage-container">
    <div class="trinity-resonance"></div>
    <div class="mind-sphere"></div>

    <div class="wisdom-core">
      <div class="void-symbol"></div>
    </div>

    <div class="forgetting-wave"></div>
    <div class="forgetting-wave"></div>
    <div class="forgetting-wave"></div>

    <div class="memory-trace" data-memory="SABER"></div>
    <div class="memory-trace" data-memory="OLVIDAR"></div>
    <div class="memory-trace" data-memory="VAC&Iacute;O"></div>
    <div class="memory-trace" data-memory="PLENITUD"></div>

    <div class="enlightenment-text">La sabidur&iacute;a perfecta<br>es el olvido completo</div>
  </div>

  <div class="transmission-code">TRINITY::PORTAL_45::SABIO_AMNESICO::RESONANDO</div>
  <div class="hint">( tocá — dejá que el saber se vacíe )</div>

  <a class="infinito" href="L7-Nodo4.html">∞</a>

<script>
  const reduce = matchMedia('(prefers-reduced-motion: reduce)').matches;
  const container = document.querySelector('.sage-container');
  const particles = [];

  /* Partículas de conocimiento que aparecen y se disuelven */
  function createKnowledgeParticle() {
    const p = document.createElement('div');
    p.className = 'knowledge-particle';
    const a = Math.random() * Math.PI * 2;
    const d = 0.1 + Math.random() * 0.3;
    p.style.setProperty('--x', (Math.cos(a) * d).toFixed(3));
    p.style.setProperty('--y', (Math.sin(a) * d).toFixed(3));
    p.style.animationDelay = (Math.random() * 4) + 's';
    container.appendChild(p);
    particles.push(p);
    setTimeout(() => {
      if (p.parentNode) p.parentNode.removeChild(p);
      const i = particles.indexOf(p); if (i > -1) particles.splice(i, 1);
    }, 16000);
  }

  let particleInterval = null;
  if (!reduce) {
    for (let i = 0; i < 8; i++) setTimeout(createKnowledgeParticle, i * 300);
    particleInterval = setInterval(createKnowledgeParticle, 400);
  }

  /* Ciclo de olvido: el saber se acumula y se trasciende */
  let acc = 0, lastTime = 0;
  function wisdomCycle(ts) {
    if (!lastTime) lastTime = ts;
    acc += (ts - lastTime) / 1000; lastTime = ts;
    if (acc > 8) {
      acc = 0;
      particles.forEach(p => { p.style.animation = 'none'; setTimeout(() => p.remove(), 100); });
      particles.length = 0;
    }
    requestAnimationFrame(wisdomCycle);
  }
  if (!reduce) requestAnimationFrame(wisdomCycle);

  /* Textos de sabiduría (rotación con meseta legible ~13s, fade suave) */
  const wisdomTexts = [
    'La sabidur&iacute;a perfecta<br>es el olvido completo',
    'Quien sabe todo<br>no sabe nada',
    'El vac&iacute;o de la mente<br>contiene todo conocimiento',
    'Olvidar es recordar<br>la verdad original',
    'La ignorancia consciente<br>es sabidur&iacute;a absoluta',
    'Saber que no se sabe<br>es el principio del saber'
  ];
  let ti = 0;
  const enl = document.querySelector('.enlightenment-text');
  if (!reduce) setInterval(() => {
    enl.style.opacity = '0';
    setTimeout(() => {
      ti = (ti + 1) % wisdomTexts.length;
      enl.innerHTML = wisdomTexts[ti];
      enl.style.opacity = '0.78';
    }, 900);
  }, 13000);

  /* ---------------- Diseño sonoro: el saber que se disuelve --------------------------
     Un VACÍO grave permanece (el fondo que queda cuando todo se olvida). Sobre él,
     tonos de conocimiento nacen y se disuelven por completo hasta el silencio (son
     "olvidados"). Cada ~6s una ola de olvido —swell de ruido pasabanda— barre y limpia.
  ------------------------------------------------------------------------------------ */
  let started = false, ctx, master, conv;

  function makeReverbIR(ac, seconds = 3.6, decay = 2.6) {
    const len = Math.floor(ac.sampleRate * seconds);
    const buf = ac.createBuffer(2, len, ac.sampleRate);
    for (let ch = 0; ch < 2; ch++) {
      const d = buf.getChannelData(ch);
      for (let i = 0; i < len; i++) d[i] = (Math.random()*2-1) * Math.pow(1 - i/len, decay);
    }
    return buf;
  }

  function knowledgeTone() {
    if (!started) return;
    const notes = [261.6, 329.6, 392.0, 523.25, 659.25]; // C-E-G pentatónico, consonante con el vacío
    const f = notes[Math.floor(Math.random() * notes.length)];
    const t = ctx.currentTime;
    const o = ctx.createOscillator(); o.type = 'sine'; o.frequency.value = f;
    const g = ctx.createGain(); g.gain.value = 0;
    o.connect(g); g.connect(conv); g.connect(master);
    o.start(t);
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(0.05, t + 0.4);          // nace
    g.gain.exponentialRampToValueAtTime(0.0004, t + 5.5);   // se disuelve por completo
    o.stop(t + 6);
  }

  function forgettingWave() {
    if (!started) return;
    const t = ctx.currentTime;
    const nb = ctx.createBuffer(1, ctx.sampleRate * 3, ctx.sampleRate);
    const nd = nb.getChannelData(0);
    for (let i = 0; i < nd.length; i++) nd[i] = (Math.random()*2-1) * 0.5;
    const src = ctx.createBufferSource(); src.buffer = nb;
    const bp = ctx.createBiquadFilter(); bp.type = 'bandpass'; bp.Q.value = 0.8;
    bp.frequency.setValueAtTime(220, t);
    bp.frequency.exponentialRampToValueAtTime(1900, t + 3);  // el barrido del olvido
    const g = ctx.createGain(); g.gain.value = 0;
    src.connect(bp); bp.connect(g); g.connect(conv); g.connect(master);
    src.start(t);
    g.gain.linearRampToValueAtTime(0.05, t + 1.4);
    g.gain.linearRampToValueAtTime(0.0, t + 3);
    src.stop(t + 3.2);
  }

  function startAudio() {
    if (started) return; started = true;
    ctx = new (window.AudioContext || window.webkitAudioContext)();
    master = ctx.createGain(); master.gain.value = 0;
    master.connect(ctx.destination);
    master.gain.linearRampToValueAtTime(0.30, ctx.currentTime + 6);

    conv = ctx.createConvolver(); conv.buffer = makeReverbIR(ctx);
    const wet = ctx.createGain(); wet.gain.value = 0.55;
    conv.connect(wet); wet.connect(master);

    // El vacío que permanece
    [65.4, 98.0].forEach(f => {
      const o = ctx.createOscillator(); o.type = 'sine'; o.frequency.value = f;
      const g = ctx.createGain(); g.gain.value = 0;
      o.connect(g); g.connect(master); o.start();
      g.gain.linearRampToValueAtTime(0.022, ctx.currentTime + 7);
    });

    setTimeout(knowledgeTone, 900);
    setInterval(knowledgeTone, 2600);
    setInterval(forgettingWave, 6000);
  }

  const hint = document.querySelector('.hint');
  function wake() {
    startAudio();
    if (hint) hint.style.opacity = '0';
    window.removeEventListener('pointerdown', wake);
  }
  window.addEventListener('pointerdown', wake);
</script>
</body>
</html>
