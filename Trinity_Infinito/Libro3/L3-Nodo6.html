<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Juego Dentro del Juego</title>
    <style>
        body {
            background: radial-gradient(circle at center, #000, #050505, #000);
            color: #fff;
            /* Georgia: estándar de la serie (antes Times New Roman) */
            font-family: 'Georgia', 'Times New Roman', serif;
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            cursor: none;
        }

        .nested-games {
            position: relative;
            width: 600px;
            height: 600px;
            max-width: 92vw;
            max-height: 92vh;
        }

        /* Marcos anidados que respiran a ritmos distintos (fractal).
           Rotación suave (±8°) para no invertir el texto. */
        .game-layer {
            position: absolute;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: layer-pulse calc(8s + var(--layer) * 2s) infinite ease-in-out;
            animation-delay: calc(var(--layer) * -1s);
        }
        @keyframes layer-pulse {
            0%, 100% { opacity: 0.1; transform: scale(0.96) rotate(-8deg); }
            50% { opacity: 0.4; transform: scale(1.04) rotate(8deg); }
        }

        .layer-text {
            font-size: calc(0.95em - var(--layer) * 0.05em);
            letter-spacing: 0.2em;
            opacity: 0;
            animation: text-fade 30s infinite ease-in-out;
            animation-delay: calc(var(--layer) * -4.5s);
        }
        @keyframes text-fade {
            0%   { opacity: 0; }
            8%   { opacity: 0.6; }
            26%  { opacity: 0.6; }
            34%  { opacity: 0; }
            100% { opacity: 0; }
        }

        .infinite-center {
            position: absolute;
            top: 50%;
            left: 50%;
            font-size: 2em;
            animation: center-spin 20s infinite linear;
        }
        @keyframes center-spin {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        .fractal-note {
            position: absolute;
            bottom: 10%;
            width: 100%;
            text-align: center;
            font-style: italic;
            opacity: 0.25;
            letter-spacing: 0.3em;
            font-size: 0.9em;
            line-height: 1.8;
        }

        .hint {
            position: fixed; bottom: 66px; left: 50%; transform: translateX(-50%);
            font-size: 11px; letter-spacing: 4px; color: rgba(255,255,255,0.3);
            animation: hint-breathe 4s ease-in-out infinite;
            transition: opacity 1.5s ease; pointer-events: none; z-index: 50;
        }
        .hint.oculto { opacity: 0; }
        @keyframes hint-breathe { 0%,100% { opacity: 0.16; } 50% { opacity: 0.4; } }
        .infinito {
            position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
            color: rgba(255,255,255,0.25); text-decoration: none; font-size: 24px;
            cursor: pointer; transition: color 0.6s ease; z-index: 60;
        }
        .infinito:hover { color: rgba(255,255,255,0.85); }

        @media (prefers-reduced-motion: reduce) {
            .game-layer     { animation: none; opacity: 0.25; transform: none; }
            .layer-text     { animation: none; opacity: 0.55; }
            .infinite-center{ animation: none; transform: translate(-50%, -50%); }
            .hint           { animation: none; opacity: 0.3; }
        }
    </style>
</head>
<body>
    <div class="nested-games">
        <div class="game-layer" style="width: 600px; height: 600px; top: 0; left: 0; --layer: 0;">
            <span class="layer-text" style="--layer: 0;">El juego de la vida</span>
        </div>
        <div class="game-layer" style="width: 500px; height: 500px; top: 50px; left: 50px; --layer: 1;">
            <span class="layer-text" style="--layer: 1;">El juego del despertar</span>
        </div>
        <div class="game-layer" style="width: 400px; height: 400px; top: 100px; left: 100px; --layer: 2;">
            <span class="layer-text" style="--layer: 2;">El juego del soñar</span>
        </div>
        <div class="game-layer" style="width: 300px; height: 300px; top: 150px; left: 150px; --layer: 3;">
            <span class="layer-text" style="--layer: 3;">El juego del buscar</span>
        </div>
        <div class="game-layer" style="width: 200px; height: 200px; top: 200px; left: 200px; --layer: 4;">
            <span class="layer-text" style="--layer: 4;">El juego del encontrar</span>
        </div>
        <div class="game-layer" style="width: 100px; height: 100px; top: 250px; left: 250px; --layer: 5;">
            <span class="layer-text" style="--layer: 5;">El juego</span>
        </div>

        <div class="infinite-center">∞</div>

        <div class="fractal-note">
            Cada juego contiene todos los juegos<br>
            Cada movimiento es un universo completo
        </div>
    </div>

    <div class="hint" id="hint">( tocá: el juego dentro del juego )</div>
    <a class="infinito" href="L3-Nodo7.html" title="Siguiente portal">∞</a>

    <script>
    // ============================================================
    //  Web Audio API puro, SIN CDN.
    //  Sonido fractal: capas armónicas anidadas (octavas y quintas),
    //  cada una respirando a su propio ritmo lento —autosimilares, como
    //  los marcos—; y un tono central que gira por el estéreo (el ∞).
    // ============================================================
    let actx = null, master = null, fxIn = null, started = false;

    function makeReverbIR(seconds, decay) {
        const rate = actx.sampleRate, len = Math.floor(rate * seconds);
        const buf = actx.createBuffer(2, len, rate);
        for (let ch = 0; ch < 2; ch++) {
            const data = buf.getChannelData(ch);
            for (let i = 0; i < len; i++)
                data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, decay);
        }
        return buf;
    }
    function panner(p) { const sp = actx.createStereoPanner(); sp.pan.value = p; return sp; }

    function buildGraph() {
        actx = new (window.AudioContext || window.webkitAudioContext)();
        master = actx.createGain(); master.gain.value = 0; master.connect(actx.destination);
        const dry = actx.createGain(); dry.gain.value = 0.65; dry.connect(master);
        const conv = actx.createConvolver(); conv.buffer = makeReverbIR(10, 2.0);
        const wet = actx.createGain(); wet.gain.value = 0.5; conv.connect(wet); wet.connect(master);
        fxIn = actx.createGain(); fxIn.connect(dry); fxIn.connect(conv);

        // Capas anidadas autosimilares: cada armónico respira a su ritmo
        const capas = [
            { f: 65.41,  base: 0.05,  rate: 1 / 23 },  // C2
            { f: 98.00,  base: 0.04,  rate: 1 / 19 },  // G2
            { f: 130.81, base: 0.035, rate: 1 / 17 },  // C3
            { f: 196.00, base: 0.03,  rate: 1 / 13 },  // G3
            { f: 261.63, base: 0.025, rate: 1 / 11 },  // C4
            { f: 392.00, base: 0.02,  rate: 1 / 7  }   // G4
        ];
        capas.forEach(c => {
            const o = actx.createOscillator(); o.type = 'sine'; o.frequency.value = c.f;
            const g = actx.createGain(); g.gain.value = c.base;
            const lfo = actx.createOscillator(); lfo.type = 'sine'; lfo.frequency.value = c.rate;
            const depth = actx.createGain(); depth.gain.value = c.base * 0.7;
            lfo.connect(depth); depth.connect(g.gain);
            o.connect(g); g.connect(fxIn);
            o.start(); lfo.start();
        });

        // Tono central que gira (el ∞)
        const c = actx.createOscillator(); c.type = 'sine'; c.frequency.value = 523.25; // C5
        const cg = actx.createGain(); cg.gain.value = 0.02;
        const cpan = panner(0);
        const cpLFO = actx.createOscillator(); cpLFO.type = 'sine'; cpLFO.frequency.value = 1 / 20; // como el giro visual
        const cpDepth = actx.createGain(); cpDepth.gain.value = 0.95;
        cpLFO.connect(cpDepth); cpDepth.connect(cpan.pan);
        c.connect(cg); cg.connect(cpan); cpan.connect(fxIn);
        c.start(); cpLFO.start();
    }

    async function initSound() {
        if (started) return; started = true;
        buildGraph();
        if (actx.state === 'suspended') await actx.resume();
        master.gain.linearRampToValueAtTime(0.72, actx.currentTime + 5);
        const hint = document.getElementById('hint'); if (hint) hint.classList.add('oculto');
    }
    document.body.addEventListener('click', initSound, { once: true });
    </script>
</body>
</html>
