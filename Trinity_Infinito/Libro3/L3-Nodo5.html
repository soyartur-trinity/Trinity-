<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piezas Que Se Mueven Solas</title>
    <style>
        body {
            background: #000;
            color: #fff;
            font-family: 'Georgia', serif;
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            cursor: none;
        }

        .autonomous-field {
            position: relative;
            width: 700px;
            height: 700px;
            max-width: 96vw;
            max-height: 96vh;
        }

        /* Antes animaba left/top (reflow) y background (paint).
           Ahora se mueven con transform:translate (calc sobre los waypoints).
           Orbes luminosos blancos, unificados con el resto de la serie. */
        .piece {
            position: absolute;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,255,255,0.85), rgba(255,255,255,0.1));
            box-shadow: 0 0 22px 8px rgba(255,255,255,0.14);
            left: var(--x0);
            top: var(--y0);
            transform: translate(0, 0);
            animation: autonomous-move 20s infinite ease-in-out;
            animation-delay: calc(var(--piece) * -4s);
        }
        @keyframes autonomous-move {
            0%   { transform: translate(0, 0) scale(1); }
            25%  { transform: translate(calc(var(--x1) - var(--x0)), calc(var(--y1) - var(--y0))) scale(1.2); }
            50%  { transform: translate(calc(var(--x2) - var(--x0)), calc(var(--y2) - var(--y0))) scale(0.8); }
            75%  { transform: translate(calc(var(--x3) - var(--x0)), calc(var(--y3) - var(--y0))) scale(1.1); }
            100% { transform: translate(0, 0) scale(1); }
        }

        .no-mover {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.8em;
            letter-spacing: 0.5em;
            text-align: center;
            opacity: 0.3;
            animation: mover-fade 12s infinite ease-in-out;
        }
        @keyframes mover-fade {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.6; }
        }

        .movement-text {
            position: absolute;
            font-size: 0.9em;
            letter-spacing: 0.2em;
            opacity: 0;
            animation: text-appear 24s infinite ease-in-out;
            animation-delay: calc(var(--text) * -6s);
        }
        @keyframes text-appear {
            0%   { opacity: 0; }
            8%   { opacity: 0.45; }
            30%  { opacity: 0.45; }
            38%  { opacity: 0; }
            100% { opacity: 0; }
        }

        .hint {
            position: fixed; bottom: 66px; left: 50%; transform: translateX(-50%);
            font-size: 11px; letter-spacing: 4px; color: rgba(255,255,255,0.3);
            animation: hint-breathe 4s ease-in-out infinite;
            transition: opacity 1.5s ease; pointer-events: none; z-index: 50;
        }
        .hint.oculto { opacity: 0; }
        @keyframes hint-breathe { 0%,100% { opacity: 0.16; } 50% { opacity: 0.4; } }
        .infinito {
            position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
            color: rgba(255,255,255,0.25); text-decoration: none; font-size: 24px;
            cursor: pointer; transition: color 0.6s ease; z-index: 60;
        }
        .infinito:hover { color: rgba(255,255,255,0.85); }

        @media (prefers-reduced-motion: reduce) {
            .piece         { animation: none; }
            .no-mover      { animation: none; opacity: 0.45; transform: translate(-50%, -50%); }
            .movement-text { animation: none; opacity: 0.4; }
            .hint          { animation: none; opacity: 0.3; }
        }
    </style>
</head>
<body>
    <div class="autonomous-field">
        <div class="piece" style="--piece: 0; --x0: 100px; --y0: 100px; --x1: 500px; --y1: 200px; --x2: 400px; --y2: 500px; --x3: 200px; --y3: 400px;"></div>
        <div class="piece" style="--piece: 1; --x0: 600px; --y0: 100px; --x1: 400px; --y1: 300px; --x2: 100px; --y2: 400px; --x3: 300px; --y3: 200px;"></div>
        <div class="piece" style="--piece: 2; --x0: 350px; --y0: 600px; --x1: 200px; --y1: 400px; --x2: 500px; --y2: 300px; --x3: 600px; --y3: 500px;"></div>
        <div class="piece" style="--piece: 3; --x0: 100px; --y0: 350px; --x1: 600px; --y1: 350px; --x2: 350px; --y2: 100px; --x3: 350px; --y3: 600px;"></div>
        <div class="piece" style="--piece: 4; --x0: 500px; --y0: 500px; --x1: 100px; --y1: 100px; --x2: 600px; --y2: 600px; --x3: 100px; --y3: 600px;"></div>

        <div class="no-mover">
            NADIE<br>
            LAS MUEVE
        </div>

        <div class="movement-text" style="top: 15%; left: 20%; --text: 0;">Se mueven solas</div>
        <div class="movement-text" style="top: 25%; right: 15%; --text: 1;">Sin voluntad</div>
        <div class="movement-text" style="bottom: 25%; left: 10%; --text: 2;">Sin propósito</div>
        <div class="movement-text" style="bottom: 15%; right: 20%; --text: 3;">Danza espontánea</div>
    </div>

    <div class="hint" id="hint">( tocá: las piezas danzan solas )</div>
    <a class="infinito" href="L3-Nodo6.html" title="Siguiente portal">∞</a>

    <script>
    // ============================================================
    //  Web Audio API puro, SIN CDN.
    //  Una danza que se baila sola: drone de fondo, un pulso muy
    //  tenue (el latido de la danza) y tonos espontáneos que aparecen
    //  y se panean, sin voluntad ni propósito.
    // ============================================================
    let actx = null, master = null, fxIn = null, started = false;
    const timers = [];
    const escala = [261.63, 329.63, 392.00, 493.88, 587.33, 659.25]; // C4 E4 G4 B4 D5 E5

    function makeReverbIR(seconds, decay) {
        const rate = actx.sampleRate, len = Math.floor(rate * seconds);
        const buf = actx.createBuffer(2, len, rate);
        for (let ch = 0; ch < 2; ch++) {
            const data = buf.getChannelData(ch);
            for (let i = 0; i < len; i++)
                data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, decay);
        }
        return buf;
    }
    function panner(p) { const sp = actx.createStereoPanner(); sp.pan.value = p; return sp; }

    function buildGraph() {
        actx = new (window.AudioContext || window.webkitAudioContext)();
        master = actx.createGain(); master.gain.value = 0; master.connect(actx.destination);
        const dry = actx.createGain(); dry.gain.value = 0.68; dry.connect(master);
        const conv = actx.createConvolver(); conv.buffer = makeReverbIR(8, 2.2);
        const wet = actx.createGain(); wet.gain.value = 0.45; conv.connect(wet); wet.connect(master);
        fxIn = actx.createGain(); fxIn.connect(dry); fxIn.connect(conv);

        const o = actx.createOscillator(); o.type = 'sine'; o.frequency.value = 65.41; // C2
        const dg = actx.createGain(); dg.gain.value = 0.04; o.connect(dg); dg.connect(fxIn);
        o.start();
    }

    // Pulso tenue: el latido de la danza
    function playPulse(t0) {
        const o = actx.createOscillator(); o.type = 'sine';
        o.frequency.setValueAtTime(98, t0);
        o.frequency.exponentialRampToValueAtTime(49, t0 + 0.1);
        const g = actx.createGain();
        g.gain.setValueAtTime(0.0001, t0);
        g.gain.exponentialRampToValueAtTime(0.05, t0 + 0.01);
        g.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.5);
        o.connect(g); g.connect(fxIn);
        o.start(t0); o.stop(t0 + 0.6);
    }

    function playSpontaneous(t0) {
        const f = escala[Math.floor(Math.random() * escala.length)];
        const o = actx.createOscillator(); o.type = 'sine'; o.frequency.value = f;
        const o2 = actx.createOscillator(); o2.type = 'sine'; o2.frequency.value = f * 2;
        const g2 = actx.createGain(); g2.gain.value = 0.2; o2.connect(g2);
        const g = actx.createGain();
        g.gain.setValueAtTime(0.0001, t0);
        g.gain.linearRampToValueAtTime(0.045, t0 + 0.05);
        g.gain.exponentialRampToValueAtTime(0.0001, t0 + 3);
        o.connect(g); g2.connect(g);
        g.connect(panner(Math.random() * 1.6 - 0.8)).connect(fxIn);
        o.start(t0); o2.start(t0); o.stop(t0 + 3.1); o2.stop(t0 + 3.1);
    }

    function startScheduling() {
        const pulse = () => playPulse(actx.currentTime + 0.05);
        pulse(); timers.push(setInterval(pulse, 2400)); // latido lento de la danza
        const danza = () => {
            const id = setTimeout(() => {
                if (!started) return;
                playSpontaneous(actx.currentTime + 0.02);
                danza();
            }, 1200 + Math.random() * 1800);
            timers.push(id);
        };
        danza();
    }

    async function initSound() {
        if (started) return; started = true;
        buildGraph();
        if (actx.state === 'suspended') await actx.resume();
        master.gain.linearRampToValueAtTime(0.72, actx.currentTime + 4);
        startScheduling();
        const hint = document.getElementById('hint'); if (hint) hint.classList.add('oculto');
    }
    document.body.addEventListener('click', initSound, { once: true });
    </script>
</body>
</html>
