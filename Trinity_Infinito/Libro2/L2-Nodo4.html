<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amor Sin Amante Ni Amado</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: radial-gradient(circle at center, #0a0000, #000000);
            color: #fff;
            /* Georgia: estándar de la serie (antes Palatino) */
            font-family: 'Georgia', 'Palatino', serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            cursor: crosshair;
        }

        .love-field {
            position: relative;
            width: 100%;
            height: 100%;
            transform: translateZ(0);
            backface-visibility: hidden;
        }

        /* Ondas de amor: antes animaban width/height (reflow).
           Ahora sólo scale + opacity. Delay negativo. */
        .love-wave {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 200vmax;
            height: 200vmax;
            border-radius: 50%;
            background: radial-gradient(
                circle,
                rgba(200, 100, 100, 0.03) 0%,
                rgba(150, 80, 80, 0.01) 15%,
                transparent 50%
            );
            opacity: 0;
            transform: translate(-50%, -50%) scale(0);
            animation: love-expand 15s infinite ease-out;
            animation-delay: calc(var(--delay) * -4s);
            will-change: transform, opacity;
        }
        @keyframes love-expand {
            0%   { opacity: 0; transform: translate(-50%, -50%) scale(0); }
            15%  { opacity: 0.15; }
            30%  { opacity: 0.08; transform: translate(-50%, -50%) scale(0.35); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1); }
        }

        .love-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 10;
        }

        .no-lover {
            font-size: 1.5em;
            margin: 25px 0;
            opacity: 0;
            letter-spacing: 0.3em;
            color: rgba(255, 180, 180, 0.7);
            text-shadow: 0 0 10px rgba(255, 100, 100, 0.2);
            animation: appear-disappear 18s infinite ease-in-out;
            animation-delay: calc(var(--phase) * -6s);
        }
        @keyframes appear-disappear {
            0%, 70%, 100% { opacity: 0; transform: translateY(15px) scale(0.95); }
            10%, 60% { opacity: 0.8; transform: translateY(0) scale(1); }
        }

        /* AMOR — antes animaba text-shadow; ahora el resplandor es estático
           y sólo laten scale/rotate/opacity. */
        .love-itself {
            font-size: 3.5em;
            letter-spacing: 0.5em;
            margin: 40px 0;
            color: rgba(255, 190, 190, 0.9);
            text-shadow:
                0 0 22px rgba(255, 150, 150, 0.5),
                0 0 45px rgba(255, 100, 100, 0.25),
                0 0 70px rgba(255, 50, 50, 0.15);
            animation: love-pulse 12s infinite ease-in-out;
        }
        @keyframes love-pulse {
            0%, 100% { opacity: 0.5; transform: scale(0.98) rotate(-0.5deg); }
            50% { opacity: 1; transform: scale(1.03) rotate(0.5deg); }
        }

        .love-paradox {
            position: absolute;
            bottom: 12%;
            width: 100%;
            text-align: center;
            font-style: italic;
            opacity: 0.4;
            letter-spacing: 0.2em;
            font-size: 0.9em;
            color: rgba(255, 180, 180, 0.6);
            animation: paradox-breathe 20s infinite ease-in-out;
        }
        @keyframes paradox-breathe {
            0%, 100% { opacity: 0.3; transform: translateY(0); }
            50% { opacity: 0.6; transform: translateY(-5px); }
        }

        .love-particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: radial-gradient(circle, rgba(255, 150, 150, 0.8), transparent);
            border-radius: 50%;
            opacity: 0;
            animation: particle-float 20s infinite linear;
        }
        @keyframes particle-float {
            0%   { transform: translate(0, 0) scale(0); opacity: 0; }
            10%  { opacity: 0.6; }
            90%  { opacity: 0.3; }
            100% { transform: translate(var(--tx), var(--ty)) scale(1.5); opacity: 0; }
        }

        .audio-control {
            position: fixed;
            top: 30px;
            right: 30px;
            z-index: 100;
        }
        .audio-toggle {
            background: rgba(200, 100, 100, 0.2);
            border: 1px solid rgba(255, 150, 150, 0.4);
            color: rgba(255, 200, 200, 0.8);
            padding: 12px 24px;
            border-radius: 25px;
            cursor: pointer;
            font-family: 'Georgia', serif;
            font-size: 14px;
            transition: background 0.3s ease, color 0.3s ease, box-shadow 0.3s ease;
            backdrop-filter: blur(10px);
        }
        .audio-toggle:hover {
            background: rgba(200, 100, 100, 0.4);
            color: rgba(255, 220, 220, 1);
            box-shadow: 0 0 20px rgba(255, 100, 100, 0.3);
        }
        .audio-toggle.active {
            background: rgba(200, 100, 100, 0.6);
            box-shadow: 0 0 30px rgba(255, 100, 100, 0.5);
            animation: audio-pulse 2s infinite;
        }
        @keyframes audio-pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        /* Ripple de corazón al tocar: antes animaba width/height; ahora scale */
        .heart-ripple {
            position: fixed;
            width: 200px;
            height: 200px;
            border: 1px solid rgba(255, 100, 100, 0.3);
            border-radius: 50%;
            opacity: 1;
            transform: translate(-50%, -50%) scale(0.05);
            animation: heart-ripple-effect 2s ease-out forwards;
            pointer-events: none;
            mix-blend-mode: screen;
        }
        @keyframes heart-ripple-effect {
            from { opacity: 1; transform: translate(-50%, -50%) scale(0.05); }
            to   { opacity: 0; transform: translate(-50%, -50%) scale(1); }
        }

        .infinito {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 180, 180, 0.3);
            text-decoration: none;
            font-size: 24px;
            cursor: pointer;
            transition: color 0.6s ease;
            z-index: 100;
        }
        .infinito:hover { color: rgba(255, 200, 200, 0.9); }

        @media (prefers-reduced-motion: reduce) {
            .love-wave     { animation: none; opacity: 0.05; transform: translate(-50%, -50%) scale(0.6); }
            .no-lover      { animation: none; opacity: 0.8; transform: none; }
            .love-itself   { animation: none; opacity: 1; transform: none; }
            .love-paradox  { animation: none; opacity: 0.5; transform: none; }
            .love-particle { animation: none; opacity: 0; }
            .audio-toggle.active { animation: none; }
        }

        @media (max-width: 768px) {
            .no-lover { font-size: 1.2em; letter-spacing: 0.2em; }
            .love-itself { font-size: 2.5em; letter-spacing: 0.3em; }
            .love-paradox { font-size: 0.8em; bottom: 10%; }
            .audio-control { top: 20px; right: 20px; }
        }
    </style>
</head>
<body>
    <div class="audio-control">
        <button class="audio-toggle" id="audioToggle">✦ Sonido del Amor</button>
    </div>

    <div class="love-field">
        <div class="love-wave" style="--delay: 0;"></div>
        <div class="love-wave" style="--delay: 1;"></div>
        <div class="love-wave" style="--delay: 2;"></div>
        <div class="love-wave" style="--delay: 3;"></div>

        <div class="love-particles" id="loveParticles"></div>

        <div class="love-text">
            <div class="no-lover" style="--phase: 0;">
                Sin amante
            </div>

            <div class="love-itself">
                AMOR
            </div>

            <div class="no-lover" style="--phase: 1;">
                Sin amado
            </div>

            <div class="no-lover" style="--phase: 2;">
                Amándose a sí mismo
            </div>
        </div>

        <div class="love-paradox">
            El amor que no necesita objeto · El amor que no tiene sujeto<br>
            El amor como la sustancia misma del vacío
        </div>
    </div>

    <a class="infinito" href="L2-Nodo5.html" title="Siguiente portal">∞</a>

    <script>
        // ═══════════════════════════════════════════════════════════════════
        //  MOTOR DE AUDIO DEL AMOR PURO — Web Audio API puro, SIN CDN
        //  (Mismo diseño conceptual: latido del corazón, drone de amor,
        //   resonancia armónica y ondas de amor. Ciclo de encendido/apagado
        //   corregido: se construye una sola vez y se modula con el master.)
        // ═══════════════════════════════════════════════════════════════════
        class LoveAudioEngine {
            constructor() {
                this.ctx = null;
                this.master = null;
                this.fxIn = null;
                this.built = false;
                this.isActive = false;
                this.vol = 0.5;
                this.timers = [];
                this.heartGain = null;
            }

            makeIR(seconds, decay) {
                const rate = this.ctx.sampleRate, len = Math.floor(rate * seconds);
                const buf = this.ctx.createBuffer(2, len, rate);
                for (let ch = 0; ch < 2; ch++) {
                    const d = buf.getChannelData(ch);
                    for (let i = 0; i < len; i++)
                        d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, decay);
                }
                return buf;
            }

            ensureContext() {
                if (this.ctx) return;
                this.ctx = new (window.AudioContext || window.webkitAudioContext)();
                this.master = this.ctx.createGain();
                this.master.gain.value = 0;
                this.master.connect(this.ctx.destination);

                const dry = this.ctx.createGain(); dry.gain.value = 0.7; dry.connect(this.master);
                const conv = this.ctx.createConvolver(); conv.buffer = this.makeIR(7, 2.2);
                const wet = this.ctx.createGain(); wet.gain.value = 0.4; conv.connect(wet); wet.connect(this.master);
                this.fxIn = this.ctx.createGain(); this.fxIn.connect(dry); this.fxIn.connect(conv);
            }

            buildBase() {
                if (this.built) return;

                // Latido del corazón (136.1 Hz, el OM del corazón), gateado por su gain
                const hOsc = this.ctx.createOscillator(); hOsc.type = 'sine'; hOsc.frequency.value = 136.1;
                const hFilter = this.ctx.createBiquadFilter(); hFilter.type = 'lowpass'; hFilter.frequency.value = 600;
                this.heartGain = this.ctx.createGain(); this.heartGain.gain.value = 0;
                hOsc.connect(hFilter); hFilter.connect(this.heartGain); this.heartGain.connect(this.fxIn);
                hOsc.start();

                // Drone de amor (528 Hz) con modulación suave
                const dOsc = this.ctx.createOscillator(); dOsc.type = 'sine'; dOsc.frequency.value = 528;
                const dFilter = this.ctx.createBiquadFilter(); dFilter.type = 'lowpass'; dFilter.frequency.value = 1000;
                const dGain = this.ctx.createGain(); dGain.gain.value = 0.05;
                const lfo = this.ctx.createOscillator(); lfo.frequency.value = 0.1;
                const lfoGain = this.ctx.createGain(); lfoGain.gain.value = 0.8;
                lfo.connect(lfoGain); lfoGain.connect(dOsc.frequency);
                dOsc.connect(dFilter); dFilter.connect(dGain); dGain.connect(this.fxIn);
                dOsc.start(); lfo.start();

                // Resonancia armónica
                [108, 216, 324, 432, 540, 648].forEach((freq, i) => {
                    const o = this.ctx.createOscillator(); o.type = 'triangle'; o.frequency.value = freq;
                    const g = this.ctx.createGain(); g.gain.value = 0.02 / (i + 1);
                    o.connect(g); g.connect(this.fxIn); o.start();
                });

                this.built = true;
            }

            beat() {
                if (!this.isActive) return;
                const t = this.ctx.currentTime;
                this.heartGain.gain.cancelScheduledValues(t);
                this.heartGain.gain.setValueAtTime(0.08, t);
                this.heartGain.gain.exponentialRampToValueAtTime(0.005, t + 0.15);
                this.heartGain.gain.setValueAtTime(0.08, t + 0.45);
                this.heartGain.gain.exponentialRampToValueAtTime(0.005, t + 0.6);
            }

            playLoveWave() {
                if (!this.isActive) return;
                const now = this.ctx.currentTime;
                [396, 417, 528, 639].forEach((freq, i) => {
                    const o = this.ctx.createOscillator(); o.type = 'sine'; o.frequency.value = freq;
                    const g = this.ctx.createGain();
                    g.gain.setValueAtTime(0.0001, now + i * 0.2);
                    g.gain.linearRampToValueAtTime(0.08, now + i * 0.2 + 0.5);
                    g.gain.exponentialRampToValueAtTime(0.0001, now + i * 0.2 + 8);
                    o.connect(g); g.connect(this.fxIn);
                    o.start(now + i * 0.2); o.stop(now + i * 0.2 + 8.1);
                });
            }

            playHeartRipple() {
                if (!this.isActive) return;
                const now = this.ctx.currentTime;
                const o = this.ctx.createOscillator(); o.type = 'sine'; o.frequency.value = 432;
                const g = this.ctx.createGain();
                g.gain.setValueAtTime(0.0001, now);
                g.gain.linearRampToValueAtTime(0.06, now + 0.1);
                g.gain.exponentialRampToValueAtTime(0.0001, now + 1.5);
                o.connect(g); g.connect(this.fxIn);
                o.start(now); o.stop(now + 1.6);
            }

            startScheduling() {
                const beat = () => this.beat();
                beat(); this.timers.push(setInterval(beat, 1300));
                const wave = () => this.playLoveWave();
                wave(); this.timers.push(setInterval(wave, 6000));
            }

            clearScheduling() {
                this.timers.forEach(id => clearInterval(id));
                this.timers = [];
            }

            async activate() {
                this.ensureContext();
                if (this.ctx.state === 'suspended') await this.ctx.resume();
                this.buildBase();
                this.isActive = true;
                this.master.gain.cancelScheduledValues(this.ctx.currentTime);
                this.master.gain.linearRampToValueAtTime(this.vol, this.ctx.currentTime + 3);
                this.startScheduling();
            }

            deactivate() {
                if (!this.ctx) return;
                this.isActive = false;
                this.clearScheduling();
                this.master.gain.cancelScheduledValues(this.ctx.currentTime);
                this.master.gain.linearRampToValueAtTime(0, this.ctx.currentTime + 2);
            }
        }

        const loveAudio = new LoveAudioEngine();
        let audioActive = false;
        const audioToggle = document.getElementById('audioToggle');

        audioToggle.addEventListener('click', async (e) => {
            e.stopPropagation();
            if (!audioActive) {
                await loveAudio.activate();
                audioActive = true;
                audioToggle.textContent = '✦ Amor Sonoro';
                audioToggle.classList.add('active');
            } else {
                loveAudio.deactivate();
                audioActive = false;
                audioToggle.textContent = '✦ Sonido del Amor';
                audioToggle.classList.remove('active');
            }
        });

        // ── Partículas de amor ──
        const loveParticles = document.getElementById('loveParticles');
        const particleCount = 33;
        for (let i = 0; i < particleCount; i++) {
            const p = document.createElement('div');
            p.className = 'love-particle';
            p.style.left = Math.random() * 100 + '%';
            p.style.top = Math.random() * 100 + '%';
            p.style.setProperty('--tx', (Math.random() - 0.5) * 200 + 'px');
            p.style.setProperty('--ty', (Math.random() - 0.5) * 200 + 'px');
            p.style.animationDelay = '-' + (Math.random() * 20) + 's';
            p.style.animationDuration = (15 + Math.random() * 10) + 's';
            loveParticles.appendChild(p);
        }

        // ── Ripples de amor al tocar ──
        document.addEventListener('click', (e) => {
            if (e.target.closest('.audio-control') || e.target.closest('.infinito')) return;
            const ripple = document.createElement('div');
            ripple.className = 'heart-ripple';
            ripple.style.left = e.clientX + 'px';
            ripple.style.top = e.clientY + 'px';
            document.body.appendChild(ripple);
            if (audioActive) loveAudio.playHeartRipple();
            setTimeout(() => ripple.remove(), 2000);
        });
    </script>
</body>
</html>
