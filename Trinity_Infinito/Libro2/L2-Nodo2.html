<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conocimiento Sin Conocedor</title>
    <style>
        body {
            background: linear-gradient(45deg, #000, #0a0a0a, #000);
            color: #fff;
            font-family: 'Georgia', serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            overflow: hidden;
            cursor: none;
        }

        .knowledge-void {
            max-width: 700px;
            text-align: center;
        }

        /* Respirar persistente (delay negativo), duración unificada,
           con tiempo de lectura real. */
        .knowing {
            margin: 50px 0;
            font-size: 1.1em;
            letter-spacing: 0.3em;
            opacity: 0;
            animation: knowing-emergence 32s infinite ease-in-out;
            animation-delay: calc(var(--delay) * -4.5s);
        }
        @keyframes knowing-emergence {
            0%   { opacity: 0; transform: translateY(16px); }
            8%   { opacity: 0.5; transform: translateY(0); }
            28%  { opacity: 0.5; transform: translateY(0); }
            35%  { opacity: 0; transform: translateY(-10px); }
            100% { opacity: 0; transform: translateY(-10px); }
        }

        /* ∅ — antes animaba letter-spacing y filter:blur; ahora scale+opacity */
        .no-knower {
            font-size: 2.5em;
            margin: 80px 0;
            letter-spacing: 0.8em;
            animation: dissolve-knower 10s infinite ease-in-out;
        }
        @keyframes dissolve-knower {
            0%, 100% { opacity: 0.1; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(0.92); }
        }

        /* Partículas de sabiduría que ascienden. transform/opacity. Delay negativo. */
        .wisdom-particles {
            position: fixed;
            width: 4px;
            height: 4px;
            background: white;
            border-radius: 50%;
            opacity: 0;
            animation: wisdom-float 15s infinite ease-in-out;
            animation-delay: calc(var(--delay) * -3s);
        }
        @keyframes wisdom-float {
            0%   { opacity: 0; transform: translateY(100vh) translateX(0); }
            50%  { opacity: 0.3; transform: translateY(50vh) translateX(calc(var(--drift) * 50px)); }
            100% { opacity: 0; transform: translateY(0) translateX(calc(var(--drift) * 100px)); }
        }

        .hint {
            position: fixed;
            bottom: 70px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 11px;
            letter-spacing: 4px;
            color: rgba(255,255,255,0.3);
            animation: hint-breathe 4s ease-in-out infinite;
            transition: opacity 1.5s ease;
            pointer-events: none;
            z-index: 50;
        }
        .hint.oculto { opacity: 0; }
        @keyframes hint-breathe {
            0%, 100% { opacity: 0.16; }
            50% { opacity: 0.4; }
        }

        .infinito {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.25);
            text-decoration: none;
            font-size: 24px;
            cursor: pointer;
            transition: color 0.6s ease;
            z-index: 60;
        }
        .infinito:hover { color: rgba(255, 255, 255, 0.85); }

        @media (prefers-reduced-motion: reduce) {
            .knowing          { animation: none; opacity: 0.5; transform: none; }
            .no-knower        { animation: none; opacity: 0.4; transform: none; }
            .wisdom-particles { animation: none; opacity: 0; }
            .hint             { animation: none; opacity: 0.3; }
        }
    </style>
</head>
<body>
    <div class="wisdom-particles" style="left: 10%; --delay: 0; --drift: 1;"></div>
    <div class="wisdom-particles" style="left: 30%; --delay: 1; --drift: -1;"></div>
    <div class="wisdom-particles" style="left: 50%; --delay: 2; --drift: 0.5;"></div>
    <div class="wisdom-particles" style="left: 70%; --delay: 3; --drift: -0.5;"></div>
    <div class="wisdom-particles" style="left: 90%; --delay: 4; --drift: 1;"></div>

    <div class="knowledge-void">
        <div class="knowing" style="--delay: 0;">
            El saber surge
        </div>

        <div class="knowing" style="--delay: 1;">
            Sin alguien que sepa
        </div>

        <div class="knowing" style="--delay: 2;">
            La comprensión ocurre
        </div>

        <div class="knowing" style="--delay: 3;">
            Sin mente que comprenda
        </div>

        <div class="no-knower">∅</div>

        <div class="knowing" style="--delay: 4;">
            Como el amanecer
        </div>

        <div class="knowing" style="--delay: 5;">
            No necesita testigo
        </div>

        <div class="knowing" style="--delay: 6;">
            Para iluminar
        </div>
    </div>

    <div class="hint" id="hint">( tocá para que el saber resuene )</div>
    <a class="infinito" href="L2-Nodo3.html" title="Siguiente portal">∞</a>

    <script>
    // ============================================================
    //  Web Audio API puro, SIN CDN.
    //  El saber que surge solo, como el amanecer: un drone tibio
    //  y flores de sonido que ascienden levemente (la luz que se
    //  enciende sin testigo), con reverberación amplia.
    // ============================================================
    let actx = null, master = null, fxIn = null, started = false;
    const timers = [];

    function makeReverbIR(seconds, decay) {
        const rate = actx.sampleRate, len = Math.floor(rate * seconds);
        const buf = actx.createBuffer(2, len, rate);
        for (let ch = 0; ch < 2; ch++) {
            const data = buf.getChannelData(ch);
            for (let i = 0; i < len; i++)
                data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, decay);
        }
        return buf;
    }
    function panner(p) { const sp = actx.createStereoPanner(); sp.pan.value = p; return sp; }

    function buildGraph() {
        actx = new (window.AudioContext || window.webkitAudioContext)();
        master = actx.createGain(); master.gain.value = 0; master.connect(actx.destination);

        const dry = actx.createGain(); dry.gain.value = 0.7; dry.connect(master);
        const conv = actx.createConvolver(); conv.buffer = makeReverbIR(8, 2.4);
        const wet = actx.createGain(); wet.gain.value = 0.5; conv.connect(wet); wet.connect(master);
        fxIn = actx.createGain(); fxIn.connect(dry); fxIn.connect(conv);

        // Drone tibio (fundamental + tercera mayor: luz)
        const o1 = actx.createOscillator(); o1.type = 'sine'; o1.frequency.value = 98;   // G2
        const o2 = actx.createOscillator(); o2.type = 'sine'; o2.frequency.value = 122.5; // tercera mayor
        const dg = actx.createGain(); dg.gain.value = 0.045;
        o1.connect(dg); o2.connect(dg); dg.connect(fxIn);
        const lfo = actx.createOscillator(); lfo.type = 'sine'; lfo.frequency.value = 0.05;
        const lfoDepth = actx.createGain(); lfoDepth.gain.value = 0.02;
        lfo.connect(lfoDepth); lfoDepth.connect(dg.gain);
        o1.start(); o2.start(); lfo.start();
    }

    // Una "comprensión" que asciende como la luz del amanecer
    function playDawn(t0) {
        const base = [261.63, 293.66, 329.63, 392.00, 440.00]; // C4 D4 E4 G4 A4
        const f = base[Math.floor(Math.random() * base.length)];
        const o = actx.createOscillator(); o.type = 'sine';
        o.frequency.setValueAtTime(f, t0);
        o.frequency.linearRampToValueAtTime(f * 1.03, t0 + 5); // leve ascenso
        const g = actx.createGain();
        g.gain.setValueAtTime(0.0001, t0);
        g.gain.linearRampToValueAtTime(0.05, t0 + 2);
        g.gain.exponentialRampToValueAtTime(0.0001, t0 + 6.5);
        o.connect(g); g.connect(panner(Math.random() * 1.2 - 0.6)).connect(fxIn);
        o.start(t0); o.stop(t0 + 6.7);
    }

    function startScheduling() {
        const dawn = () => playDawn(actx.currentTime + 0.05);
        dawn(); timers.push(setInterval(dawn, 4200));
    }

    async function initSound() {
        if (started) return; started = true;
        buildGraph();
        if (actx.state === 'suspended') await actx.resume();
        master.gain.linearRampToValueAtTime(0.78, actx.currentTime + 5);
        startScheduling();
        const hint = document.getElementById('hint'); if (hint) hint.classList.add('oculto');
    }
    document.body.addEventListener('click', initSound, { once: true });
    </script>
</body>
</html>
