<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Ojo Que No Puede Verse</title>
    <style>
        body {
            background: radial-gradient(circle at center, #000, #050505);
            color: #fff;
            /* Georgia: estándar de la serie (antes Garamond) */
            font-family: 'Georgia', 'Garamond', serif;
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            cursor: none;
        }
        .vision-paradox {
            position: relative;
            width: 600px;
            height: 600px;
            max-width: 92vw;
            max-height: 92vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .eye-symbol {
            font-size: 8em;
            opacity: 0.1;
            color: rgba(255,255,255,0.92);
            text-shadow: 0 0 40px rgba(255,255,255,0.25);
            animation: eye-pulse 12s infinite ease-in-out;
        }
        @keyframes eye-pulse {
            0%, 100% { opacity: 0.1; transform: scale(1) rotate(0deg); }
            25% { opacity: 0.3; transform: scale(1.1) rotate(90deg); }
            50% { opacity: 0.2; transform: scale(0.9) rotate(180deg); }
            75% { opacity: 0.4; transform: scale(1.05) rotate(270deg); }
        }
        /* Sólo opacity: así se conservan los transform de centrado en línea */
        .seeing-text {
            position: absolute;
            font-size: 1em;
            letter-spacing: 0.3em;
            opacity: 0;
            animation: text-emerge 25s infinite ease-in-out;
            animation-delay: calc(var(--delay) * -5s);
        }
        @keyframes text-emerge {
            0%   { opacity: 0; }
            8%   { opacity: 0.5; }
            30%  { opacity: 0.5; }
            38%  { opacity: 0; }
            100% { opacity: 0; }
        }
        .impossible-vision {
            position: absolute;
            bottom: 15%;
            width: 100%;
            text-align: center;
            font-style: italic;
            line-height: 2;
            opacity: 0;
            animation: final-truth 32s infinite ease-in-out;
        }
        @keyframes final-truth {
            0%, 55%, 100% { opacity: 0; }
            65%, 90% { opacity: 0.35; }
            96% { opacity: 0; }
        }
        .vision-layer {
            position: absolute;
            width: 300px;
            height: 300px;
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 50%;
            animation: layer-rotate 30s infinite linear;
            animation-direction: var(--direction);
        }
        @keyframes layer-rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .hint {
            position: fixed;
            bottom: 66px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 11px;
            letter-spacing: 4px;
            color: rgba(255,255,255,0.3);
            animation: hint-breathe 4s ease-in-out infinite;
            transition: opacity 1.5s ease;
            pointer-events: none;
            z-index: 50;
        }
        .hint.oculto { opacity: 0; }
        @keyframes hint-breathe {
            0%, 100% { opacity: 0.16; }
            50% { opacity: 0.4; }
        }
        .infinito {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.25);
            text-decoration: none;
            font-size: 24px;
            cursor: pointer;
            transition: color 0.6s ease;
            z-index: 60;
        }
        .infinito:hover { color: rgba(255, 255, 255, 0.85); }

        @media (prefers-reduced-motion: reduce) {
            .eye-symbol       { animation: none; opacity: 0.3; }
            .seeing-text      { animation: none; opacity: 0.4; }
            .impossible-vision{ animation: none; opacity: 0.4; }
            .vision-layer     { animation: none; }
            .hint             { animation: none; opacity: 0.3; }
        }
    </style>
</head>
<body>
    <div class="vision-paradox">
        <div class="vision-layer" style="--direction: normal;"></div>
        <div class="vision-layer" style="--direction: reverse; width: 400px; height: 400px;"></div>
        <div class="vision-layer" style="--direction: normal; width: 500px; height: 500px;"></div>
        <div class="eye-symbol">◉</div>
        <div class="seeing-text" style="top: 10%; left: 50%; transform: translateX(-50%); --delay: 0;">Ve todo</div>
        <div class="seeing-text" style="top: 30%; left: 10%; --delay: 1;">Excepto</div>
        <div class="seeing-text" style="top: 30%; right: 10%; --delay: 2;">A sí mismo</div>
        <div class="seeing-text" style="bottom: 30%; left: 5%; --delay: 3;">La visión</div>
        <div class="seeing-text" style="bottom: 30%; right: 5%; --delay: 4;">Sin vidente</div>
        <div class="impossible-vision">
            El ojo no puede verse<br>
            Porque ES la visión misma<br>
            <br>
            Tú no puedes verte<br>
            Porque ERES la consciencia misma<br>
            <br>
            No hay nadie observando<br>
            Solo observación ocurriendo
        </div>
    </div>

    <div class="hint" id="hint">( tocá para que la visión resuene )</div>
    <!-- Encadenamiento ∞ hacia el Libro 3 (verificá esta ruta relativa en tu repo) -->
    <a class="infinito" href="../Libro3/L3-Nodo1.html" title="Siguiente portal">∞</a>

    <script>
    // ============================================================
    //  Web Audio API puro, SIN CDN.
    //  Concepto preservado: campo binaural gamma (40 Hz), el giro de
    //  la percepción (coro que se panea lento), el pulso del ojo y
    //  los susurros de la sabiduría.
    // ============================================================
    let actx = null, master = null, fxIn = null, started = false;
    let binGain = null, choirGain = null;
    const timers = [];

    function makeReverbIR(seconds, decay) {
        const rate = actx.sampleRate, len = Math.floor(rate * seconds);
        const buf = actx.createBuffer(2, len, rate);
        for (let ch = 0; ch < 2; ch++) {
            const data = buf.getChannelData(ch);
            for (let i = 0; i < len; i++)
                data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, decay);
        }
        return buf;
    }
    function panner(p) { const sp = actx.createStereoPanner(); sp.pan.value = p; return sp; }

    function buildGraph() {
        actx = new (window.AudioContext || window.webkitAudioContext)();
        master = actx.createGain(); master.gain.value = 0; master.connect(actx.destination);

        const dry = actx.createGain(); dry.gain.value = 0.65; dry.connect(master);
        const conv = actx.createConvolver(); conv.buffer = makeReverbIR(10, 2.0);
        const wet = actx.createGain(); wet.gain.value = 0.5; conv.connect(wet); wet.connect(master);
        fxIn = actx.createGain(); fxIn.connect(dry); fxIn.connect(conv);

        // 1) Campo binaural gamma (~40 Hz)
        const oscL = actx.createOscillator(); oscL.type = 'sine'; oscL.frequency.value = 100;
        const oscR = actx.createOscillator(); oscR.type = 'sine'; oscR.frequency.value = 140;
        binGain = actx.createGain(); binGain.gain.value = 0; // entra suave en initSound
        oscL.connect(panner(-1)).connect(binGain);
        oscR.connect(panner(1)).connect(binGain);
        binGain.connect(fxIn);
        oscL.start(); oscR.start();

        // 2) El giro de la percepción: coro que se panea lento (~30 s)
        const auto = panner(0);
        const panLFO = actx.createOscillator(); panLFO.type = 'sine'; panLFO.frequency.value = 1 / 30;
        const panDepth = actx.createGain(); panDepth.gain.value = 0.85;
        panLFO.connect(panDepth); panDepth.connect(auto.pan);
        choirGain = actx.createGain(); choirGain.gain.value = 0; // ataque lento en initSound
        auto.connect(fxIn);
        [130.81, 196.00, 261.63].forEach(f => { // C3 G3 C4
            const o = actx.createOscillator(); o.type = 'sine'; o.frequency.value = f;
            const o2 = actx.createOscillator(); o2.type = 'sine'; o2.frequency.value = f * 1.004; // leve coro
            o.connect(choirGain); o2.connect(choirGain);
            o.start(); o2.start();
        });
        choirGain.connect(auto);
        panLFO.start();
    }

    // 3) Pulso del ojo (membrana grave)
    function playEyePulse(t0) {
        const o = actx.createOscillator(); o.type = 'sine';
        o.frequency.setValueAtTime(110, t0);
        o.frequency.exponentialRampToValueAtTime(32.7, t0 + 0.15); // C1
        const g = actx.createGain();
        g.gain.setValueAtTime(0.0001, t0);
        g.gain.exponentialRampToValueAtTime(0.3, t0 + 0.01);
        g.gain.exponentialRampToValueAtTime(0.0001, t0 + 3);
        o.connect(g); g.connect(fxIn);
        o.start(t0); o.stop(t0 + 3.2);
    }

    // 4) Susurros de la sabiduría (púas agudas)
    let wIdx = 0;
    const wNotes = [1046.5, 1174.7, 1318.5, 1568.0, 1760.0]; // C6 D6 E6 G6 A6
    function playWhisper(t0) {
        const f = wNotes[wIdx % wNotes.length]; wIdx++;
        const o = actx.createOscillator(); o.type = 'triangle'; o.frequency.value = f;
        const lp = actx.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 3500;
        const g = actx.createGain();
        g.gain.setValueAtTime(0.0001, t0);
        g.gain.exponentialRampToValueAtTime(0.04, t0 + 0.006);
        g.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.4);
        o.connect(lp); lp.connect(g); g.connect(panner(Math.random() * 1.6 - 0.8)).connect(fxIn);
        o.start(t0); o.stop(t0 + 0.44);
    }

    function startScheduling() {
        const pulse = () => playEyePulse(actx.currentTime + 0.05);
        pulse(); timers.push(setInterval(pulse, 12000));
        const whisper = () => playWhisper(actx.currentTime + 0.05);
        whisper(); timers.push(setInterval(whisper, 2000));
    }

    async function initSound() {
        if (started) return; started = true;
        buildGraph();
        if (actx.state === 'suspended') await actx.resume();
        master.gain.linearRampToValueAtTime(0.8, actx.currentTime + 4);
        binGain.gain.linearRampToValueAtTime(0.04, actx.currentTime + 3);
        choirGain.gain.linearRampToValueAtTime(0.04, actx.currentTime + 6); // ataque lento del coro
        startScheduling();
        const hint = document.getElementById('hint'); if (hint) hint.classList.add('oculto');
    }
    document.body.addEventListener('click', initSound, { once: true });
    </script>
</body>
</html>
