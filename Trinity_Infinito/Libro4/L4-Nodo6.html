<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Autosimilitud Total</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
        background: #000;
        color: #fff;
        font-family: 'Georgia', serif;
        overflow: hidden;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        cursor: none;
    }

    .similarity-container {
        position: relative; width: 100%; height: 100%;
        display: flex; justify-content: center; align-items: center;
    }

    .golden-spiral {
        position: absolute; width: 500px; height: 500px;
        max-width: 88vw; max-height: 88vh;
        border: 2px solid rgba(208,192,160,0.85);
        border-radius: 50%;
        border-top-color: transparent; border-left-color: transparent;
        animation: spiralRotate 12s infinite linear;
    }
    @keyframes spiralRotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

    .fibonacci-square {
        position: absolute; left: 50%; top: 50%;
        border: 1px solid rgba(208,192,160,0.5);
        animation: fibPulse 9s infinite ease-in-out;
    }
    @keyframes fibPulse {
        0%, 100% { transform: translate(-50%,-50%) rotate(var(--rot)) scale(1); opacity: 0.3; }
        50%      { transform: translate(-50%,-50%) rotate(calc(var(--rot) + 90deg)) scale(1.1); opacity: 0.8; }
    }

    .self-similar-text {
        position: absolute; left: 50%; top: 50%;
        font-size: var(--size); color: rgba(255,255,255,0.8);
        text-shadow: 0 0 10px rgba(255,255,255,0.4);
        animation: selfEcho 12s infinite ease-in;
    }
    @keyframes selfEcho {
        0%   { transform: translate(-50%,-50%) scale(0.1); opacity: 0; }
        15%  { opacity: 0.9; }
        50%  { transform: translate(-50%,-50%) scale(1); opacity: 0.9; }
        100% { transform: translate(-50%,-50%) scale(9); opacity: 0; }
    }

    .dna-helix { position: absolute; width: 100px; height: 300px; top: 50%; left: 50%; transform: translate(-50%, -50%); }
    .dna-strand {
        position: absolute; width: 4px; height: 20px;
        background: linear-gradient(45deg, rgba(90,210,230,0.85), rgba(200,120,220,0.85));
        border-radius: 50%;
        animation: helixRotate 4s infinite linear;
    }
    @keyframes helixRotate {
        0%   { transform: rotateY(0deg) translateZ(30px); }
        100% { transform: rotateY(360deg) translateZ(30px); }
    }

    .pattern-echo {
        position: absolute; width: 100%; height: 100%;
        background: radial-gradient(circle at center, transparent 0%, rgba(255,255,255,0.02) 25%, transparent 50%, rgba(255,255,255,0.02) 75%, transparent 100%);
        animation: echoExpand 6s infinite ease-out;
    }
    @keyframes echoExpand {
        0%   { transform: scale(0); opacity: 1; }
        100% { transform: scale(3); opacity: 0; }
    }

    .wisdom-similar {
        position: fixed; bottom: 9%; left: 50%; transform: translateX(-50%);
        text-align: center; font-size: 1.05em; line-height: 1.9;
        color: rgba(208,192,160,0.9); text-shadow: 0 0 18px rgba(208,192,160,0.35);
        width: 88%; max-width: 640px; z-index: 100;
        animation: wisdomGlow 13s infinite ease-in-out;
    }
    @keyframes wisdomGlow {
        0%   { opacity: 0; }
        12%  { opacity: 0.92; }
        80%  { opacity: 0.92; }
        92%  { opacity: 0; }
        100% { opacity: 0; }
    }

    .phi-symbol {
        position: fixed; top: 10%; left: 50%; transform: translateX(-50%);
        font-size: 60px; color: #d0c0a0; text-shadow: 0 0 28px rgba(208,192,160,0.45);
        animation: phiRotate 24s infinite linear; z-index: 30;
    }
    @keyframes phiRotate { from { transform: translateX(-50%) rotate(0deg); } to { transform: translateX(-50%) rotate(360deg); } }

    canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0.45; }

    .hint {
        position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
        font-size: 11px; letter-spacing: 4px; color: rgba(255,255,255,0.3);
        animation: hint-breathe 4s ease-in-out infinite; transition: opacity 1.5s ease; pointer-events: none; z-index: 60;
    }
    .hint.oculto { opacity: 0; }
    @keyframes hint-breathe { 0%,100% { opacity: 0.16; } 50% { opacity: 0.4; } }
    .infinito {
        position: fixed; bottom: 24px; right: 28px;
        color: rgba(208,192,160,0.4); text-decoration: none; font-size: 24px;
        cursor: pointer; transition: color 0.6s ease; z-index: 60;
    }
    .infinito:hover { color: rgba(208,192,160,0.95); }

    @media (prefers-reduced-motion: reduce) {
        .golden-spiral { animation: none; }
        .fibonacci-square { animation: none; opacity: 0.4; }
        .self-similar-text { animation: none; opacity: 0; }
        .dna-strand { animation: none; }
        .pattern-echo { animation: none; opacity: 0; }
        .wisdom-similar { animation: none; opacity: 0.92; }
        .phi-symbol { animation: none; }
    }
</style>
</head>
<body>
    <canvas id="similarCanvas"></canvas>

    <div class="phi-symbol">φ</div>

    <div class="similarity-container">
        <div class="golden-spiral"></div>
        <div class="dna-helix"></div>
        <div class="pattern-echo"></div>
    </div>

    <div class="wisdom-similar">
        Como es arriba, es abajo<br>
        como es adentro, es afuera<br>
        El patrón único danzando consigo mismo
    </div>

    <div class="hint" id="hint">( tocá: el patrón resuena )</div>
    <a class="infinito" href="L4-Nodo7.html" title="Siguiente portal">∞</a>

    <script>
    const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
    const container = document.querySelector('.similarity-container');

    // ── Canvas: triángulo de Sierpinski (oro) ──
    const canvas = document.getElementById('similarCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    function drawSierpinski(x, y, size, depth) {
        if (depth === 0) {
            ctx.beginPath();
            ctx.moveTo(x, y); ctx.lineTo(x + size, y); ctx.lineTo(x + size/2, y - size*0.866); ctx.closePath();
            ctx.stroke(); return;
        }
        const h = size / 2;
        drawSierpinski(x, y, h, depth-1);
        drawSierpinski(x + h, y, h, depth-1);
        drawSierpinski(x + h/2, y - h*0.866, h, depth-1);
    }
    function animate() {
        ctx.fillStyle = 'rgba(0,0,0,0.06)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
        const time = Date.now() * 0.0005;
        ctx.strokeStyle = `hsla(${44 + Math.sin(time) * 10}, 55%, 62%, 0.3)`;
        ctx.lineWidth = 1;
        const size = 200 + Math.sin(time) * 50;
        ctx.save(); ctx.translate(canvas.width/2, canvas.height/2); ctx.rotate(time);
        drawSierpinski(-size/2, size/2, size, 4); ctx.restore();
        if (!reduce) requestAnimationFrame(animate);
    }
    animate();

    // ── Cuadrados de Fibonacci ──
    [8, 13, 21, 34, 55, 89, 144].forEach((size, i) => {
        const sq = document.createElement('div');
        sq.className = 'fibonacci-square';
        sq.style.width = size*2 + 'px'; sq.style.height = size*2 + 'px';
        sq.style.setProperty('--rot', (i * 45) + 'deg');
        sq.style.animationDelay = i * 0.5 + 's';
        container.appendChild(sq);
    });

    // ── Hélice de ADN ──
    const helix = document.querySelector('.dna-helix');
    for (let i = 0; i < 15; i++) {
        const s1 = document.createElement('div'); s1.className = 'dna-strand';
        s1.style.top = i*20 + 'px'; s1.style.animationDelay = i*0.1 + 's';
        helix.appendChild(s1);
        const s2 = document.createElement('div'); s2.className = 'dna-strand';
        s2.style.top = i*20 + 'px'; s2.style.animationDelay = (i*0.1 + 2) + 's';
        s2.style.background = 'linear-gradient(45deg, rgba(220,200,120,0.85), rgba(140,220,160,0.85))';
        helix.appendChild(s2);
    }

    // ── Texto autosimilar ──
    ['TODO','EN','UNO','UNO','EN','TODO'].forEach((text, i) => {
        const el = document.createElement('div'); el.className = 'self-similar-text';
        el.textContent = text; el.style.setProperty('--size', (8 + i*4) + 'px');
        el.style.animationDelay = i*2 + 's';
        container.appendChild(el);
    });

    if (!reduce) {
        setInterval(() => {
            const echo = document.createElement('div'); echo.className = 'pattern-echo';
            container.appendChild(echo); setTimeout(() => echo.remove(), 6000);
        }, 2000);
    }

    // ── Sabiduría (con tiempo de lectura) ──
    const wisdoms = [
        "Como es arriba, es abajo<br>como es adentro, es afuera<br>El patrón único danzando consigo mismo",
        "En la semilla está el árbol<br>en el árbol, infinitas semillas<br>¿Dónde comienza el ciclo?",
        "El ADN en cada célula<br>contiene el plano completo<br>Cada parte es el todo",
        "La proporción áurea<br>en la galaxia y en la flor<br>La misma espiral en todas partes",
        "No hay copias, solo el original<br>repitiéndose infinitamente<br>Siempre igual, siempre único"
    ];
    let wIdx = 0;
    setInterval(() => { wIdx = (wIdx + 1) % wisdoms.length; document.querySelector('.wisdom-similar').innerHTML = wisdoms[wIdx]; }, 13000);

    // ── Audio (Web Audio puro, SIN CDN; nace al tocar) ──
    let actx = null, master = null, fxIn = null, started = false;
    const timers = [];
    function makeReverbIR(s, d) {
        const rate = actx.sampleRate, len = Math.floor(rate * s);
        const b = actx.createBuffer(2, len, rate);
        for (let c = 0; c < 2; c++) { const a = b.getChannelData(c); for (let i = 0; i < len; i++) a[i] = (Math.random()*2-1)*Math.pow(1-i/len, d); }
        return b;
    }
    function panner(p) { const s = actx.createStereoPanner(); s.pan.value = p; return s; }

    function buildGraph() {
        actx = new (window.AudioContext || window.webkitAudioContext)();
        master = actx.createGain(); master.gain.value = 0; master.connect(actx.destination);
        const dry = actx.createGain(); dry.gain.value = 0.6; dry.connect(master);
        const conv = actx.createConvolver(); conv.buffer = makeReverbIR(10, 1.9);
        const wet = actx.createGain(); wet.gain.value = 0.55; conv.connect(wet); wet.connect(master);
        fxIn = actx.createGain(); fxIn.connect(dry); fxIn.connect(conv);

        // Drone de octavas: el mismo patrón en todas las escalas (como es arriba, es abajo)
        [65.41, 130.81, 261.63, 523.25].forEach((f, i) => {
            [f, f * 1.003].forEach(ff => {
                const o = actx.createOscillator(); o.type = 'sine'; o.frequency.value = ff;
                const g = actx.createGain(); g.gain.value = 0.03 / (i * 0.5 + 1);
                o.connect(g); g.connect(fxIn); o.start();
            });
        });
    }

    // Motivo cuya cadencia se anida según Fibonacci (autosimilitud rítmica)
    const fib = [1, 1, 2, 3, 5, 8, 5, 3, 2, 1];
    const escala = [392.00, 523.25, 587.33, 784.00, 1046.50]; // pentatónica
    let fi = 0;
    function playBell(t0) {
        const f = escala[Math.floor(Math.random() * escala.length)];
        const o = actx.createOscillator(); o.type = 'sine'; o.frequency.value = f;
        const o2 = actx.createOscillator(); o2.type = 'sine'; o2.frequency.value = f * 2;
        const g2 = actx.createGain(); g2.gain.value = 0.2; o2.connect(g2);
        const g = actx.createGain();
        g.gain.setValueAtTime(0.0001, t0);
        g.gain.linearRampToValueAtTime(0.035, t0 + 0.02);
        g.gain.exponentialRampToValueAtTime(0.0001, t0 + 3.5);
        o.connect(g); g2.connect(g); g.connect(panner(Math.random()*1.2-0.6)).connect(fxIn);
        o.start(t0); o2.start(t0); o.stop(t0 + 3.6); o2.stop(t0 + 3.6);
    }
    function nextBell() {
        if (!started) return;
        playBell(actx.currentTime + 0.05);
        const wait = fib[fi % fib.length] * 700;
        fi++;
        const t = setTimeout(nextBell, wait);
        timers.push(t);
    }

    async function initSound() {
        if (started) return; started = true;
        buildGraph();
        if (actx.state === 'suspended') await actx.resume();
        master.gain.linearRampToValueAtTime(0.7, actx.currentTime + 5);
        nextBell();
        const h = document.getElementById('hint'); if (h) h.classList.add('oculto');
    }
    document.body.addEventListener('click', initSound, { once: true });
    </script>
</body>
</html>
