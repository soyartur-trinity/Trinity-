<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La Geometría Sagrada del Vacío</title>
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
        background: radial-gradient(ellipse at center, #1a0033, #000);
        color: #fff;
        font-family: 'Georgia', serif;
        overflow: hidden;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        perspective: 1500px;
        cursor: none;
    }

    .sacred-container {
        position: relative; width: 600px; height: 600px;
        max-width: 92vw; max-height: 92vh;
        transform-style: preserve-3d;
        animation: sacredRotation 70s infinite linear;
    }
    @keyframes sacredRotation {
        from { transform: rotateX(0deg) rotateY(0deg) rotateZ(0deg); }
        to { transform: rotateX(360deg) rotateY(360deg) rotateZ(360deg); }
    }

    .metatron-cube { position: absolute; width: 400px; height: 400px; top: 50%; left: 50%; transform: translate(-50%, -50%); }

    .sacred-circle {
        position: absolute; border: 1px solid rgba(255,255,255,0.3); border-radius: 50%;
        animation: circleExpand 9s infinite ease-in-out;
    }
    @keyframes circleExpand {
        0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.3; }
        50%      { transform: translate(-50%, -50%) scale(1.5); opacity: 0.8; }
    }

    .platonic-solid {
        position: absolute; left: 50%; top: 50%;
        border: 2px solid; transform-style: preserve-3d;
        animation: solidRotate 12s infinite linear;
    }
    @keyframes solidRotate {
        from { transform: translate(-50%,-50%) rotateX(0deg) rotateY(0deg); }
        to   { transform: translate(-50%,-50%) rotateX(360deg) rotateY(360deg); }
    }

    .void-center {
        position: absolute; width: 50px; height: 50px; top: 50%; left: 50%;
        background: radial-gradient(circle, rgba(0,0,0,1) 0%, rgba(0,0,0,0.8) 30%, transparent 70%);
        border-radius: 50%;
        box-shadow: inset 0 0 60px black, 0 0 120px rgba(138,43,226,0.85);
        transform: translate(-50%, -50%);
        animation: voidPulse 5s infinite ease-in-out;
    }
    @keyframes voidPulse {
        0%, 100% { transform: translate(-50%, -50%) scale(1); opacity: 0.85; }
        50%      { transform: translate(-50%, -50%) scale(1.5); opacity: 1; }
    }

    .flower-of-life { position: absolute; width: 100%; height: 100%; opacity: 0.3; }
    .petal {
        position: absolute; width: 100px; height: 100px;
        border: 1px solid #d0c0a0; border-radius: 50%;
        box-shadow: 0 0 22px rgba(208,192,160,0.5);
        animation: petalGlow 7s infinite ease-in-out;
    }
    @keyframes petalGlow {
        0%, 100% { opacity: 0.3; transform: scale(1); }
        50%      { opacity: 0.8; transform: scale(1.08); }
    }

    .sacred-text {
        position: absolute; left: 50%; top: 50%;
        font-size: 14px; color: rgba(255,215,0,0.8); text-shadow: 0 0 10px rgba(208,192,160,0.6);
        animation: textOrbit 16s infinite linear;
    }
    @keyframes textOrbit {
        from { transform: rotate(0deg) translateX(250px) rotate(0deg); }
        to   { transform: rotate(360deg) translateX(250px) rotate(-360deg); }
    }

    .wisdom-geometry {
        position: fixed; bottom: 6%; left: 50%; transform: translateX(-50%);
        text-align: center; font-size: 1.05em; line-height: 1.9;
        color: rgba(255,255,255,0.88); text-shadow: 0 0 18px rgba(255,255,255,0.4);
        width: 90%; max-width: 640px; z-index: 100;
        animation: geometryWisdom 13s infinite ease-in-out;
    }
    @keyframes geometryWisdom {
        0%   { opacity: 0; }
        12%  { opacity: 0.88; }
        80%  { opacity: 0.88; }
        92%  { opacity: 0; }
        100% { opacity: 0; }
    }

    canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; opacity: 0.55; }

    .hint {
        position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%);
        font-size: 11px; letter-spacing: 4px; color: rgba(255,255,255,0.3);
        animation: hint-breathe 4s ease-in-out infinite; transition: opacity 1.5s ease; pointer-events: none; z-index: 60;
    }
    .hint.oculto { opacity: 0; }
    @keyframes hint-breathe { 0%,100% { opacity: 0.16; } 50% { opacity: 0.4; } }
    .infinito {
        position: fixed; bottom: 24px; right: 28px;
        color: rgba(208,192,160,0.4); text-decoration: none; font-size: 24px;
        cursor: pointer; transition: color 0.6s ease; z-index: 60;
    }
    .infinito:hover { color: rgba(208,192,160,0.95); }

    @media (prefers-reduced-motion: reduce) {
        .sacred-container { animation: none; }
        .sacred-circle { animation: none; opacity: 0.4; }
        .platonic-solid { animation: none; }
        .void-center { animation: none; opacity: 0.9; }
        .petal { animation: none; opacity: 0.5; }
        .sacred-text { animation: none; }
        .wisdom-geometry { animation: none; opacity: 0.88; }
    }
</style>
</head>
<body>
    <canvas id="geometryCanvas"></canvas>

    <div class="sacred-container">
        <div class="flower-of-life"></div>
        <div class="metatron-cube"></div>
        <div class="void-center"></div>
    </div>

    <div class="wisdom-geometry">
        En el vacío perfecto surge la geometría<br>
        los ángulos del no-espacio<br>
        las formas de la nada formándolo todo
    </div>

    <div class="hint" id="hint">( tocá: la geometría resuena )</div>
    <a class="infinito" href="../Libro5/L5-Nodo1.html" title="Siguiente libro">∞</a>

    <script>
    const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

    // ── Canvas: Merkaba + Flor de la Vida ──
    const canvas = document.getElementById('geometryCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    const cx = canvas.width / 2, cy = canvas.height / 2;
    function drawMerkaba(x, y, size, rot) {
        ctx.save(); ctx.translate(x, y); ctx.rotate(rot);
        ctx.strokeStyle = 'rgba(160, 110, 220, 0.5)'; ctx.lineWidth = 1;
        for (const off of [-90, 90]) {
            ctx.beginPath();
            for (let i = 0; i < 3; i++) {
                const a = (i * 120 + off) * Math.PI / 180;
                const px = Math.cos(a) * size, py = Math.sin(a) * size;
                i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
            }
            ctx.closePath(); ctx.stroke();
        }
        ctx.restore();
    }
    function drawFlowerOfLife(x, y, radius, layers) {
        ctx.strokeStyle = 'rgba(208, 192, 160, 0.22)'; ctx.lineWidth = 1;
        ctx.beginPath(); ctx.arc(x, y, radius, 0, Math.PI*2); ctx.stroke();
        for (let layer = 1; layer <= layers; layer++) for (let i = 0; i < 6*layer; i++) {
            const a = (i * 60 / layer) * Math.PI / 180;
            ctx.beginPath(); ctx.arc(x + Math.cos(a)*radius*layer, y + Math.sin(a)*radius*layer, radius, 0, Math.PI*2); ctx.stroke();
        }
    }
    function animate() {
        ctx.fillStyle = 'rgba(0,0,0,0.06)'; ctx.fillRect(0, 0, canvas.width, canvas.height);
        const time = Date.now() * 0.0005;
        drawMerkaba(cx, cy, 150, time);
        drawMerkaba(cx, cy, 100, -time * 1.5);
        drawMerkaba(cx, cy, 50, time * 2);
        drawFlowerOfLife(cx, cy, 30 + Math.sin(time*2)*10, 2);
        if (!reduce) requestAnimationFrame(animate);
    }
    animate();

    // ── Círculos sagrados (Metatrón = 13) ──
    const metatron = document.querySelector('.metatron-cube');
    for (let i = 0; i < 13; i++) {
        const circle = document.createElement('div');
        circle.className = 'sacred-circle';
        circle.style.width = '100px'; circle.style.height = '100px';
        if (i === 0) { circle.style.left = '50%'; circle.style.top = '50%'; }
        else {
            const a = ((i - 1) * 60) * Math.PI / 180;
            circle.style.left = `${200 + Math.cos(a) * 100}px`;
            circle.style.top = `${200 + Math.sin(a) * 100}px`;
        }
        circle.style.animationDelay = `${i * 0.3}s`;
        metatron.appendChild(circle);
    }

    // ── Sólidos platónicos (paleta violeta/oro) ──
    const sacredContainer = document.querySelector('.sacred-container');
    const solidColors = ['rgba(170,130,220,0.35)','rgba(208,192,160,0.35)','rgba(150,160,230,0.32)','rgba(200,170,210,0.32)','rgba(190,150,220,0.34)'];
    ['Tetraedro','Cubo','Octaedro','Dodecaedro','Icosaedro'].forEach((s, i) => {
        const el = document.createElement('div');
        el.className = 'platonic-solid';
        el.style.width = `${50 + i*20}px`; el.style.height = `${50 + i*20}px`;
        el.style.borderColor = solidColors[i];
        el.style.animationDelay = `${i * 2}s`;
        sacredContainer.appendChild(el);
    });

    // ── Constantes orbitando ──
    ['φ', '√2', 'π', '∞', '0'].forEach((word, i) => {
        const t = document.createElement('div'); t.className = 'sacred-text';
        t.textContent = word; t.style.animationDelay = `${i * 3}s`;
        sacredContainer.appendChild(t);
    });

    // ── Pétalos (Flor de la Vida) ──
    const flower = document.querySelector('.flower-of-life');
    for (let i = 0; i < 6; i++) {
        const petal = document.createElement('div'); petal.className = 'petal';
        const a = i * 60 * Math.PI / 180;
        petal.style.left = `${300 + Math.cos(a) * 50 - 50}px`;
        petal.style.top = `${300 + Math.sin(a) * 50 - 50}px`;
        petal.style.animationDelay = `${i * 0.5}s`;
        flower.appendChild(petal);
    }

    // ── Sabiduría (con tiempo de lectura) ──
    const wisdoms = [
        "En el vacío perfecto surge la geometría<br>los ángulos del no-espacio<br>las formas de la nada formándolo todo",
        "Cinco sólidos perfectos<br>infinitas combinaciones<br>la arquitectura del cosmos",
        "El círculo sin principio ni fin<br>el triángulo de la trinidad<br>el cuadrado de la manifestación",
        "Geometría: el lenguaje de lo eterno<br>matemática: el pensamiento del vacío<br>forma: la danza de la nada",
        "Antes que la materia, la proporción<br>antes que la energía, el patrón<br>antes que todo, la geometría sagrada"
    ];
    let wIdx = 0;
    setInterval(() => { wIdx = (wIdx + 1) % wisdoms.length; document.querySelector('.wisdom-geometry').innerHTML = wisdoms[wIdx]; }, 13000);

    // ── Audio (Web Audio puro, SIN CDN; nace al tocar) ──
    let actx = null, master = null, fxIn = null, started = false;
    const timers = [];
    function makeReverbIR(s, d) {
        const rate = actx.sampleRate, len = Math.floor(rate * s);
        const b = actx.createBuffer(2, len, rate);
        for (let c = 0; c < 2; c++) { const a = b.getChannelData(c); for (let i = 0; i < len; i++) a[i] = (Math.random()*2-1)*Math.pow(1-i/len, d); }
        return b;
    }
    function panner(p) { const s = actx.createStereoPanner(); s.pan.value = p; return s; }

    function buildGraph() {
        actx = new (window.AudioContext || window.webkitAudioContext)();
        master = actx.createGain(); master.gain.value = 0; master.connect(actx.destination);
        const dry = actx.createGain(); dry.gain.value = 0.5; dry.connect(master);
        const conv = actx.createConvolver(); conv.buffer = makeReverbIR(14, 1.6); // catedral / vacío
        const wet = actx.createGain(); wet.gain.value = 0.7; conv.connect(wet); wet.connect(master);
        fxIn = actx.createGain(); fxIn.connect(dry); fxIn.connect(conv);

        // Vacío: hum muy bajo
        const v = actx.createOscillator(); v.type = 'sine'; v.frequency.value = 36.71;
        const vg = actx.createGain(); vg.gain.value = 0.06; v.connect(vg); vg.connect(fxIn); v.start();

        // Geometría: proporciones perfectas (entonación justa: 1, 3/2, 2, 5/2)
        const f0 = 73.42;
        [1, 1.5, 2, 2.5].forEach((r, i) => {
            const o = actx.createOscillator(); o.type = 'sine'; o.frequency.value = f0 * r;
            const g = actx.createGain(); g.gain.value = 0; o.connect(g); g.connect(fxIn); o.start();
            g.gain.setValueAtTime(0.0001, actx.currentTime);
            g.gain.linearRampToValueAtTime(0.03 / (i * 0.4 + 1), actx.currentTime + 6 + i * 2); // emergen del silencio
        });
    }

    // Campana en una proporción perfecta
    function playBell(t0) {
        const f = 293.66 * [1, 1.5, 2, 2.5, 3][Math.floor(Math.random() * 5)];
        const o = actx.createOscillator(); o.type = 'sine'; o.frequency.value = f;
        const g = actx.createGain();
        g.gain.setValueAtTime(0.0001, t0);
        g.gain.linearRampToValueAtTime(0.03, t0 + 0.03);
        g.gain.exponentialRampToValueAtTime(0.0001, t0 + 5);
        o.connect(g); g.connect(panner(Math.random()*1.4-0.7)).connect(fxIn);
        o.start(t0); o.stop(t0 + 5.2);
    }

    async function initSound() {
        if (started) return; started = true;
        buildGraph();
        if (actx.state === 'suspended') await actx.resume();
        master.gain.linearRampToValueAtTime(0.7, actx.currentTime + 6);
        const b = () => playBell(actx.currentTime + 0.05);
        timers.push(setInterval(b, 6000));
        const h = document.getElementById('hint'); if (h) h.classList.add('oculto');
    }
    document.body.addEventListener('click', initSound, { once: true });
    </script>
</body>
</html>
