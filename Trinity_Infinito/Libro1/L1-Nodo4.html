<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El Testigo del Testigo del Testigo</title>
    <style>
        body {
            background: radial-gradient(ellipse at center, #0a0a0a, #000);
            color: #fff;
            /* Georgia: estándar de la serie (antes Palatino) */
            font-family: 'Georgia', 'Palatino', serif;
            margin: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            perspective: 1000px;
            overflow: hidden;
            cursor: none;
        }
        .witness-layers {
            position: relative;
            width: 500px;
            height: 500px;
            transform-style: preserve-3d;
            animation: rotate 20s infinite linear;
        }
        @keyframes rotate {
            from { transform: rotateY(0deg); }
            to { transform: rotateY(360deg); }
        }
        .witness {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.2em;
            letter-spacing: 0.3em;
            opacity: 0.3;
            transform: translateZ(calc(var(--depth) * 100px));
            animation: witness-pulse 8s infinite;
            animation-delay: calc(var(--depth) * 0.5s);
        }
        @keyframes witness-pulse {
            0%, 100% { opacity: 0.1; }
            50% { opacity: 0.6; }
        }
        /* El ojo: punto quieto en el centro, mientras la regresión gira a su alrededor */
        .center-eye {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 4em;
            z-index: 20;
            color: rgba(255,255,255,0.92);
            text-shadow: 0 0 26px rgba(255,255,255,0.3);
            animation: blink 10s infinite;
        }
        @keyframes blink {
            0%, 48%, 52%, 100% { opacity: 0.8; }
            50% { opacity: 0; }
        }
        /* Las preguntas, ahora legibles: respiran fuera del contenedor que rota. */
        .questions {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 30;
        }
        .question {
            position: absolute;
            width: 100%;
            text-align: center;
            font-style: italic;
            color: #8a8a8a;
            letter-spacing: 0.1em;
            opacity: 0;
            animation: question-breathe 24s infinite ease-in-out;
            animation-delay: calc(var(--i) * -6s);
        }
        @keyframes question-breathe {
            0%   { opacity: 0; transform: translateY(-12px); }
            6%   { opacity: 0.5; transform: translateY(0); }
            28%  { opacity: 0.5; transform: translateY(0); }
            34%  { opacity: 0; transform: translateY(8px); }
            100% { opacity: 0; transform: translateY(8px); }
        }
        .infinite-regression {
            position: fixed;
            bottom: 70px;
            width: 100%;
            text-align: center;
            font-size: 0.8em;
            letter-spacing: 0.5em;
            opacity: 0.2;
            z-index: 30;
        }
        .hint {
            position: fixed;
            bottom: 116px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 11px;
            letter-spacing: 4px;
            color: rgba(255,255,255,0.3);
            animation: hint-breathe 4s ease-in-out infinite;
            transition: opacity 1.5s ease;
            pointer-events: none;
            z-index: 40;
        }
        .hint.oculto { opacity: 0; }
        @keyframes hint-breathe {
            0%, 100% { opacity: 0.18; }
            50% { opacity: 0.45; }
        }
        .infinito {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.25);
            text-decoration: none;
            font-size: 24px;
            cursor: pointer;
            transition: color 0.6s ease;
            z-index: 40;
        }
        .infinito:hover { color: rgba(255, 255, 255, 0.85); }

        @media (prefers-reduced-motion: reduce) {
            .witness-layers { animation: none; }
            .witness        { animation: none; opacity: 0.12; }
            .center-eye     { animation: none; opacity: 0.8; }
            .question       { animation: none; opacity: 0.4; transform: none; }
            .hint           { animation: none; opacity: 0.3; }
        }
        @media (max-width: 640px) {
            .witness-layers { width: 90vw; height: 90vw; }
            .witness { font-size: 1em; }
            .center-eye { font-size: 3em; }
        }
    </style>
</head>
<body>
    <div class="witness-layers">
        <div class="witness" style="--depth: 0;">Observando</div>
        <div class="witness" style="--depth: 1;">Observando al que observa</div>
        <div class="witness" style="--depth: 2;">Observando al que observa al que observa</div>
        <div class="witness" style="--depth: 3;">Observando al que...</div>
        <div class="witness" style="--depth: 4;">...</div>
    </div>

    <div class="center-eye">◉</div>

    <div class="questions">
        <div class="question" style="top: 18%; --i: 0;">¿Quién observa?</div>
        <div class="question" style="top: 36%; --i: 1;">¿Quién observa al observador?</div>
        <div class="question" style="top: 54%; --i: 2;">¿Quién hace la pregunta?</div>
        <div class="question" style="top: 72%; --i: 3;">¿Hay alguien?</div>
    </div>

    <div class="infinite-regression">
        EL OJO QUE NO PUEDE VERSE A SÍ MISMO<br>
        PORQUE ES LA VISIÓN MISMA
    </div>

    <div class="hint" id="hint">( tocá para que el testigo resuene )</div>
    <a class="infinito" href="L1-Nodo5.html" title="Siguiente portal">∞</a>

    <script>
    // ============================================================
    //  La Sinfonía del Testigo — Web Audio API puro, SIN CDN
    //  Concepto preservado: campo binaural alpha, carrusel de la
    //  observación (pad que gira), latido del testigo silencioso
    //  y susurros de la mente.
    // ============================================================
    let actx = null, master = null, fxIn = null, started = false;
    const timers = [];

    function makeReverbIR(seconds, decay) {
        const rate = actx.sampleRate, len = Math.floor(rate * seconds);
        const buf = actx.createBuffer(2, len, rate);
        for (let ch = 0; ch < 2; ch++) {
            const data = buf.getChannelData(ch);
            for (let i = 0; i < len; i++)
                data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, decay);
        }
        return buf;
    }
    function panner(p) { const sp = actx.createStereoPanner(); sp.pan.value = p; return sp; }

    function buildGraph() {
        actx = new (window.AudioContext || window.webkitAudioContext)();
        master = actx.createGain(); master.gain.value = 0; master.connect(actx.destination);

        const dry = actx.createGain(); dry.gain.value = 0.7; dry.connect(master);
        const conv = actx.createConvolver(); conv.buffer = makeReverbIR(6, 2.4);
        const wet = actx.createGain(); wet.gain.value = 0.4; conv.connect(wet); wet.connect(master);
        fxIn = actx.createGain(); fxIn.connect(dry); fxIn.connect(conv);

        // 1) Campo binaural alpha (~10 Hz)
        const oscL = actx.createOscillator(); oscL.type = 'sine'; oscL.frequency.value = 100;
        const oscR = actx.createOscillator(); oscR.type = 'sine'; oscR.frequency.value = 110;
        const binGain = actx.createGain(); binGain.gain.value = 0.05;
        oscL.connect(panner(-1)).connect(binGain);
        oscR.connect(panner(1)).connect(binGain);
        binGain.connect(fxIn);
        oscL.start(); oscR.start();

        // 2) Carrusel de la observación: pad FM con paneo automático de ~20 s
        const carrier = actx.createOscillator(); carrier.type = 'sine'; carrier.frequency.value = 130.81; // C3
        const modOsc = actx.createOscillator(); modOsc.type = 'sine'; modOsc.frequency.value = 196.2;     // armonicidad ~1.5
        const modGain = actx.createGain(); modGain.gain.value = 60;
        modOsc.connect(modGain); modGain.connect(carrier.frequency);
        const padGain = actx.createGain(); padGain.gain.value = 0;
        padGain.gain.setValueAtTime(0, 0); // se sube en initSound
        const autoPan = panner(0);
        const panLFO = actx.createOscillator(); panLFO.type = 'sine'; panLFO.frequency.value = 1 / 20;
        const panDepth = actx.createGain(); panDepth.gain.value = 0.8;
        panLFO.connect(panDepth); panDepth.connect(autoPan.pan);
        carrier.connect(padGain).connect(autoPan).connect(fxIn);
        carrier.start(); modOsc.start(); panLFO.start();
        buildGraph._padGain = padGain;
    }

    // 3) Latido del testigo silencioso (membrana grave)
    function playHeartbeat(t0) {
        const o = actx.createOscillator(); o.type = 'sine';
        o.frequency.setValueAtTime(120, t0);
        o.frequency.exponentialRampToValueAtTime(32.7, t0 + 0.12); // C1
        const g = actx.createGain();
        g.gain.setValueAtTime(0.0001, t0);
        g.gain.exponentialRampToValueAtTime(0.32, t0 + 0.004);
        g.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.6);
        o.connect(g); g.connect(fxIn);
        o.start(t0); o.stop(t0 + 0.7);
    }

    // 4) Susurros de la mente (preguntas agudas que cruzan)
    function playWhisper(t0) {
        const o = actx.createOscillator(); o.type = 'triangle'; o.frequency.value = 2093; // C7
        const lp = actx.createBiquadFilter(); lp.type = 'lowpass'; lp.frequency.value = 4000;
        const g = actx.createGain();
        g.gain.setValueAtTime(0.0001, t0);
        g.gain.exponentialRampToValueAtTime(0.04, t0 + 0.006);
        g.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.3);
        o.connect(lp); lp.connect(g); g.connect(panner(Math.random() * 1.8 - 0.9)).connect(fxIn);
        o.start(t0); o.stop(t0 + 0.34);
    }

    function startScheduling() {
        const beat = () => playHeartbeat(actx.currentTime + 0.05);
        beat(); timers.push(setInterval(beat, 10000));
        const whisper = () => playWhisper(actx.currentTime + 0.05);
        whisper(); timers.push(setInterval(whisper, 3700));
    }

    async function initSound() {
        if (started) return; started = true;
        buildGraph();
        if (actx.state === 'suspended') await actx.resume();
        master.gain.linearRampToValueAtTime(0.8, actx.currentTime + 4);
        buildGraph._padGain.gain.linearRampToValueAtTime(0.08, actx.currentTime + 6); // el pad emerge lento
        startScheduling();
        const hint = document.getElementById('hint'); if (hint) hint.classList.add('oculto');
    }
    document.body.addEventListener('click', initSound, { once: true });
    </script>
</body>
</html>
